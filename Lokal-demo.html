  ].map(item => [item?.segment?.name, item?.genre?.name, item?.subGenre?.name, item?.type?.name, item?.subType?.name].filter(Boolean).join(" ")).join(" ").toLowerCase();
  const directCategory = String(row.category || row.cat || "").toLowerCase();
  const tag = String(tagList.map(normalizeTagValue).find(item => importedCategories.has(String(item).toLowerCase())) || row.tag || "").toLowerCase();
  const directCategoryMap = {
    "arts & theatre": "performing-arts",
    theatre: "performing-arts",
    theater: "performing-arts",
    comedy: "performing-arts",
    "performance art": "performing-arts",
    baseball: "sports",
    basketball: "sports",
    football: "sports",
    hockey: "sports",
    soccer: "sports",
    museum: "museums",
    museums: "museums",
    "live music": "live-music",
    "live-music": "live-music",
    rock: "concerts",
    pop: "concerts",
    "r&b": "concerts",
    "hip-hop/rap": "concerts",
    jazz: "concerts",
    latin: "concerts",
    country: "concerts",
    "dance/electronic": "concerts",
    religious: text.includes("gospel") || text.includes("music") || text.includes("festival of praise") ? "concerts" : "performing-arts"
  };
  if (directCategoryMap[directCategory]) return directCategoryMap[directCategory];
  if (["concerts", "live-music", "happy-hours", "trivia-nights", "nightlife"].includes(directCategory)) return directCategory;
  if (/comedy|comedian|stand[- ]?up|improv/.test(classificationText)) return "performing-arts";
  if (/sports|baseball|basketball|football|hockey|soccer/.test(classificationText)) return "sports";
  if (/music|rock|pop|r&b|hip[- ]?hop|rap|jazz|latin|country|dance|electronic/.test(classificationText)) return "concerts";
  if (/arts|theatre|theater|performance|play|musical/.test(classificationText)) return "performing-arts";
  if (directCategoryMap[directCategory]) return directCategoryMap[directCategory];
  if (directCategory === "happy-hours") return "happy-hours";
  if (directCategory === "trivia-nights") return "trivia-nights";
  if (/museum|smithsonian|hirshhorn|renwick|portrait gallery|american art museum|air and space|natural history|american history/.test(text)) return "museums";
  if (/\b(9:30 club|930 club|the anthem|capital one arena|dar constitution hall|constitution hall|the howard theatre|howard theatre|echostage|nationals park|union stage)\b/.test(venueText)) return "concerts";
  if (/9:30 club|echostage|soundcheck|flash nightclub|decades|ultrabar|heist|saint yves|zebbie|madam'?s organ|black cat|dc9|the crown & crow|viceroy rooftop/.test(venueText) || /\b(nightlife|nightclub|dance club|club night|bar crawl|cocktail|speakeasy|lounge|rooftop|dance party|after dark|late night|dj set|pride party)\b/.test(text)) return "nightlife";
  if (/\b(comedy|stand up|stand-up|standup|improv|comic|comedian)\b|room 808|comedy club|comedy cellar|dc improv/.test(text)) return "performing-arts";
  if (importedCategories.has(directCategory)) return directCategory;
  if (/signature theatre|kennedy center|warner theatre|lincoln theatre|theatre|theater|performance art|performing|arts & theatre|comedy|film|cinema|dance|musical|opera|stage play|pippin|what became of us/.test(text)) return "performing-arts";
  if (/concert/.test(text)) return "concerts";
  if (/music|r&b|hip-hop|rap|jazz|latin|country|rock|pop|dj|band|singer|songwriter/.test(text)) return "live-music";
  if (/baseball|basketball|football|soccer|hockey|sports|mlb|nba|nfl|nhl/.test(text)) return "sports";
  if (/festival|fair/.test(text)) return "festivals";
  if (/expo|conference|convention/.test(text)) return "expos";
  if (/showcase/.test(text)) return "performing-arts";
  if (/band|artist|singer|songwriter/.test(text)) return "live-music";
  if (row.source !== "manual" && importedCategories.has(tag) && tag !== "community") return tag;
  return "community";
}

function sportsLeagueTags(row) {

      .map(tag => String(tag || "").trim())
      .filter(tag => tag && tag !== "[object Object]")
      .filter(tag => !/^(happy hours?|weekday deal)$/i.test(tag) && !/sport/i.test(tag))
      .filter((tag, index, all) => all.findIndex(item => item.toLowerCase() === tag.toLowerCase()) === index)
      .slice(0, 8);
  }
  const text = `${row.category || ""} ${row.Category || ""} ${row.title || ""} ${row.description || ""} ${row.venue_name || ""} ${row.venue || ""} ${rawTags.join(" ")}`.toLowerCase();
  const venueText = `${row.venue_name || ""} ${row.venue || ""} ${row.location_name || ""}`.toLowerCase();
  const inferredTags = [];
  const categoryLabels = { concerts: "", "live-music": "", festivals: "Festivals", "performing-arts": "", sports: "Sports", community: "Community", expos: "Expos", museums: "Museums", nightlife: "Nightlife", "happy-hours": "", "trivia-nights": "" };
  if (/museum|smithsonian|hirshhorn|renwick gallery|portrait gallery|american art museum|air and space|natural history|american history/.test(text)) inferredTags.push("Museums");
  if (/smithsonian|hirshhorn|renwick gallery|national portrait gallery|american art museum|national air and space museum|national museum of african american history|national museum of natural history|national museum of american history/.test(text)) inferredTags.push("Smithsonian");
  if (["concerts", "live-music"].includes(category)) inferredTags.push(...concertDetailTags(row));
  if (/theatre|theater|performance art|performing|arts & theatre|gallery|art|exhibit|exhibition|musical|opera/.test(text)) inferredTags.push("Arts");
  if (/comedy|stand up|stand-up|improv/.test(text)) inferredTags.push("Comedy");
  if (/film|cinema|screening|movie/.test(text)) inferredTags.push("Film");
  const sportTags = sportsLeagueTags(row);
  if (sportTags.length || /baseball|basketball|football|soccer|hockey|sports|mlb|nba|nfl|nhl|mls|wnba|nationals|mystics|wizards|capitals|commanders|d\.?c\.? united|dc united/.test(text)) inferredTags.push("Sports", ...sportTags);
  if (category === "nightlife" && (/flash nightclub|decades|ultrabar|heist|saint yves|zebbie|madam'?s organ|the crown & crow|viceroy rooftop/.test(venueText) || /\b(nightlife|nightclub|club promo|club night|bar crawl|cocktail|speakeasy|lounge|rooftop party|dance party|after dark|late night|pride party)\b/.test(text))) inferredTags.push("Nightlife");

  return [...inferredTags, categoryLabels[category] || "", ...rawTags, row.tag, ...labels]

// Venue images pulled from the Supabase `venues` table (venues.image_url),
// used as a fallback when an event has no image of its own. Matched by a
// normalized venue name, mirroring the server-side venue_image_key().
let venueImageMap = {};
function venueImageKeyName(value) {
  // Mirrors the server-side public.venue_image_key() so client matches line up.
  return String(value || "")
    .toLowerCase()
    .trim()
    .replace(/\s*\([^)]*\)\s*/g, " ")
    .replace(/^the\s+/, "")
    .replace(/\s+(bar|cafe|lounge|tavern|dc)$/, "")
    .replace(/[^a-z0-9]+/g, "");
}
let venueImageKeys = [];
function venueImageForRow(row) {
  const key = venueImageKeyName(row.venue_name || row.venue);
  if (!key) return "";
  if (venueImageMap[key]) return venueImageMap[key];
  // Fuzzy fallback: event venue names are often more specific than the venue row
  // (e.g. "Atlas Brew Works Navy Yard" vs "Atlas Brew Works"). Match when one
  // normalized name is a prefix/substring of the other. Keys are sorted longest
  // first so the most specific venue wins.
  for (const vk of venueImageKeys) {
    if (vk.length < 6) continue;
    if (key.startsWith(vk) || vk.startsWith(key) || key.includes(vk) || vk.includes(key)) return venueImageMap[vk];
  }
  return "";
}
async function syncSupabaseVenueImages() {
  try {
    const response = await fetch(`${supabaseConfig.url}/rest/v1/venues?select=*&limit=4000`, { headers: { apikey: supabaseConfig.publishableKey } });
    if (!response.ok) return;
    const rows = await response.json();
    const map = {};
    const directoryRows = [];
    rows.forEach(venue => {
      const key = venueImageKeyName(venue.name);
      const img = String(venue.image_url || "").trim(); // some rows have stray leading CR/LF
      if (key && /^(https?:|data:)/i.test(img)) map[key] = img;
      if (venue.name) {
        directoryRows.push({
          name: venue.name,
          address: venue.address || "",
          neighborhood: venue.neighborhood || "",
          venue_type: venue.venue_type || "",
          website_url: venue.website_url || "",
          image_url: /^(https?:|data:)/i.test(img) ? img : ""
        });
      }
    });
    venueImageMap = map;
    venueImageKeys = Object.keys(map).sort((a, b) => b.length - a.length);
    venueDirectory = [...venueDirectory, ...directoryRows]
      .filter((venue, index, all) => venue.name && all.findIndex(item => venueImageKeyName(item.name) === venueImageKeyName(venue.name)) === index);
  } catch {}
}

// PostgREST caps every response at 1000 rows regardless of the requested limit,
// so a single fetch silently drops most of an over-subscribed discovery window
// (thousands of daily happy-hour/trivia/music rows push later-dated events past
// the cap). Page through with offset until a short page signals the end. A stable
// id tiebreaker keeps slices from overlapping or skipping across pages.
async function fetchSupabaseEventPages(query) {
  const pageSize = 1000;
  const order = "starts_at.asc.nullslast,date.asc.nullslast,id.asc";
  const rows = [];
  for (let offset = 0; offset < 20000; offset += pageSize) {
    const response = await fetch(`${supabaseConfig.url}/rest/v1/events?${query}&order=${order}&limit=${pageSize}&offset=${offset}`, {
      cache: "no-store",
      headers: { apikey: supabaseConfig.publishableKey, "Cache-Control": "no-cache" }
    });
    if (!response.ok) throw new Error(`Supabase returned ${response.status}`);
    const page = await response.json();
    rows.push(...page);
    if (page.length < pageSize) break;
  }
  return rows;
}

async function syncSupabaseEvents(showToast = false) {
  state.eventSync = { status: "loading", label: "Checking shared events..." };
  state.eventsLoadTimedOut = false;
  setTimeout(() => {
    if (state.eventSync.status === "loading") {
      state.eventsLoadTimedOut = true;
      if (state.route === "home") renderHome();
    }
  }, 5000);
  if (state.route === "home") renderHome();
  await syncSupabaseVenueImages();
  await syncVenueVerificationStatus();
  try {
    const rowSets = await Promise.all(discoveryWindowQueries().map(fetchSupabaseEventPages));
    const rows = [...new Map(rowSets.flat().map(row => [row.id, row])).values()];
    if (rows.length) {
      const dcRows = rows.filter(isSupabaseEventInDc);
      const normalized = dcRows.map(normalizeSupabaseEvent);
      const discoveryWindowEvents = normalized.filter(isEventInDiscoveryWindow);
      events = discoveryWindowEvents;
      state.eventSync = { status: "synced", label: `${events.length} upcoming DC event${events.length === 1 ? "" : "s"}` };
    } else {
      events = [...demoEvents];
      state.eventSync = { status: "fallback", label: "Shared table connected / showing sample events until rows are added" };
    }
  } catch {
    events = [...demoEvents];
    state.eventSync = { status: "fallback", label: "Showing sample events / shared table unavailable" };
  }
  reconcileUserPlans();
  if (state.route === "home") renderHome();
  openSharedEventFromUrl();
  if (showToast) toast(state.eventSync.label);
}

function formatSignupPhone(value) {
  const digits = value.replace(/\D/g, "");
  if (digits.length === 10) return `+1${digits}`;
  if (digits.length === 11 && digits.startsWith("1")) return `+${digits}`;
  if (value.trim().startsWith("+") && digits.length >= 10) return `+${digits}`;
  throw new Error("Enter a 10 digit phone number with area code.");
}

function formatDisplayPhone(value) {
  const digits = String(value || "").replace(/\D/g, "");
  const local = digits.length === 11 && digits.startsWith("1") ? digits.slice(1) : digits;
  if (local.length !== 10) return value || "";
  return `(${local.slice(0, 3)}) ${local.slice(3, 6)}-${local.slice(6)}`;
}

function calculateAge(birthdate) {
  const birthday = new Date(`${birthdate}T12:00:00`);
  const today = new Date();
  let age = today.getFullYear() - birthday.getFullYear();
  if (today < new Date(today.getFullYear(), birthday.getMonth(), birthday.getDate())) age--;
  return age;
}

function validateBirthday(birthdate) {
  const birthday = new Date(`${birthdate}T12:00:00`);
  const today = new Date();
  if (!birthdate || Number.isNaN(birthday.getTime())) throw new Error("Enter a valid birthday.");
  if (birthday >= today) throw new Error("Birthday must be a date in the past.");
  if (calculateAge(birthdate) < 14) throw new Error("You must be at least 14 years old to use Lokal.");
}

function profileInitials(fullName) {

function decodeJwtPayload(token) {
  try {
    const payload = token.split(".")[1];
    return JSON.parse(atob(payload.replace(/-/g, "+").replace(/_/g, "/")));
  } catch {
    return {};
  }
}

function validateSignupEmail(email) {
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) throw new Error("Enter a valid email address.");
}

async function syncSupabaseSignupProfile(accessToken, profile) {
  const userId = decodeJwtPayload(accessToken).sub;
  if (!userId) return;

}

async function createLokalAccount({ fullName, email, phone, username, birthdate, password, eventInterests = [], areaInterests = [] }) {
  if (!fullName || !email || !phone || !username || !birthdate || !password) throw new Error("Complete every account field.");
  if (password.length < 8) throw new Error("Use a password with at least 8 characters.");
  validateSignupEmail(email);
  validateBirthday(birthdate);
  const formattedPhone = formatSignupPhone(phone);
  state.pendingSignupProfile = { fullName, email, phone: formattedPhone, username, birthdate, eventInterests, areaInterests };
  state.pendingSignupPhone = formattedPhone;
  if (demoAuthConfig.useMockOtp) return { demoOtp: true };
  const data = await supabaseAuthRequest("signup", {
    email,
    password,
    data: {
      full_name: fullName,
      username,
      birthdate,
      phone: formattedPhone,
      email,
      event_interests: eventInterests,
      area_interests: areaInterests,
      lokal_score: 100
    }
  });
  if (data.access_token) {
    persistSupabaseSession(data.access_token);
    await syncSupabaseSignupProfile(data.access_token, state.pendingSignupProfile);
  }
  return data;
}

async function checkPhoneSignupStatus() {

    const settings = await response.json();

async function verifyLokalPhone(token) {
  if (!token.trim()) throw new Error("Enter the verification code.");
  if (demoAuthConfig.useMockOtp) {
    if (token.trim() !== demoAuthConfig.mockOtp) throw new Error("For demo profiles, use verification code 123456.");
    finalizeLokalProfile(state.pendingSignupProfile);
    return { demoOtp: true };
  }
  const data = await supabaseAuthRequest("verify", { phone: state.pendingSignupPhone, token: token.trim(), type: "sms" });
  if (data.access_token) {
    persistSupabaseSession(data.access_token);
    state.pendingSignupProfile = { ...state.pendingSignupProfile, id: decodeJwtPayload(data.access_token).sub };
  }
  finalizeLokalProfile(state.pendingSignupProfile);
  return data;
}

// 06-scoring.js
// ============================================================
// Personalized feed: refresh per-user scores + read the feed.
//
// This file follows your app's pattern: it is concatenated with the other
// feature files and eval'd in one shared scope by main.js. So:
//   â€¢ NO import/export here (everything 05-supabase.js defines is already
//     visible to this file because they share the same scope).
//   â€¢ It loads at position 06 â€” right after 05-supabase.js â€” so the Supabase
//     client exists before anything below runs.
//
// â–ºâ–º THE ONE LINE TO CHECK â—„â—„
// `lokalSb` must point at the Supabase client created in 05-supabase.js.
// It tries the two most common names. Open 05-supabase.js, see what the client
// variable is called, and if it's neither of these, add it to the front below.
// ============================================================

const lokalSb =
  (typeof supabaseClient !== "undefined" && supabaseClient) ||
  (typeof supabase !== "undefined" && supabase) ||
  null;

// In-session guards so moving between screens doesn't re-invoke the function.
// These reset on a full page load (a real "app open"), which is what we want.
let _lastScoreRun = 0;
let _scoreInFlight = null;
const SCORE_MIN_INTERVAL_MS = 6 * 60 * 60 * 1000; // mirror the server's 6h cache

// Ask the score-events edge function to (re)score the signed-in user's events.
// Server-side it only re-scores stale (>6h) or missing scores, so it's cheap.
async function refreshScores(opts) {
  opts = opts || {};
  if (!lokalSb) {
    console.error("[scoring] No Supabase client found â€” check the lokalSb line in 06-scoring.js");
    return { error: "no-client" };
  }

  const userRes = await lokalSb.auth.getUser();
  const user = userRes && userRes.data ? userRes.data.user : null;
  if (!user) return { skipped: "no-signed-in-user" };

  const now = Date.now();
  if (!opts.force && now - _lastScoreRun < SCORE_MIN_INTERVAL_MS) {
    return { skipped: "throttled" };
  }
  if (_scoreInFlight) return _scoreInFlight; // dedupe concurrent callers

  _scoreInFlight = (async () => {
    try {
      // invoke() attaches the user's auth token automatically, so it clears
      // the function's JWT check.
      const { data, error } = await lokalSb.functions.invoke("score-events", {
        body: { user_id: user.id },
      });
      if (error) {
        console.error("[scoring] refreshScores error:", error.message);
        return { error: error.message };
      }
      _lastScoreRun = Date.now();
      return data || { success: true };
    } finally {
      _scoreInFlight = null;
    }
  })();

  return _scoreInFlight;
}

// Read the signed-in user's personalized feed (the personalized_feed view,
// already filtered to auth.uid() and ordered by boosted relevance score).
async function getPersonalizedFeed() {
  if (!lokalSb) return [];
  const { data, error } = await lokalSb.from("personalized_feed").select("*");
  if (error) {
    console.error("[scoring] getPersonalizedFeed error:", error.message);
    return [];
  }
  return data || [];
}

// Make them reachable from other feature files / the console.
if (typeof window !== "undefined") {
  window.refreshScores = refreshScores;
  window.getPersonalizedFeed = getPersonalizedFeed;
}

// On app open: if someone is signed in, refresh their scores in the background.
// When it finishes, re-render the discover feed IF your discover code exposes a
// reload function. Adjust the name on the marked line to match 10-discover.js.
refreshScores().then((res) => {
  if (res && res.scored) {
    console.log(`[scoring] refreshed ${res.scored} event scores`);

    // â–ºâ–º If 10-discover.js has a function that reloads/renders the feed, call it
    //    here so the freshly scored order shows immediately. Rename to match.

// Optional "For You" blended feed, powered by the get-blended-feed Supabase
// Edge Function (see supabase/functions/get-blended-feed). This is an A/B
// alternative to the local client-side feed: a toggle in the Discover header
// switches between "All" (the existing feed) and "For You" (server-blended,
// grouped into sections). Any failure falls back to the local feed.

const blendedFeedConfig = {
  endpoint: `${supabaseConfig.url}/functions/v1/get-blended-feed`,
  pageSize: 30
};

// Section render order + labels. Must match the Edge Function's SECTION_LABELS.
const BLENDED_SECTIONS = [
  ["personalized", "For You"],
  ["big_dc", "Big in DC"],
  ["neighborhood", "In Your Neighborhood"],
  ["trending", "Trending"],
  ["discovery", "Something Different"]
];

// Runtime state (state is defined in 00-core.js; this file is eval'd after it).
if (!state.feedMode) state.feedMode = "local";
state.blendedFeed = { status: "idle", mode: "", rows: [], error: "" };

function blendedFeedEnabled() {
  return state.feedMode === "blended";
}

// Call the Edge Function for the current interaction user and cache the result.
// Re-renders the home feed on both the loading transition and completion.
async function fetchBlendedFeed() {
  state.blendedFeed = { ...state.blendedFeed, status: "loading", error: "" };
  if (state.route === "home") renderHome();
  try {
    const userId = currentInteractionUserId();
    const response = await fetch(blendedFeedConfig.endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        apikey: supabaseConfig.anonKey || supabaseConfig.publishableKey,
        Authorization: `Bearer ${localStorage.getItem(supabaseStorageKeys.accessToken) || supabaseConfig.anonKey || supabaseConfig.publishableKey}`
      },
      body: JSON.stringify({ user_id: userId, limit: blendedFeedConfig.pageSize })
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    state.blendedFeed = {
      status: "ready",
      mode: data.mode || "",
      rows: Array.isArray(data.feed) ? data.feed : [],
      error: ""
    };
  } catch (error) {
    state.blendedFeed = { status: "error", mode: "", rows: [], error: error.message || "unavailable" };
  }
  if (state.route === "home") renderHome();
}

// A blended row is keyed by Supabase events.id; loaded app events carry that as
// event.sourceId. Map back so the existing card renderer has full event data.
function blendedRowToEvent(row) {
  return events.find(event => String(event.sourceId) === String(row.id)) || null;
}

// Render a {bucket: [events]} map into the labelled section layout. Shared by the
// server-blended path and the local fallback so both look identical.
function renderBucketSections(byBucket, modeNote) {

    .filter(([key]) => byBucket[key] && byBucket[key].length)
    .map(([key, label]) => {

// The user's "home" neighborhoods: onboarding areas plus wherever they save/RSVP.
function blendedHomeKeys() {
  const keys = new Set();
  const add = value => { const key = String(cleanLocationPart(value) || "").toLowerCase().trim(); if (key) keys.add(key); };
  (state.profile?.areas || []).forEach(add);
  [...(state.saved || []), ...(state.rsvps || [])].forEach(id => {
    const event = events.find(item => item.id === id);
    if (event) add(event.area || event.neighborhood);
  });
  return keys;
}

// Client-side version of the blended_feed view: bucket the already-filtered feed
// into the same five sections using the app's own taste + popularity scoring, so
// "For You" still shows real, sectioned picks when the Edge Function isn't
// deployed. Each event lands in exactly one bucket (priority order below), which
// keeps the mix from collapsing back into an echo chamber.
function localBlendedSections(list) {
  const weights = userPreferenceWeights();
  const homeKeys = blendedHomeKeys();
  const used = new Set();
  const personal = event => eventPersonalScore(event, weights);
  const popular = event => eventPopularityScore(event);
  const hoodKey = event => String(cleanLocationPart(event.area || event.neighborhood) || "").toLowerCase().trim();
  const take = (pool, limit) => {
    const picks = [];
    for (const event of pool) {
      if (picks.length >= limit) break;
      const key = eventDedupeKey(event);
      if (used.has(key)) continue;
      used.add(key);
      picks.push(event);
    }
    return picks;
  };
  const byPersonal = list.filter(event => personal(event) > 0).sort((a, b) => personal(b) - personal(a) || sortEventsByStart(a, b));
  const byBig = list.filter(event => popular(event) >= 4).sort((a, b) => popular(b) - popular(a) || sortEventsByStart(a, b));
  const byHood = list.filter(event => homeKeys.has(hoodKey(event))).sort((a, b) => personal(b) - personal(a) || sortEventsByStart(a, b));
  const byTrending = list.filter(event => popular(event) >= 4).sort((a, b) => popular(b) - popular(a) || sortEventsByStart(a, b));
  const byDiscovery = list.filter(event => personal(event) === 0).sort((a, b) => popular(b) - popular(a) || sortEventsByStart(a, b));
  // Order of take() calls = bucket priority; the `used` set prevents duplicates.
  return {
    personalized: take(byPersonal, 6),
    big_dc: take(byBig, 5),
    neighborhood: take(byHood, 4),
    trending: take(byTrending, 4),
    discovery: take(byDiscovery, 4)
  };
}

function renderLocalBlendedFeed(list) {
  const source = Array.isArray(list) ? list : [];
  if (!source.length) return renderDiscoverFeedContent(source);
  const buckets = localBlendedSections(source);
  const total = BLENDED_SECTIONS.reduce((sum, [key]) => sum + (buckets[key] ? buckets[key].length : 0), 0);
  if (!total) return renderDiscoverFeedContent(source);
  return renderBucketSections(buckets, "");
}

// Blended feed content, grouped into labelled sections. Uses the Edge Function's
// ranking when it returns mappable rows; otherwise (not deployed, error, still
// loading, or rows outside the loaded window) blends locally so the personalized
// feed always displays.
function renderBlendedFeedContent(fallbackList) {
  const bf = state.blendedFeed;
  if (bf.status === "ready") {
    const mapped = bf.rows
      .map(row => ({ bucket: row.bucket, event: blendedRowToEvent(row) }))
      .filter(item => item.event);
    if (mapped.length) {
      const byBucket = {};
      const used = new Set();
      mapped.forEach(item => {
        const key = eventDedupeKey(item.event);
        if (used.has(key)) return;
        used.add(key);
        (byBucket[item.bucket] = byBucket[item.bucket] || []).push(item.event);
      });
      const modeNote = bf.mode === "new_user_fallback"
        ? `<p class="blended-mode-note">New here â€” showing big DC moments and your neighborhood until you save a few events.</p>`
        : "";
      return renderBucketSections(byBucket, modeNote);
    }
  }
  return renderLocalBlendedFeed(fallbackList);
}

function venueSearchMatches(query, limit = 8) {
  const terms = String(query || "").trim().toLowerCase().split(/\s+/).filter(Boolean);
  if (!terms.length) return [];
  const fromEvents = displayableDcEvents().map(event => ({ name: cleanLocationPart(event.venue), neighborhood: cleanLocationPart(event.area || event.neighborhood), image_url: event.image || "" }));
  const merged = [...venueDirectory, ...fromEvents]
    .filter(venue => venue.name)
    .filter((venue, index, all) => all.findIndex(item => venueImageKeyName(item.name) === venueImageKeyName(venue.name)) === index);
  return merged
    .filter(venue => terms.every(term => `${venue.name} ${venue.neighborhood || ""} ${venue.address || ""}`.toLowerCase().includes(term)))
    .slice(0, limit);
}

function venueEventMatch(event, displayName) {
  const key = venueImageKeyName(displayName);
  const eventVenueKey = venueImageKeyName(event.venue);
  const eventLocationKey = venueImageKeyName(eventLocationLine(event));
  const text = `${event.venue || ""} ${event.title || ""} ${eventLocationLine(event) || ""}`.toLowerCase();
  const displayText = String(displayName || "").toLowerCase();
  if (!key) return false;
  if (eventVenueKey === key || eventLocationKey === key) return true;
  if (key.length >= 5 && eventVenueKey.length >= 5 && (eventVenueKey.includes(key) || key.includes(eventVenueKey))) return true;
  if (key.length >= 5 && eventLocationKey.length >= 5 && eventLocationKey.includes(key)) return true;
  return displayText.length >= 3 && text.includes(displayText);
}

function isVerifiedVenueName(name) {

function openVenueEvents(name) {
  const directoryVenue = venueDirectoryMatch(name) || { name };
  const displayName = directoryVenue.name || name;
  const venueEvents = displayableDcEvents().filter(event => venueEventMatch(event, displayName)).sort(sortEventsByStart).slice(0, 12);
  const following = state.follows.has(`venue:${displayName}`);
  const verified = isVerifiedVenueName(displayName);
  const eventVenueImage = venueEvents.find(event => event.image)?.image || "";

// Category weights built from the user's own data: tastes, saves, RSVPs, and
// attended history, so the feed adapts to what each person actually engages with.
// How common each tag is across the whole catalog (cached per events load) so we
// can reward specific tags (Jazz, Rooftop) over broad ones (Beer, Happy hour).
let discoverTagFreqCache = null;
function eventTagFrequencies() {
  if (discoverTagFreqCache && discoverTagFreqCache.size === events.length) return discoverTagFreqCache.map;
  const map = {};
  events.forEach(event => eventTags(event).forEach(tag => { const key = String(tag).toLowerCase(); map[key] = (map[key] || 0) + 1; }));
  discoverTagFreqCache = { size: events.length, map };
  return map;
}
function tagSpecificity(tag, freq) {
  return 1 / Math.sqrt((freq[String(tag).toLowerCase()] || 1));
}

function userPreferenceWeights() {
  const catWeights = {};
  const tagWeights = {};
  const bumpCat = (cat, weight) => { const key = String(cat || "").toLowerCase(); if (key) catWeights[key] = (catWeights[key] || 0) + weight; };
  // Time-of-day tags are already their own filter dimension; keep preferences
  // about genre/venue/vibe so reasons read like real tastes (Jazz, Rooftop).
  const isTimeTag = key => /^(early|late|morning|afternoon|evening|night|all day|today|tonight|this weekend|weekend|this week)/i.test(key);
  const bumpTags = (event, weight) => eventTags(event).forEach(tag => { const key = String(tag || "").toLowerCase(); if (key && !isTimeTag(key)) tagWeights[key] = (tagWeights[key] || 0) + weight; });
  (state.tastes || []).forEach(taste => { bumpCat(typeof categoryFromTaste === "function" ? categoryFromTaste(taste) : "", 2); const key = taste.toLowerCase(); tagWeights[key] = (tagWeights[key] || 0) + 2; });
  const fromIds = (idSet, weight) => Array.from(idSet || []).forEach(id => { const event = events.find(item => item.id === id); if (event) { bumpCat(event.cat, weight); bumpTags(event, weight); } });
  fromIds(state.saved, 2);
  fromIds(state.rsvps, 3);
  (typeof profileReceipts === "function" ? profileReceipts() : []).forEach(receipt => { bumpCat(receipt.cat, 3); const event = events.find(item => String(item.id) === String(receipt.id)); if (event) bumpTags(event, 3); });
  return { catWeights, tagWeights, tagFreq: eventTagFrequencies() };
}

function eventPersonalScore(event, weights) {
  let score = weights.catWeights[String(event.cat || "").toLowerCase()] || 0;
  // Specific (rare) tags count for more than broad ones, and more than the category.
  eventTags(event).forEach(tag => {
    const weight = weights.tagWeights[String(tag).toLowerCase()] || 0;
    if (weight) score += weight * 2 * tagSpecificity(tag, weights.tagFreq);
  });
  return score;
}

// Why an event was surfaced â€” the most specific tag the user has engaged with.
function eventPersonalReason(event, weights) {
  let bestTag = "";
  let bestScore = 0;
  eventTags(event).forEach(tag => {
    const weight = weights.tagWeights[String(tag).toLowerCase()] || 0;
    if (!weight) return;
    const score = weight * tagSpecificity(tag, weights.tagFreq);
    if (score > bestScore) { bestScore = score; bestTag = tag; }
  });
  return bestTag ? `Because you like ${bestTag}` : "";
}

// Personalized ordering for the main feed: events matching the user's tastes and
// past behavior (by specific tag and category) float up; ties broken by soonest start.
// Marquee DC venues â€” a show here is almost always a "bigger" event.
const MARQUEE_VENUE_RE = /\b(the anthem|9:?30 club|capital one arena|nationals park|audi field|dar constitution hall|constitution hall|the howard theatre|howard theatre|echostage|union stage|warner theatre|lincoln theatre|kennedy center|national theatre|wolf trap|merriweather|strathmore|entertainment and sports arena|city winery|the fillmore|black cat|pearl street warehouse)\b/;

// A rough "how big / popular is this" signal so marquee shows and buzzy events
// surface in the mixed feed alongside personalized picks. Deliberately small
// relative to strong personal-tag matches so real tastes still win.
function eventPopularityScore(event) {
  let score = 0;
  const venueText = `${event.venue || ""} ${event.area || ""}`.toLowerCase();
  if (MARQUEE_VENUE_RE.test(venueText)) score += 8;
  const catTier = { concerts: 4, festivals: 4, sports: 4, "performing-arts": 3, "live-music": 3, nightlife: 2, expos: 2, community: 1, museums: 1, "happy-hours": 0, "trivia-nights": 0 };
  score += catTier[String(event.cat || "").toLowerCase()] ?? 1;
  // Ticketed events with a real start time skew toward marquee programming.
  if (event.hasPreciseStart && eventPriceLabel(event)) score += 2;
  return score;
}

// Mixed-feed ordering: personal-taste match + a popularity boost, so the feed
// reflects the user's interests AND leans toward bigger/buzzier events. Ties
// break by soonest start.
function feedPersonalSort(list) {
  const weights = userPreferenceWeights();
  const key = event => eventPersonalScore(event, weights) + eventPopularityScore(event);
  return list.slice().sort((a, b) => key(b) - key(a) || sortEventsByStart(a, b));
}

// Paginated feed: every event renders as a full image-then-text card, 10 at a

function tonightMapEvents(limit = 5) {
  const dc = dedupeFeedEvents(displayableDcEvents().filter(event => matchesFilter(event, "all")).sort(sortEventsByStart));
  const withPictures = dc.filter(event => String(event.image || "").trim());
  const tonight = withPictures.filter(event => /^(tonight|today)/i.test(String(event.time || "")) || matchesDateFilter(event, "Today"));
  const pool = tonight.length >= limit ? tonight : [...tonight, ...withPictures.filter(event => !tonight.includes(event))];
  const picks = [];
  const seenCategories = new Set();
  const addIfNewCategory = event => {
    const category = String(event.cat || "other").toLowerCase();
    if (seenCategories.has(category) || picks.some(item => item.id === event.id)) return;
    picks.push(event);
    seenCategories.add(category);
  };
  pool.forEach(event => {
    if (picks.length < limit) addIfNewCategory(event);
  });
  pool.forEach(event => {
    if (picks.length < limit && !picks.some(item => item.id === event.id)) picks.push(event);
  });
  return picks.slice(0, limit);
}

// Landing-page style: a DC photo with up to 5 events popping up across the city.
// Each pin is tappable and opens that event's detail.
function renderTonightMap() {
  const events = tonightMapEvents(5);

    <div class="tonight-canvas">${pins}</div>

}
// Sub-filters shown directly under the main category chips. The genre/type facet
// and the neighborhood are independent dimensions and combine with each other and
// the category (e.g. Live music + Karaoke + Shaw).
function filterDateLabel(value) {
  if (/^\d{4}-\d{2}-\d{2}/.test(value)) return value.includes("..") ? "Date range" : value;
  return value;
}
function filterTimeLabel(value) {
  if (/^custom:/.test(value)) return value.replace("custom:", "").replace("-", "â€“");
  return value;
}

// Filter bar: What / Where / When, each a multi-select dropdown. Selections combine.
const WHEN_DATE_TOKENS = ["Today", "This weekend", "This week"];
const WHEN_TIME_TOKENS = ["Morning", "Afternoon", "Evening", "Late night"];

function whatFilterOptions() {
  return discoverFilterItems().filter(([value]) => value !== "all");
}
function whatLabelFor(value) {
  const item = discoverFilterItems().find(([itemValue]) => itemValue === value);
  return item ? item[1] : value;
}
function filterBarSummary(labels, fallback) {
  const list = [...labels];
  if (!list.length) return fallback;
  return list.length === 1 ? list[0] : `${list[0]} +${list.length - 1}`;
}
function whenSelectionLabels() {
  const labels = [...(state.whenFilter || new Set())];
  if (state.filter.date && state.filter.date !== "Any date") labels.push(filterDateLabel(state.filter.date));
  if (state.filter.time && state.filter.time !== "Any time") labels.push(filterTimeLabel(state.filter.time));
  return labels;
}

function renderFilterBar() {
  const open = state.openFilterSheet || "";
  const what = state.whatFilter || new Set();
  const where = state.whereFilter || new Set();
  const whenLabels = whenSelectionLabels();
  // Each pill owns its dropdown so the panel opens directly beneath the pill that
  // was tapped (absolutely positioned inside the pill's wrapper), not full-width.
  const pillWrap = (kind, icon, label, count) => {
    const btn = `<button class="filter-pill${open === kind ? " open" : ""}${count ? " has-value" : ""}" data-open-filter="${kind}">${icon}<span>${escapeHtml(label)}</span>${count ? `<b class="pill-count">${count}</b>` : ""}<i class="pill-caret"></i></button>`;
    const dropdown = open === kind ? `<div class="filter-panel filter-dropdown${kind === "when" ? " align-end" : ""}">${filterDropdownContent(kind)}</div>` : "";
    return `<div class="filter-pill-wrap${open === kind ? " open" : ""}">${btn}${dropdown}</div>`;
  };
  const pills = `<div class="filter-pills">
    ${pillWrap("what", icons.megaphone, filterBarSummary([...what].map(whatLabelFor), "What"), what.size)}
    ${pillWrap("where", icons.pin, filterBarSummary(where, "Where"), where.size)}
    ${pillWrap("when", icons.clock, filterBarSummary(whenLabels, "When"), whenLabels.length)}
  </div>`;
  return `<div class="sub-filters">${pills}</div>`;
}

function checkRow(kind, value, label, checked) {
  return `<button class="check-row${checked ? " checked" : ""}" data-toggle-${kind}="${escapeHtml(value)}"><span class="check-box">${checked ? icons.check : ""}</span><span>${escapeHtml(label)}</span></button>`;
}

function filterDropdownContent(kind) {
  if (kind === "what") {
    const what = state.whatFilter || new Set();
    return `<div class="check-list check-list-scroll">${whatFilterOptions().map(([value, label]) => checkRow("what", value, label, what.has(value))).join("")}</div>${what.size ? `<button class="dropdown-clear" data-clear-what>Clear all</button>` : ""}`;
  }
  if (kind === "where") {
    const where = state.whereFilter || new Set();
    const options = discoverNeighborhoodOptions(displayableDcEvents());
    return `<div class="check-list check-list-scroll">${options.map(name => checkRow("where", name, name, where.has(name))).join("")}</div>${where.size ? `<button class="dropdown-clear" data-clear-where>Clear all</button>` : ""}`;
  }
  if (kind === "when") {
    const when = state.whenFilter || new Set();
    const dateVal = state.filter.date && state.filter.date !== "Any date" ? state.filter.date : "";
    const timeVal = state.filter.time && state.filter.time !== "Any time" ? state.filter.time : "";
    const isCustomDate = /^\d{4}-\d{2}-\d{2}/.test(dateVal);
    const isCustomTime = /^custom:/.test(timeVal);
    const pickRow = (kindAttr, checked, label) => `<button class="check-row${checked ? " checked" : ""}" data-${kindAttr}><span class="check-box">${checked ? icons.check : ""}</span><span>${escapeHtml(label)}</span></button>`;
    const dateGroup = `<div class="filter-group"><span class="filter-group-head">${icons.calendar}Date</span><div class="check-list">${WHEN_DATE_TOKENS.map(token => checkRow("when", token, token, when.has(token))).join("")}${pickRow("pick-date", isCustomDate, isCustomDate ? dateVal.replace("..", " â€“ ") : "Pick a dateâ€¦")}</div></div>`;
    const timeGroup = `<div class="filter-group"><span class="filter-group-head">${icons.clock}Time</span><div class="check-list">${WHEN_TIME_TOKENS.map(token => checkRow("when", token, token, when.has(token))).join("")}${pickRow("pick-time", isCustomTime, isCustomTime ? timeVal.replace("custom:", "").replace("-", " â€“ ") : "Pick a timeâ€¦")}</div></div>`;
    const clear = (when.size || dateVal || timeVal) ? `<button class="dropdown-clear" data-clear-when>Clear all</button>` : "";
    return `${dateGroup}${timeGroup}${clear}`;
  }
  return "";
}

// Does an event pass the What / Where / When multi-select filters?
function eventMatchesFilters(event) {
  const what = state.whatFilter || new Set();
  const where = state.whereFilter || new Set();
  if (what.size === 0) { if (event.cat === "museums") return false; }
  else if (![...what].some(value => matchesFilter(event, value, false))) return false;
  if (where.size > 0 && ![...where].some(name => eventNeighborhoodMatches(event, name))) return false;
  return eventMatchesWhen(event);
}
function eventMatchesWhen(event) {
  const when = state.whenFilter || new Set();
  const dateSel = [...when].filter(token => WHEN_DATE_TOKENS.includes(token));
  const timeSel = [...when].filter(token => WHEN_TIME_TOKENS.includes(token));
  const customDate = state.filter.date && state.filter.date !== "Any date" ? state.filter.date : "";
  const customTime = state.filter.time && state.filter.time !== "Any time" ? state.filter.time : "";
  const dateOk = (!dateSel.length && !customDate) || dateSel.some(token => matchesDateFilter(event, token)) || (customDate && matchesDateFilter(event, customDate));
  const timeOk = (!timeSel.length && !customTime) || timeSel.some(token => matchesTimeFilter(event, token)) || (customTime && matchesTimeFilter(event, customTime));
  return dateOk && timeOk;
}

function renderDiscoverCategoryPage(category) {

function searchableDiscoverCategory(category) {
  return ["concerts", "live-music", "happy-hours", "trivia-nights", "food", "nightlife", "performing-arts", "museums", "sports", "festivals", "community", "expos", "free"].includes(category);
}

function eventMatchesCategoryFacet(event, query) {
  const normalized = String(query || "").trim().toLowerCase();
  if (!normalized) return true;
  const neighborhood = typeof eventNeighborhoodLine === "function" ? eventNeighborhoodLine(event) : "";
  const text = `${event.title || ""} ${event.venue || ""} ${event.area || ""} ${neighborhood} ${event.desc || ""} ${event.tag || ""} ${eventTags(event).join(" ")}`.toLowerCase();
  return text.includes(normalized);
}

function categoryFacetPriority(category, tag) {
  const value = String(tag || "").toLowerCase();
  const priority = categoryFacetPriorityList(category);
  const index = priority.findIndex(item => item.toLowerCase() === value);
  return index === -1 ? 1000 : index;
}

function categoryFacetOptions(category, categoryEvents) {
  const blocked = ["concerts", "live music", "happy hours", "trivia nights", "nightlife", "arts", "museums", "sports", "festivals", "community", "expos", "performing arts"];
  const taggedOptions = categoryEvents
    .flatMap(eventTags)
    .map(tag => String(tag || "").trim())
    .filter(tag => tag && !blocked.includes(tag.toLowerCase()));
  const priorityOptions = categoryFacetPriorityList(category).filter(option => categoryEvents.some(event => eventMatchesCategoryFacet(event, option)));
  return [...priorityOptions, ...taggedOptions]
    .filter((tag, index, all) => all.findIndex(item => item.toLowerCase() === tag.toLowerCase()) === index)
    .sort((a, b) => categoryFacetPriority(category, a) - categoryFacetPriority(category, b) || a.localeCompare(b))
    .slice(0, 18);
}

function categoryFromTaste(taste) {
  const text = String(taste || "").toLowerCase();
  if (/concert/.test(text)) return "concerts";
  if (/music|jazz|dj|karaoke/.test(text)) return "live-music";
  if (/happy hour|wine bar|cocktail bar|beer/.test(text)) return "happy-hours";
  if (/trivia|quiz/.test(text)) return "trivia-nights";
  if (/bar|cocktail|dance|nightlife|rooftop|patio|late night|speakeasy/.test(text)) return "nightlife";
  if (/museum/.test(text)) return "museums";
  if (/gallery|art|theater|theatre|film|comedy/.test(text)) return "performing-arts";
  if (/sport|pickleball/.test(text)) return "sports";
  if (/food|restaurant|brunch|festival|street fair|market/.test(text)) return "festivals";
  if (/community|volunteer|book club|networking|professional/.test(text)) return "community";
  return "";
}

function renderDiscoverEventSearch(query) {
  const content = document.querySelector("[data-feed-content]");
  if (!content) return 0;
  const normalizedQuery = String(query || "").trim().toLowerCase();
  if (!normalizedQuery) {
    renderHome();
    return displayableDcEvents().filter(event => matchesFilter(event, state.homeFilter)).length;
  }
  const dcEvents = dedupeFeedEvents(displayableDcEvents().filter(event => matchesFilter(event, "all")).sort(sortEventsByStart));
  const pool = dcEvents.filter(event => normalizedQuery.split(/\s+/).every(term => discoverSearchText(event).includes(term)));
  const matches = dedupeFeedEvents(pool.sort(sortEventsByStart));
  const venueMatches = venueSearchMatches(normalizedQuery, 8);
  const venueHtml = venueMatches.length ? `<div class="venue-search-section"><p class="section-label">Venues</p><div class="venue-search-list">${venueMatches.map(venueSearchCard).join("")}</div></div>` : "";
  const eventHtml = matches.length ? renderEventFeed(matches, { showBadge: true }) : `<p class="section-helper">No matching events yet.</p>`;
  content.innerHTML = `${venueHtml}${eventHtml}`;
  return matches.length + venueMatches.length;
}

  "Adams Morgan": { x: 24, y: 27 },
  "U Street": { x: 42, y: 42 },

};

function eventMapPosition(event, index) {
  const base = dcMapAreas[event.area] || dcMapAreas[event.venue] || dcMapAreas["Washington, DC"];
  const jitter = ((event.sourceId || event.id || index) * 17) % 9 - 4;
  return { x: base.x + jitter, y: base.y + (((event.id || index) * 11) % 9 - 4) };
}

function scaledMapPosition(position) {
  const zoom = state.mapZoom;
  return {
    x: 50 + (position.x - state.mapCenter.x) * zoom,
    y: 50 + (position.y - state.mapCenter.y) * zoom
  };
}

function clampMapValue(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function setMapZoom(value) {
  state.mapZoom = clampMapValue(Math.round(value * 100) / 100, 0.75, 2.75);
}

function panMap(deltaX, deltaY) {
  const speed = 0.08 / state.mapZoom;
  state.mapCenter = {
    x: clampMapValue(state.mapCenter.x + deltaX * speed, 8, 92),
    y: clampMapValue(state.mapCenter.y + deltaY * speed, 8, 92)
  };
}

function mapSearchMatches(event) {
  const query = state.mapSearch.trim().toLowerCase();
  if (!query) return true;
  return `${event.title} ${event.venue} ${event.area} ${event.cat} ${event.tag}`.toLowerCase().includes(query);
}

function applyMapSearch() {
  const query = state.mapSearch.trim().toLowerCase();
  if (!query) return;
  const area = Object.entries(dcMapAreas).find(([name]) => name.toLowerCase().includes(query));
  const event = displayableDcEvents().find(item => mapSearchMatches(item));
  if (area) state.mapCenter = area[1];
  else if (event) state.mapCenter = eventMapPosition(event, 0);
}

function renderMap() {
  const visibleEvents = displayableDcEvents().filter(event => matchesFilter(event, state.mapFilter, false) && mapSearchMatches(event)).sort(sortEventsByStart);
  const pins = visibleEvents.map((event, index) => {
    const pos = scaledMapPosition(eventMapPosition(event, index));
    return `<button class="pin ${event.cat}" data-map-event="${event.id}" style="left:${pos.x}%;top:${pos.y}%"><span>${index + 1}</span></button>`;
  }).join("");
  const labels = Object.entries(dcMapAreas).filter(([name]) => name !== "Washington, DC").map(([name, pos]) => {
    const scaled = scaledMapPosition(pos);
    return `<span class="neighborhood" style="top:${scaled.y}%;left:${scaled.x}%">${name}</span>`;
  }).join("");
  app.innerHTML = `<section class="map-page">
    <div class="map-top"><div class="discover-heading"><div><p class="eyebrow">Near your location</p><h1>Map</h1></div><span class="route-badge">${state.mapZoom.toFixed(1)}x zoom</span></div><div class="chips">${filterChips(state.mapFilter, "map")}</div></div>
    <div class="map-canvas" data-map-canvas>
      <label class="map-search"><input data-map-search value="${escapeHtml(state.mapSearch)}" placeholder="Search area, venue, or event" aria-label="Search map"><button class="filter-button" data-map-area>Search area</button></label>
      <div class="map-gesture-hint">Pinch to zoom / drag to move</div><button class="map-reset" data-map-zoom="reset" aria-label="Reset map">Reset</button>
      <div class="map-grid" style="transform: scale(${state.mapZoom});"></div>
      ${labels}
      ${pins || `<p class="map-empty">No events match this map search.</p>`}
      <div class="map-results-pill">${visibleEvents.length} event${visibleEvents.length === 1 ? "" : "s"} on map</div>
      <div class="map-card" id="map-card"></div>
    </div>
  </section>`;
}

function diverseEventSelection(list, limit = 5) {
  const picked = [];
  const usedIds = new Set();
  const usedCategories = new Set();
  list.forEach(event => {
    if (picked.length >= limit) return;
    if (usedCategories.has(event.cat)) return;
    picked.push(event);
    usedIds.add(event.id);
    usedCategories.add(event.cat);
  });
  list.forEach(event => {
    if (picked.length >= limit) return;
    if (usedIds.has(event.id)) return;
    picked.push(event);
    usedIds.add(event.id);
  });
  return picked;
}

function storyEventPool(story) {
  if (story.todayOnly) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const dcEvents = displayableDcEvents().sort(sortEventsByStart);
    const todaysEvents = diverseEventSelection(dcEvents
      .filter(event => sameCalendarDate(eventDateValue(event), today))
      .filter(event => event.image), 5);
    const fallbackEvents = diverseEventSelection(dcEvents.filter(event => event.image), 5);
    return (todaysEvents.length ? todaysEvents : fallbackEvents);
  }
  const venueKeywords = story.venueKeywords || [];
  const textKeywords = story.textKeywords || [];
  const tagKeywords = story.tagKeywords || [];
  const categories = story.categories || [];
  const dcEvents = displayableDcEvents();
  const directMatches = dcEvents.filter(event => {
    const eventText = `${event.title} ${event.venue} ${event.area} ${event.desc || ""}`.toLowerCase();
    const tags = eventTags(event).map(tag => tag.toLowerCase());
    if (venueKeywords.some(keyword => `${event.venue} ${event.title}`.toLowerCase().includes(keyword))) return true;
    if (textKeywords.some(keyword => eventText.includes(keyword.toLowerCase()))) return true;
    if (tagKeywords.some(keyword => tags.includes(keyword.toLowerCase()))) return true;
    if (categories.includes(event.cat)) return true;
    return false;
  });
  const fallback = (story.eventIds || [])
    .map(id => dcEvents.find(event => event.id === id))
    .filter(Boolean);
  return [...directMatches, ...fallback]
    .filter((event, index, all) => all.findIndex(item => item.id === event.id) === index)
    .sort(sortEventsByStart)
    .slice(0, 6);
}

function groupSuggestedEvents(name, limit = 4) {
  const hints = groupCategoryHints[name] || [];
  const nameText = name.toLowerCase();
  const scored = events.map(event => {
    const text = `${event.title} ${event.venue} ${event.area} ${event.cat} ${event.tag} ${eventTags(event).join(" ")}`.toLowerCase();
    let score = 0;
    if (hints.includes(event.cat)) score += 6;
    if (nameText.includes("run") && /run|fitness|wellness|yoga/.test(text)) score += 8;
    if (nameText.includes("film") && /film|cinema|movie|screening/.test(text)) score += 8;
    if (nameText.includes("food") && /food|market|restaurant|chef|brunch|wine|cocktail/.test(text)) score += 8;
    if (nameText.includes("trivia") && /trivia|bar|nightlife|pub/.test(text)) score += 8;
    if (nameText.includes("gallery") && /gallery|museum|exhibit|art/.test(text)) score += 8;
    if (nameText.includes("culture") && /museum|theater|theatre|film|gallery|comedy|performance/.test(text)) score += 7;
    if (nameText.includes("skyline") && /rooftop|nightlife|cocktail|party/.test(text)) score += 8;
    if (nameText.includes("coffee") && /coffee|morning|market|walk|community/.test(text)) score += 7;
    return { event, score };
  }).filter(item => item.score > 0);
  const fallback = events.filter(event => matchesFilter(event, "all")).slice(0, limit);
  const ranked = scored.sort((a, b) => b.score - a.score || sortEventsByStart(a.event, b.event)).map(item => item.event);
  return [...ranked, ...fallback]
    .filter((event, index, all) => all.findIndex(item => item.id === event.id) === index)
    .slice(0, limit);
}

function personalizedEvents(limit = 3) {
  const tastes = (state.tastes || []).map(taste => taste.toLowerCase());
  const cats = (state.tastes || []).map(taste => typeof categoryFromTaste === "function" ? categoryFromTaste(taste) : "").filter(Boolean);
  const pool = displayableDcEvents().filter(event => matchesFilter(event, "all", false));
  const scored = pool.map(event => {
    const text = `${event.cat} ${eventTags(event).join(" ")} ${event.title}`.toLowerCase();
    let score = 0;
    cats.forEach(category => { if (event.cat === category) score += 4; });
    tastes.forEach(taste => { if (taste && text.includes(taste)) score += 2; });
    return { event, score };
  }).filter(item => item.score > 0).sort((a, b) => b.score - a.score || sortEventsByStart(a.event, b.event));
  // collapse recurring occurrences so a single event isn't recommended repeatedly
  return dedupeFeedEvents([...scored.map(item => item.event), ...pool]
    .filter((event, index, all) => all.findIndex(item => item.id === event.id) === index))
    .slice(0, limit);
}

function plannerCalendar(plans, emptyText = "Save or RSVP to an event and it will appear in Your Plans.") {
  if (!plans.length) return `<p class="section-helper empty-planner">${escapeHtml(emptyText)}</p>`;
  const start = new Date();
  start.setHours(0, 0, 0, 0);
  start.setDate(start.getDate() + state.plannerWeekOffset * 7);
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  const weekLabel = `${start.toLocaleDateString("en-US", { month: "short", day: "numeric" })} - ${end.toLocaleDateString("en-US", { month: "short", day: "numeric" })}`;
  const days = [];
  for (let date = new Date(start); date <= end; date.setDate(date.getDate() + 1)) {
    const iso = date.toISOString().slice(0, 10);
    const dayPlans = plans.filter(event => eventDateValue(event)?.toISOString().slice(0, 10) === iso);
    days.push({ date: new Date(date), iso, plans: dayPlans });
  }
  return `<div class="planner-week-controls"><button class="secondary" data-planner-week="-1">Previous week</button><span>${escapeHtml(weekLabel)}</span><button class="secondary" data-planner-week="1">Next week</button></div>
  <div class="planner-legend">${["concerts","live-music","happy-hours","trivia-nights","nightlife","performing-arts","museums","sports","festivals","community","expos"].map(cat => `<span><i class="${cat}"></i>${escapeHtml(discoverCategoryLabel(cat))}</span>`).join("")}</div>
  <div class="planner-calendar">${days.map(day => {
    const label = day.date.toLocaleDateString("en-US", { weekday: "short" });
    return `<article class="planner-day ${day.plans.length ? "" : "empty"}">
      <div class="planner-day-head"><span>${label}</span><b>${day.date.getDate()}</b></div>
      <div class="planner-day-events">${day.plans.length ? day.plans.map(event => `<button class="planner-day-event planner-${event.cat}" data-event="${event.id}"><i class="${event.cat}"></i><span><strong>${escapeHtml(event.title)}</strong><small>${escapeHtml(event.time)} / ${escapeHtml(eventLocationLine(event))}</small></span></button>`).join("") : `<button class="day-explore" data-day-explore="${day.iso}">Explore &rarr;</button>`}</div>
    </article>`;
  }).join("")}</div>`;
}

function openCalendarPlans(iso) {

function friendInterestEvents(name, limit = 4) {
  const profile = friendDirectory.find(friend => friend[1] === name);
  const seed = `${name} ${profile?.[4] || ""}`.toLowerCase();
  const preferred = events.filter(event => {
    const text = `${event.title} ${event.venue} ${event.area} ${event.cat} ${event.tag} ${eventTags(event).join(" ")}`.toLowerCase();
    if (/ana|priya|jules/.test(seed)) return /concert|music|museum|art|gallery|food|market|nightlife/.test(text);
    if (/marcus|dev/.test(seed)) return /sports|run|fitness|nightlife|concert|food/.test(text);
    if (/elena|sofia|nia/.test(seed)) return /museum|arts|comedy|food|festival|community/.test(text);
    return /concert|food|museum|nightlife/.test(text);
  });
  return [...preferred, ...events].filter((event, index, all) => all.findIndex(item => item.id === event.id) === index).sort(sortEventsByStart).slice(0, limit);
}

function openFriend(name) {
  const profile = friendDirectory.find(friend => friend[1] === name) || ["FR", name, "@lokalfriend", "0 mutual friends", "Washington, DC"];
  const isFriend = state.friends.has(name);
  const theirEvents = friendInterestEvents(name);

const LOKAL_SCORE_LEVELS = [
  { name: "New in Town", min: 0, next: 200 },
  { name: "Explorer", min: 200, next: 275 },
  { name: "District Scout", min: 275, next: 350 },
  { name: "Neighborhood Regular", min: 350, next: 450 },
  { name: "Plan Maker", min: 450, next: 575 },
  { name: "Ward Wanderer", min: 575, next: 725 },
  { name: "Metro Connector", min: 725, next: 900 },
  { name: "District Insider", min: 900, next: 1100 },
  { name: "Downtown Regular", min: 1100, next: 1350 },
  { name: "Capital Connector", min: 1350, next: 1650 },
  { name: "DC Tastemaker", min: 1650, next: 2000 },
  { name: "Certified Lokal", min: 2000, next: 2400 },
  { name: "District Icon", min: 2400, next: 2900 },
  { name: "Lokal Legend", min: 2900, next: 3600 },
  { name: "DC Hall of Fame", min: 3600, next: null }
];

function scoreLevel(score) {
  return LOKAL_SCORE_LEVELS.slice().reverse().find(level => score >= level.min) || LOKAL_SCORE_LEVELS[0];
}

function nextLevelName(level) {
  return LOKAL_SCORE_LEVELS.find(item => item.min === level.next)?.name || "";
}

function tasteColor(taste) {
  const category = typeof categoryFromTaste === "function" ? categoryFromTaste(taste) : "";
  if (category && CATEGORY_COLORS[category]) return CATEGORY_COLORS[category];
  const palette = ["#00C9A7", "#FF7B54", "#B07EDB", "#5F9FC3", "#F59E0B", "#FF6B9D", "#7BC67E", "#7C6BFF"];
  const seed = Array.from(String(taste || "")).reduce((total, character) => total + character.charCodeAt(0), 0);
  return palette[seed % palette.length];
}

function receiptThumbStyle(receipt) {
  const event = events.find(item => String(item.id) === String(receipt.id));
  const art = event ? eventArtImage(event) : genericEventArt({ cat: receipt.cat, title: receipt.title, venue: receipt.venue });
  return event?.image ? cleanEventThumbStyle(art) : `background-image: linear-gradient(160deg, rgba(0,0,0,.04), rgba(0,0,0,.3)), ${art};`;
}

function attendanceRow(receipt, index = 0) {
  const date = receipt.attendedAt ? new Date(receipt.attendedAt) : new Date();
  const label = date.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  return `<button class="attend-row" style="--i:${index}" data-receipt-event="${receipt.id}"><span class="attend-thumb" style="${receiptThumbStyle(receipt)}"></span><span class="attend-copy"><b>${escapeHtml(receipt.title)}</b><small>${escapeHtml(label)} / ${escapeHtml(receipt.cat || "event")}</small></span></button>`;
}

function groupReceiptsByMonth(receipts) {
  const groups = [];
  receipts.forEach(receipt => {
    const date = receipt.attendedAt ? new Date(receipt.attendedAt) : new Date();
    const label = date.toLocaleDateString("en-US", { month: "long", year: "numeric" });
    let group = groups.find(item => item.label === label);
    if (!group) { group = { label, items: [] }; groups.push(group); }
    group.items.push(receipt);
  });
  return groups;
}

function attendanceHistorySection() {

    : `<div class="attend-list">${receipts.slice(0, 3).map((receipt, index) => attendanceRow(receipt, index)).join("")}</div>`;

function venueInsightPanel() {
  const hosted = hostedEventsForVenue();
  const venueName = accountVenueName();
  const categories = hosted.reduce((totals, event) => {
    const label = discoverCategoryLabel(event.cat || "community");
    totals[label] = (totals[label] || 0) + 1;
    return totals;
  }, {});
  const categoryRows = Object.entries(categories).sort((a, b) => b[1] - a[1]).slice(0, 4);
  const topCount = Math.max(1, ...categoryRows.map(row => row[1]));
  const localFollow = state.follows.has(`venue:${venueName}`) ? 1 : 0;
  const followers = Math.max(localFollow, hosted.reduce((total, event) => total + (Array.isArray(event.friends) ? event.friends.length : 0), 0));
  const upcoming = hosted.filter(event => !event.start || event.start >= Date.now() - 86400000).length;
  return `<section class="section profile-insights"><div class="section-heading"><div><p class="eyebrow">Venue stats</p><h2>Hosting pulse</h2></div><span class="profile-pulse">Live</span></div>
    <div class="insight-grid"><div class="insight-card"><b>${hosted.length}</b><small>Events hosted</small></div><div class="insight-card"><b>${upcoming}</b><small>Upcoming</small></div><div class="insight-card"><b>${followers}</b><small>Followers</small></div></div>
    <div class="category-bars">${categoryRows.map(([label, count], index) => `<div class="category-bar" style="--level:${Math.max(18, Math.round((count / topCount) * 100))}%; --delay:${index * 80}ms"><span><b>${escapeHtml(label)}</b><small>${count} event${count === 1 ? "" : "s"}</small></span><i></i></div>`).join("") || `<p class="section-helper">Post events to build your venue dashboard.</p>`}</div>

function fullFriendName(initials) {

function lokalScore() {
  return scoreBreakdown().total;
}

function cappedScore(value, multiplier, cap) {
  return Math.min(value * multiplier, cap);
}

function uniqueUserTexts(messages) {
  return Array.from(new Set(messages
    .filter(message => message?.type === "text" && String(message.text || "").trim().length >= 8)
    .map(message => String(message.text).trim().toLowerCase())));
}

function socialActivityUnits() {
  const groupTexts = Object.values(state.groupMessages || {}).flatMap(uniqueUserTexts);
  const groupEventShares = Object.entries(state.groupMessages || {}).flatMap(([group, messages]) =>
    messages.filter(message => message?.type === "event" && message.eventId).map(message => `${group}:${message.eventId}`)
  );
  const directTexts = Object.values(state.directMessages || {}).flatMap(messages =>
    messages.filter(message => message?.from === "You" && String(message.text || "").trim().length >= 8).map(message => String(message.text).trim().toLowerCase())
  );
  return new Set([...groupTexts, ...groupEventShares, ...directTexts]).size;
}

function receiptFriendUnits(receipts) {
  return receipts.reduce((sum, receipt) => sum + new Set(receipt.friends || []).size, 0);
}

function receiptEventKey(receipt) {
  return String(receipt?.eventId || receipt?.id || `${receipt?.title || ""}|${receipt?.venue || ""}|${receipt?.time || ""}`).toLowerCase();
}

function attendanceTimeKey(item) {
  const raw = Number(item?.startSort || item?.attendedAt || 0);
  if (Number.isFinite(raw) && raw > 0) return String(Math.floor(raw / 60000));
  return String(item?.time || "").toLowerCase().trim();
}

function sameTimeAttendanceCount(event) {
  const key = attendanceTimeKey(event);
  if (!key) return 0;
  return profileReceipts().filter(receipt => attendanceTimeKey(receipt) === key).length;
}

function scoreBreakdown() {
  const receipts = profileReceipts();
  const rsvpCount = Array.from(state.rsvps || []).filter(id => !state.removedPlans?.has(id)).length;
  const savedOnlyCount = Array.from(state.saved || []).filter(id => !state.rsvps.has(id) && !state.removedPlans?.has(id)).length;
  const followCount = (state.follows?.size || 0) + rsvpCount;
  const inviteCount = Number(state.inviteLinksSent || 0);
  const friendSignupCount = state.friendSignupCredits?.size || 0;
  const breakdown = [
    { label: "New in Town", value: 100, detail: "100 starting points for creating a profile and joining Lokal." },
    { label: "Verified attendance", value: receipts.length * 15, detail: `${receipts.length} unique event receipt${receipts.length === 1 ? "" : "s"} - 15 each - no lifetime cap.` },
    { label: "Went with friends", value: receiptFriendUnits(receipts) * 5, detail: "5 points for each friend attached to an attended event receipt. It grows with real group plans, not random friend adds." },
    { label: "Upcoming plans", value: cappedScore(rsvpCount, 3, 30), detail: `${rsvpCount} RSVP${rsvpCount === 1 ? "" : "s"} - 3 each - capped at 30.` },
    { label: "Saved ideas", value: cappedScore(savedOnlyCount, 1, 20), detail: `${savedOnlyCount} saved event${savedOnlyCount === 1 ? "" : "s"} not already RSVP'd - 1 each - capped at 20.` },
    { label: "Following events & venues", value: cappedScore(followCount, 1, 25), detail: `${followCount} followed event or venue signal${followCount === 1 ? "" : "s"} - 1 each - capped at 25.` },
    { label: "Friends", value: cappedScore(state.friends.size, 1, 30), detail: `${state.friends.size} friend${state.friends.size === 1 ? "" : "s"} - 1 each - capped at 30.` },
    { label: "Invite links sent", value: cappedScore(inviteCount, 1, 10), detail: `${inviteCount} invite link${inviteCount === 1 ? "" : "s"} sent - 1 each - capped at 10.` },
    { label: "Friend signups", value: cappedScore(friendSignupCount, 3, 30), detail: `${friendSignupCount} friend signup credit${friendSignupCount === 1 ? "" : "s"} - 3 each - capped at 30.` },
    { label: "Conversation activity", value: cappedScore(socialActivityUnits(), 1, 30), detail: "Counts unique meaningful direct messages and event shares, not repeated short spam." }
  ];
  return { total: breakdown.reduce((sum, item) => sum + item.value, 0), items: breakdown };
}

function profileReceipts() {
  const legacyDemoReceiptIds = new Set(["receipt-songbyrd", "receipt-open-streets", "receipt-hirshhorn"]);
  const stored = state.receipts || [];
  const attendedRows = Array.from(state.attended || []).map(id => {
    const event = events.find(item => item.id === Number(id));
    if (!event) return null;
    return { id: event.id, title: event.title, time: event.time, venue: eventLocationLine(event), price: event.price, cat: event.cat, desc: event.desc, friends: event.friends || [], attendedAt: event.startSort || Date.now(), startSort: event.startSort || 0 };
  }).filter(Boolean);
  return [...stored, ...attendedRows]
    .filter(receipt => !legacyDemoReceiptIds.has(String(receipt?.id || "")))
    .filter((receipt, index, all) => all.findIndex(item => receiptEventKey(item) === receiptEventKey(receipt)) === index)
    .sort((a, b) => (b.attendedAt || 0) - (a.attendedAt || 0));
}

function bestFriendsList() {

function markEventAttended(id) {
  const event = events.find(item => item.id === Number(id));
  if (!event) return { ok: false, message: "Event not found" };
  if (Number.isFinite(event.startSort) && event.startSort > Date.now()) return { ok: false, message: "You can add this after the event starts" };
  if (state.attended.has(event.id) || profileReceipts().some(receipt => receiptEventKey(receipt) === receiptEventKey(event))) return { ok: false, message: "This event is already counted once" };
  if (sameTimeAttendanceCount(event) >= 2) return { ok: false, message: "You can only mark two events at the same time" };
  state.attended.add(event.id);
  state.rsvps.delete(event.id);
  const receipt = { id: event.id, eventId: event.id, title: event.title, time: event.time, venue: eventLocationLine(event), price: event.price, cat: event.cat, desc: event.desc, friends: event.friends || [], attendedAt: event.startSort || Date.now(), startSort: event.startSort || 0 };
  state.receipts = [receipt, ...(state.receipts || []).filter(item => Number(item.id) !== Number(event.id))];
  localStorage.setItem("lokalAttended", JSON.stringify(Array.from(state.attended)));
  localStorage.setItem("lokalReceipts", JSON.stringify(state.receipts));
  if (typeof submitAttendanceReceipt === "function") submitAttendanceReceipt(receipt);
  return { ok: true, message: "Receipt, score, and best friends updated" };
}

function rollingCalendar() {
  const start = new Date();
  start.setHours(0, 0, 0, 0);
  const end = new Date(start);
  end.setMonth(end.getMonth() + 2);
  const months = [];
  for (let date = new Date(start); date <= end; date.setDate(date.getDate() + 1)) {
    const key = `${date.getFullYear()}-${date.getMonth()}`;
    let month = months.find(item => item.key === key);
    if (!month) {
      month = { key, label: date.toLocaleDateString("en-US", { month: "long", year: "numeric" }), days: [] };
      months.push(month);
    }
    month.days.push({ iso: date.toISOString().slice(0, 10), label: date.getDate() });
  }
  const selected = String(state.filter.date || "");
  const range = selected.match(/^(\d{4}-\d{2}-\d{2})\.\.(\d{4}-\d{2}-\d{2})$/);
  const selectedStart = range ? range[1] : /^\d{4}-\d{2}-\d{2}$/.test(selected) ? selected : "";
  const selectedEnd = range ? range[2] : "";
  const calendarVisible = Boolean(selectedStart) || state.filterDatePickerOpen;
  const dateClass = iso => {
    if (iso === selectedStart || iso === selectedEnd) return "selected";
    if (selectedStart && selectedEnd && iso > selectedStart && iso < selectedEnd) return "in-range";
    return "";
  };
  const label = selectedEnd ? `${selectedStart} to ${selectedEnd}` : selectedStart ? `${selectedStart} selected. Choose another day to make a range, or show events for this day.` : "Choose one day, or choose a start and end date for a range.";
  return `<div class="calendar" data-calendar ${calendarVisible ? "" : "hidden"}><p class="calendar-helper">${label}</p>${selectedStart ? `<button class="text-button calendar-clear" data-calendar-clear>Clear dates</button>` : ""}${months.map(month => `<div class="calendar-month"><p class="eyebrow">${month.label}</p><div class="calendar-grid">${month.days.map(day => `<button class="${dateClass(day.iso)}" data-calendar-date="${day.iso}">${day.label}</button>`).join("")}</div></div>`).join("")}</div>`;
}

// --- Add a recurring event to the user's calendar as a repeating series ---
function icsEscape(value) {
  return String(value || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\r?\n/g, "\\n");
}

function icsStamp(date) {
  const p = n => String(n).padStart(2, "0");
  return `${date.getFullYear()}${p(date.getMonth() + 1)}${p(date.getDate())}T${p(date.getHours())}${p(date.getMinutes())}00`;
}

function icsStampUtc(date) {
  const p = n => String(n).padStart(2, "0");
  return `${date.getUTCFullYear()}${p(date.getUTCMonth() + 1)}${p(date.getUTCDate())}T${p(date.getUTCHours())}${p(date.getUTCMinutes())}${p(date.getUTCSeconds())}Z`;
}

// First on/after the event date that matches the rule, so DTSTART is a valid
// instance even if the stored date drifts from the detected cadence.
function firstRecurrenceDate(startDate, recurrence) {
  const base = new Date(`${startDate}T00:00:00`);
  if (Number.isNaN(base.getTime())) return null;
  const matches = date => {
    const code = ICS_WEEKDAY_CODES[date.getDay()];
    if (recurrence.freq === "WEEKLY") return recurrence.byday.includes(code);
    return recurrence.byday.some(token => {
      const parsed = token.match(/^(-?\d+)([A-Z]{2})$/);
      if (!parsed || parsed[2] !== code) return false;
      const ordinal = Number(parsed[1]);
      const nth = Math.floor((date.getDate() - 1) / 7) + 1;
      const isLast = new Date(date.getTime() + 7 * 86400000).getMonth() !== date.getMonth();
      return ordinal === -1 ? isLast : nth === ordinal;
    });
  };
  for (let i = 0; i < 400; i++) {
    const day = new Date(base.getFullYear(), base.getMonth(), base.getDate() + i);
    if (matches(day)) return day;
  }
  return base;
}

function buildEventIcs(event, recurrence) {
  if (!/^\d{4}-\d{2}-\d{2}$/.test(String(event.startDate || ""))) return null;
  const first = firstRecurrenceDate(event.startDate, recurrence);
  if (!first) return null;
  const hasTime = Number.isFinite(event.startHour);
  const start = new Date(first.getFullYear(), first.getMonth(), first.getDate(), hasTime ? event.startHour : 9, 0, 0);
  const rrule = [`FREQ=${recurrence.freq}`];
  if (recurrence.interval > 1) rrule.push(`INTERVAL=${recurrence.interval}`);
  if (recurrence.byday && recurrence.byday.length) rrule.push(`BYDAY=${recurrence.byday.join(",")}`);
  const description = [String(event.desc || "").replace(/<[^>]*>/g, "").trim(), lokalEventShareUrl(event)].filter(Boolean).join("\n");
  const lines = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Lokal//DC Events//EN", "CALSCALE:GREGORIAN", "BEGIN:VEVENT"];
  lines.push(`UID:lokal-${event.sourceId || event.id}-${recurrence.freq.toLowerCase()}@lokal.app`);
  lines.push(`DTSTAMP:${icsStampUtc(new Date())}`);
  if (hasTime) {
    const end = new Date(start.getTime() + 2 * 60 * 60 * 1000);
    lines.push(`DTSTART:${icsStamp(start)}`, `DTEND:${icsStamp(end)}`);
  } else {
    const p = n => String(n).padStart(2, "0");
    lines.push(`DTSTART;VALUE=DATE:${start.getFullYear()}${p(start.getMonth() + 1)}${p(start.getDate())}`);
  }
  lines.push(`RRULE:${rrule.join(";")}`);
  lines.push(`SUMMARY:${icsEscape(event.title)}`);
  lines.push(`DESCRIPTION:${icsEscape(description)}`);
  lines.push(`LOCATION:${icsEscape(eventLocationLine(event))}`);
  lines.push("END:VEVENT", "END:VCALENDAR");
  return lines.join("\r\n");
}

function downloadIcsFile(filename, content) {
  const blob = new Blob([content], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function eventCalendarStart(event) {
  if (Number.isFinite(event.startSort) && event.startSort !== Number.MAX_SAFE_INTEGER) return new Date(event.startSort);
  if (/^\d{4}-\d{2}-\d{2}$/.test(String(event.startDate || ""))) return new Date(`${event.startDate}T${String(event.startHour || 9).padStart(2, "0")}:00:00`);
  return null;
}

function buildSingleEventIcs(event) {
  const start = eventCalendarStart(event);
  if (!start) return null;
  const end = new Date(start.getTime() + 2 * 60 * 60 * 1000);
  const description = [String(event.desc || "").replace(/<[^>]*>/g, "").trim(), lokalEventShareUrl(event)].filter(Boolean).join("\n");
  const lines = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Lokal//DC Events//EN", "CALSCALE:GREGORIAN", "BEGIN:VEVENT"];
  lines.push(`UID:lokal-${event.sourceId || event.id}-single@lokal.app`);
  lines.push(`DTSTAMP:${icsStampUtc(new Date())}`);
  lines.push(`DTSTART:${icsStamp(start)}`, `DTEND:${icsStamp(end)}`);
  lines.push(`SUMMARY:${icsEscape(event.title)}`);
  lines.push(`DESCRIPTION:${icsEscape(description)}`);
  lines.push(`LOCATION:${icsEscape(eventLocationLine(event))}`);
  lines.push("END:VEVENT", "END:VCALENDAR");
  return lines.join("\r\n");
}

function googleCalendarUrl(event) {
  const start = eventCalendarStart(event);
  if (!start) return "";
  const end = new Date(start.getTime() + 2 * 60 * 60 * 1000);
  const recurrence = eventRecurrence(event);
  const params = new URLSearchParams({
    action: "TEMPLATE",
    text: event.title || "Lokal event",
    dates: `${icsStampUtc(start)}/${icsStampUtc(end)}`,
    details: [String(event.desc || "").replace(/<[^>]*>/g, "").trim(), lokalEventShareUrl(event)].filter(Boolean).join("\n"),
    location: eventLocationLine(event)
  });
  if (recurrence) {
    const rrule = [`FREQ=${recurrence.freq}`];
    if (recurrence.interval > 1) rrule.push(`INTERVAL=${recurrence.interval}`);
    if (recurrence.byday?.length) rrule.push(`BYDAY=${recurrence.byday.join(",")}`);
    params.set("recur", `RRULE:${rrule.join(";")}`);
  }
  return `https://calendar.google.com/calendar/render?${params.toString()}`;
}

function addEventToCalendar(id, provider = "apple") {
  const event = events.find(item => item.id === Number(id));
  if (!event) return;
  if (provider === "google") {
    const url = googleCalendarUrl(event);
    if (!url) { toast("This event is missing a date to schedule."); return; }
    window.open(url, "_blank", "noopener,noreferrer") || window.location.assign(url);
    return;
  }
  const recurrence = eventRecurrence(event);
  const ics = recurrence ? buildEventIcs(event, recurrence) : buildSingleEventIcs(event);
  if (!ics) { toast("This event is missing a date to schedule."); return; }
  const slug = String(event.title || "event").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 40) || "event";
  downloadIcsFile(`${slug}.ics`, ics);
  toast(recurrence ? `Calendar file ready â€” repeats ${recurrence.label}.` : "Calendar file ready.");
}

function addRecurringEventToCalendar(id) {
  const event = events.find(item => item.id === Number(id));
  if (!event) return;
  const recurrence = eventRecurrence(event);
  if (!recurrence) { toast("This event doesn't repeat on a set schedule."); return; }
  const ics = buildEventIcs(event, recurrence);
  if (!ics) { toast("This event is missing a date to schedule."); return; }
  const slug = String(event.title || "event").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 40) || "event";
  downloadIcsFile(`${slug}.ics`, ics);
  toast(`Added to your calendar â€” repeats ${recurrence.label}.`);
}

function toast(message) {

function showWelcomeBanner() {
  if (!localStorage.getItem("lokalAccountCreated") || document.querySelector(".onboarding")) return;

  if (existing) existing.remove();
  const firstName = state.profile.fullName.split(" ")[0] || "there";
  document.body.insertAdjacentHTML("afterbegin", `<div class="welcome-banner">Keep Exploring, <span>${escapeHtml(firstName)}</span></div>`);

function showDiscoverHint() {
  if (localStorage.getItem("lokalOnboardingShown")) return;
  if (!localStorage.getItem("lokalAccountCreated")) return;
  if (document.querySelector(".onboarding") || document.querySelector(".discover-hint")) return;

  document.body.insertAdjacentHTML("beforeend", `<div class="discover-hint" role="status"><p>Tap any event to save it, RSVP, or share with friends. Use the chips above to filter by what you're in the mood for.</p></div>`);

function setRoute(route) {
  if (route === "map") route = "home";
  state.route = route;
  document.querySelectorAll(".nav-item").forEach(b => b.classList.toggle("active", b.dataset.route === route));
  ({ home: renderHome, social: renderSocial, profile: renderProfile }[route] || renderHome)();
}

function resetAppScroll() {
  const scrollers = [
    window,
    document.scrollingElement,
    document.documentElement,
    document.body,
    document.querySelector(".demo-stage"),
    document.querySelector(".app-shell"),
    document.querySelector("#app")
  ].filter(Boolean);
  const reset = () => scrollers.forEach(scroller => {
    if (scroller === window) scroller.scrollTo({ top: 0, left: 0, behavior: "auto" });
    else {
      scroller.scrollTop = 0;
      scroller.scrollLeft = 0;
    }
  });
  reset();
  requestAnimationFrame(reset);
  setTimeout(reset, 80);
}
