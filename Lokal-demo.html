  font-weight: 800;
}
.taste-edit-chip { font-weight: 800; }

/* Attendance history */
.attend-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 10px;
  margin-top: 6px;
}
.attend-head h2 { margin: 0; }
.attend-head .text-button { flex: 0 0 auto; color: var(--accent-strong); }
.attend-list { display: grid; gap: 8px; margin-top: 12px; }
.attend-row {
  display: grid;
  grid-template-columns: 54px 1fr;
  gap: 12px;
  align-items: center;
  width: 100%;
  padding: 8px;
  border: 1px solid rgba(58, 124, 165, .13);
  border-radius: 13px;
  background: #fff;
  text-align: left;
  transition: border-color .15s ease, transform .15s ease;
}
.attend-row:hover { border-color: var(--accent); }
.attend-thumb {
  width: 54px;
  height: 54px;
  border-radius: 10px;
  background-position: center;
  background-size: cover;
}
.attend-copy { display: grid; gap: 3px; min-width: 0; }
.attend-copy b { font-size: 16px; font-weight: 800; line-height: 1.1; }
.attend-copy small { color: var(--muted); font-size: 11px; text-transform: capitalize; }
.attend-month { margin: 16px 0 2px; color: var(--accent-strong); }
.view-all-receipts { display: block; margin: 12px auto 0; color: var(--accent-strong); font-weight: 900; }

/* ---- Category-detail page cards stay full-bleed too ---- */
.category-list-page .category-event-list { display: grid; gap: 12px; }
.category-list-page .event-card { min-height: 168px; }

/* ============================================================
   CHANGE 1 (v2) â€” Discover header: bigger logo, cover title,
   larger stories avatars, search moved below chips
   ============================================================ */
.topbar { height: 86px; }
.topbar .brand b { font-size: 42px; line-height: .88; letter-spacing: 2.5px; }
.topbar .brand small { margin-top: 5px; font-size: 9px; }

.discover-cover { margin-bottom: 18px; }
.discover-cover h1 { margin-bottom: 4px; font-size: 56px; line-height: .9; }
.discover-cover .eyebrow { margin-bottom: 7px; }

.activity-strip { margin-bottom: 18px; }
.activity-chip { width: 78px; }
.activity-ring { width: 66px; height: 66px; }
.activity-ring .avatar { width: 56px; height: 56px; font-size: 17px; }
.activity-chip b { font-size: 13px; }

.discover-search-box { margin-top: 4px; margin-bottom: 10px; }

/* ============================================================
   CHANGE 2 (v2) â€” all-occurrences list in the detail modal
   ============================================================ */
.detail-occurrences { margin: 16px 0 4px; }
.detail-occurrences .eyebrow { margin-bottom: 8px; }
.occurrence-list { display: grid; gap: 7px; }
.occurrence-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  width: 100%;
  padding: 11px 12px;
  border: 1px solid rgba(58, 124, 165, .16);
  border-radius: 12px;
  background: #f5f7fa;
  text-align: left;
}
.occurrence-row:hover { border-color: var(--accent); }
.occurrence-row span { font-size: 12px; font-weight: 800; }
.occurrence-row small { color: var(--muted); font-size: 10px; }
.occurrence-row.current { border-color: var(--accent); background: rgba(0, 201, 167, .08); }

/* ============================================================
   CHANGE 4 (v2) â€” floating / bobbing attendance receipts
   ============================================================ */
@keyframes receiptRise {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes receiptBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}
.attend-row {
  animation: receiptRise .4s ease-out backwards, receiptBob 4.2s ease-in-out infinite;
  /* entrance cascades slightly; the slow bob is staggered 0.3s per card */
  animation-delay: calc(var(--i, 0) * .08s), calc(.4s + var(--i, 0) * .3s);
  will-change: transform;
}
@media (prefers-reduced-motion: reduce) {
  .attend-row { animation: none; }
}

/* ============================================================
   Hero-then-list feed layout (category pages + Discover home).
   Adapted from the "category feed" brief; keeps the teal system.
   ============================================================ */
.hero-list { display: grid; gap: 0; }
.feed-count { margin: 2px 0 12px; color: var(--muted); font-size: 12px; }
.section-label.more-near-you {
  margin: 16px 2px 8px;
  color: #9A9A8A;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
}

/* hero urgency rendered as dot + text (no pill) */
.event-card-urgency-dot { display: inline-flex; align-items: center; gap: 5px; justify-self: start; font-size: 11px; font-weight: 700; }
.event-card-urgency-dot i { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.event-card-urgency-dot.urgency-spots { color: #ff8088; }
.event-card-urgency-dot.urgency-fast { color: #ffb088; }
.event-card-urgency-dot.urgency-free { color: #19e6c4; }

/* compact list rows */
.list-group { display: grid; overflow: hidden; border-radius: 14px; box-shadow: 0 3px 10px rgba(17, 24, 39, .05); }
.event-list-row {
  position: relative;
  display: grid;
  grid-template-columns: 54px 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border: 1px solid rgba(58, 124, 165, .13);
  border-top: 0;
  background: #fff;
  text-align: left;
}
.event-list-row.is-first { border-top: 1px solid rgba(58, 124, 165, .13); border-radius: 14px 14px 0 0; }
.event-list-row.is-last { border-radius: 0 0 14px 14px; }
.event-list-row:hover { background: #fbfdfc; }
.event-list-hit { position: absolute; inset: 0; z-index: 1; width: 100%; height: 100%; background: transparent; }
.elr-thumb { width: 54px; height: 54px; border-radius: 10px; background-position: center; background-size: cover; }
.elr-copy { display: grid; gap: 3px; min-width: 0; }
.elr-venue {
  font-family: var(--display);
  font-size: 16px;
  font-weight: 700;
  line-height: 1.1;
  color: #1C2B1C;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.elr-meta { overflow: hidden; color: var(--muted); font-size: 12px; text-overflow: ellipsis; white-space: nowrap; }
.elr-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.event-list-row .event-tag {
  padding: 2px 8px;
  border: 0;
  border-radius: 10px;
  background: rgba(0, 201, 167, .12);
  color: var(--accent-strong);
  font-size: 11px;
  font-weight: 700;
}
.elr-side { position: relative; z-index: 2; display: grid; gap: 6px; justify-items: end; pointer-events: none; }
.elr-save {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  border: 1px solid #D6D2C4;
  border-radius: 50%;
  background: #fff;
  color: #8a8a7a;
  pointer-events: auto;
}
.elr-save svg { width: 15px; height: 15px; fill: none; }
.elr-save.is-saved svg { fill: var(--heart); stroke: var(--heart); }
.elr-badge { padding: 3px 8px; border-radius: 8px; font-size: 10px; font-weight: 800; white-space: nowrap; }
.elr-badge.urgency-spots { color: var(--urgent); background: #FDECEC; }
.elr-badge.urgency-fast { color: var(--warm); background: #FFF0E8; }
.elr-badge.urgency-free,
.elr-badge.elr-price { color: var(--accent-strong); background: rgba(0, 201, 167, .12); }

/* ============================================================
   Discover: following stories strip, subtle search, card area
   ============================================================ */
.following-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 4px 2px 8px; }
.following-head .eyebrow { margin: 0; }
.following-rail { display: flex; gap: 10px; margin: 0 -18px 4px; padding: 2px 18px 8px; overflow-x: auto; scrollbar-width: none; }
.following-rail::-webkit-scrollbar { display: none; }
.following-chip {
  display: grid;
  flex: 0 0 auto;
  width: 84px;
  min-height: 0;
  align-content: start;
  justify-items: center;
  gap: 6px;
  padding: 10px 6px;
  border: 1px solid rgba(58, 124, 165, .13);
  border-radius: 14px;
  background: #fff;
  text-align: center;
}
.following-chip .group-icon { width: 48px; height: 48px; border: 2px solid var(--accent); border-radius: 50%; font-size: 18px; }
.following-chip b { font-size: 11px; font-weight: 800; line-height: 1.12; }
.following-chip small { color: var(--accent-strong); font-size: 8px; font-weight: 900; letter-spacing: .04em; text-transform: uppercase; }
.following-hint { margin: 4px 2px 16px; color: var(--muted); font-size: 11px; line-height: 1.4; }

.discover-search-box.subtle-search {
  margin-top: 6px;
  margin-bottom: 14px;
  padding: 15px 18px;
  border-color: rgba(58, 124, 165, .28);
  background: #fff;
  box-shadow: 0 6px 18px rgba(23, 28, 26, .06);
}
.discover-search-box.subtle-search span { font-size: 22px; }
.discover-search-box.subtle-search input { font-size: 16px; }

.event-card-loc { color: rgba(255, 255, 255, .9); font-size: 11px; font-weight: 700; }

/* ============================================================
   Event detail: RSVP/Save feedback, hint, social urgency
   ============================================================ */
.rsvp-hint { margin: -6px 0 14px; color: var(--muted); font-size: 11px; text-align: center; }
@keyframes btnPop { 0% { transform: scale(1); } 40% { transform: scale(1.08); } 100% { transform: scale(1); } }
.btn-pop { animation: btnPop .32s ease; }
.action.rsvp-action.selected { background: var(--accent); color: #fff; }
/* "people going" â€” friendly/teal instead of scarcity red */
.event-card-urgency.urgency-going { color: #fff; background: var(--accent); }
.event-card-urgency-dot.urgency-going { color: #19e6c4; }
.elr-badge.urgency-going { color: var(--accent-strong); background: rgba(0, 201, 167, .12); }
@media (prefers-reduced-motion: reduce) { .btn-pop { animation: none; } }

/* ============================================================
   Saved tab: section explainers, empty state, calendar explore
   ============================================================ */
.section-subnote { margin: -6px 0 11px; color: var(--muted); font-size: 12px; line-height: 1.4; }
.saved-empty {
  display: grid;
  justify-items: center;
  gap: 8px;
  padding: 24px 16px;
  border: 1px dashed rgba(58, 124, 165, .24);
  border-radius: 16px;
  background: rgba(255, 255, 255, .6);
  text-align: center;
}
.saved-empty-icon { font-size: 40px; line-height: 1; }
.saved-empty h3 { margin: 2px 0 0; font-size: 21px; }
.saved-empty p { max-width: 280px; margin: 0; color: var(--muted); font-size: 13px; line-height: 1.45; }
.saved-empty-cta { width: auto; margin: 8px 0 0; padding: 12px 24px; box-shadow: none; }
.day-explore { padding: 0; color: var(--accent-strong); background: transparent; font-size: 10px; font-weight: 800; }

/* ============================================================
   Profile: score context, taste prompt, invite banner, settings
   ============================================================ */
.score-block { display: block; width: 100%; cursor: pointer; text-align: left; }
.score-context { margin: 9px 0 0; color: var(--muted); font-size: 11px; line-height: 1.4; }
.taste-prompt {
  display: block;
  width: 100%;
  margin: 0 0 10px;
  padding: 11px 13px;
  border: 1px solid rgba(0, 201, 167, .38);
  border-radius: 12px;
  background: rgba(0, 201, 167, .1);
  color: var(--accent-strong);
  font-size: 12px;
  font-weight: 800;
  text-align: left;
}
.profile-taste-chips .taste-pill { padding: 8px 16px; font-size: 13px; }
.invite-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin: 4px 0 22px;
  padding: 13px 14px;
  border-radius: 14px;
  color: #fff;
  background: linear-gradient(135deg, var(--accent), #19c2a6);
}
.invite-banner-copy b { font-size: 13px; }
.invite-banner-copy p { margin: 3px 0 0; font-size: 11px; line-height: 1.35; opacity: .92; }
.invite-banner-btn { flex: 0 0 auto; padding: 9px 14px; border-radius: 999px; color: var(--accent-strong); background: #fff; font-size: 11px; font-weight: 900; }
.settings-group-label { margin: 18px 0 6px; color: var(--muted); font-size: 11px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; }
.settings-divider { margin: 12px 0 0; border: 0; border-top: 1px solid var(--line); }
.settings-danger { display: grid; gap: 2px; margin-top: 16px; }
.settings-minor { padding: 9px; color: var(--muted); background: transparent; font-size: 11px; font-weight: 700; }
.settings-minor.danger { color: #a4564a; }

/* ============================================================
   Font consistency: every event title uses the display font
   ============================================================ */
.planner-main b,
.planner-day-event strong,
.interest-event b,
.message-event-link b,
.direct-chat-row b,
.occurrence-row span,
.share-preview b {
  font-family: var(--display);
  font-weight: 800;
}

/* ============================================================
   Loading skeleton + connection error
   ============================================================ */
.feed-skeleton { display: grid; gap: 12px; }
.skeleton-card {
  position: relative;
  height: 165px;
  overflow: hidden;
  border-radius: 16px;
  background: #e9eef3;
}
.skeleton-card:first-child { height: 200px; }
.skeleton-card::after {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .65), transparent);
  content: "";
  transform: translateX(-100%);
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer { 100% { transform: translateX(100%); } }
.feed-error { display: grid; gap: 12px; padding: 22px 16px; text-align: center; }
.feed-error p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.45; }
.feed-error .wide-button { width: auto; justify-self: center; padding: 11px 22px; }

/* ============================================================
   First-run Discover hint (bottom sheet, auto-dismiss)
   ============================================================ */
.discover-hint {
  position: fixed;
  right: 12px;
  bottom: 84px;
  left: 12px;
  z-index: 70;
  max-width: 600px;
  margin: 0 auto;
  padding: 14px 16px;
  border-radius: 16px;
  color: #fff;
  background: rgba(17, 24, 39, .94);
  box-shadow: 0 12px 30px rgba(17, 24, 39, .25);
  opacity: 0;
  transform: translateY(12px);
  transition: opacity .25s ease, transform .25s ease;
  cursor: pointer;
}
.discover-hint.visible { opacity: 1; transform: translateY(0); }
.discover-hint p { margin: 0; font-size: 12.5px; line-height: 1.45; }

@media (prefers-reduced-motion: reduce) {
  .skeleton-card::after { animation: none; }
  .discover-hint { transition: none; }
}

/* ============================================================
   LANDING-ALIGNED THEME (final overrides)
   Inter + JetBrains Mono, warm cream, neon green + mint glow,
   black pill CTAs, softer shadows, live ticker. Matches
   https://lokal-pulse-dc.base44.app while keeping all logic.
   ============================================================ */
:root {
  --accent: #16A085;
  --accent-strong: #0E7C66;
  --mint: #75F0CB;
  --cream-warm: #F8F6F2;
  --ink-green: #171C1A;
  --display: "Inter", ui-sans-serif, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

/* Warm surfaces + near-black green ink */
html, body { color: var(--ink-green); background: #ece7df; }
.app-shell, .page, main, .onboarding, .demo-stage { background: var(--cream-warm); }
.topbar { background: rgba(248, 246, 242, .92); border-bottom-color: rgba(23, 28, 26, .08); }
.bottom-nav { background: rgba(248, 246, 242, .96); }

/* Inter headings; uppercase, bold page titles like the landing hero */
h1, h2, h3, .brand b { color: var(--ink-green); font-family: var(--display); }
h1 { font-weight: 900; letter-spacing: -.01em; }
h2 { font-weight: 800; letter-spacing: -.01em; }
h3 { font-weight: 800; }
.discover-heading h1, .category-detail-heading h1 { text-transform: uppercase; }
.brand b, .onboard-logo, .intro-art span { color: #16A085; }

/* JetBrains Mono for eyebrows / labels / meta â€” the techy "alive" signature */
.eyebrow, .feed-label, .event-card-meta, .event-card-badge, .feed-count, .sync-note,
.following-chip small, .activity-chip small, .suggestion-type, .stop-label, .rank-badge,
.section-label, .more-near-you, .step-count, .planner-actions span, .elr-meta,
.settings-group-label, .settings-label, .event-card-loc, .elr-badge, .event-card-urgency,
.event-card-urgency-dot, .score-level-tag {
  font-family: var(--mono);
  letter-spacing: .02em;
}
.event-card-badge { font-weight: 700; }

/* Neon-green accent surfaces (replacing the older mint hardcodes) */
.chip.active, .filter-chip.active, .action.selected, .group-type.selected,
.message.me, .follow-button.selected, .hype-button.selected, .select-tile.selected,
.taste-choice.selected, .attended-button.selected, .share-channel,
.profile-avatar, .avatar-me, .group-icon, .feature-card, .stop-card.anchor, .anchor-summary,
.action.rsvp-action.selected, .event-card-urgency.urgency-free, .event-card-urgency.urgency-going,
.invite-banner-btn { color: #fff; }
.chip.active, .filter-chip.active, .action.selected, .group-type.selected,
.message.me, .follow-button.selected, .hype-button.selected, .select-tile.selected,
.taste-choice.selected, .attended-button.selected, .share-channel,
.profile-avatar, .avatar-me, .group-icon, .feature-card, .stop-card.anchor, .anchor-summary,
.action.rsvp-action.selected, .privacy-toggle input,
.event-card-urgency.urgency-free, .event-card-urgency.urgency-going { background: #16A085; }
.privacy-toggle input { accent-color: #16A085; }
.nav-item.active { color: #0E7C66; }
.lokal-score, .score-level-tag { color: #0E7C66; background: rgba(22, 160, 133, .14); }
.activity-ring, .following-chip .group-icon, .community-card.pinned { border-color: #16A085; }
.chip.active, .filter-chip.active { box-shadow: inset 0 -3px 0 #16A085; }
.invite-banner { background: linear-gradient(135deg, #16A085, #0E7C66); }
.invite-banner-btn { color: #0E7C66; background: #fff; }

/* Mint glow on the live elements */
.score-big { color: #16A085; text-shadow: 0 0 22px rgba(22, 160, 133, .35); }
.nav-item.active svg { filter: drop-shadow(0 0 6px rgba(22, 160, 133, .55)); }
.activity-ring { box-shadow: 0 0 0 3px rgba(22, 160, 133, .12); }

/* Black pill primary CTAs (landing "GET EARLY ACCESS" signature) */
.wide-button, .primary, .explore-cta, .saved-empty-cta { color: #fff; background: var(--ink-green); }
.wide-button:hover, .primary:hover, .explore-cta:hover, .saved-empty-cta:hover { background: #07140d; }
.explore-cta { box-shadow: 0 10px 26px rgba(23, 28, 26, .2); }
/* fully-rounded pills everywhere */
.wide-button, .primary, .explore-cta, .saved-empty-cta, .invite-banner-btn,
.share-shortcut, .filter-button, .chip, .filter-chip, .action, .secondary,
.detail-pill, .route-badge, .follow-button, .group-access, .hype-button,
.back-button, .public-member-count, .taste-strip span, .taste-pill, .filter-options button,
.request-actions button, .planner-actions span, .elr-badge {
  border-radius: 999px;
}

/* Softer, larger diffuse shadows (landing depth) */
.event-card, .event-list-row, .list-group, .score-block, .following-chip, .community-card,
.follow-card, .stat-card, .activity-card, .group-card, .managed-list-row, .planner-card,
.attend-row, .share-group, .ranking-card, .suggestion-card, .feature-card {
  box-shadow: 0 8px 30px rgba(23, 28, 26, .07);
}
.event-card { border-radius: 16px; }
.search-box { border-color: rgba(23, 28, 26, .1); background: rgba(255, 255, 255, .85); }

/* Live event ticker */
.live-ticker {
  position: relative;
  margin: 2px -18px 14px;
  padding: 9px 0;
  overflow: hidden;
  border-top: 1px solid rgba(23, 28, 26, .08);
  border-bottom: 1px solid rgba(23, 28, 26, .08);
  background: rgba(22, 160, 133, .06);
  -webkit-mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent);
  mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent);
}
.live-ticker-track {
  display: inline-flex;
  gap: 26px;
  padding-left: 18px;
  white-space: nowrap;
  color: var(--ink-green);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  animation: tickerScroll 90s linear infinite;
}
.live-ticker-track span { display: inline-flex; align-items: center; gap: 7px; }
.live-ticker-track i { width: 5px; height: 5px; border-radius: 50%; background: #16A085; box-shadow: 0 0 8px rgba(22, 160, 133, .8); }
@keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
@media (prefers-reduced-motion: reduce) { .live-ticker-track { animation: none; } }

/* ============================================================
   Feed "View more", taller Saved calendar days, alive Profile
   ============================================================ */
.view-more-feed {
  display: block;
  width: 100%;
  margin: 10px 0 2px;
  padding: 12px;
  border: 1px solid rgba(22, 160, 133, .35);
  border-radius: 999px;
  color: var(--accent-strong);
  background: rgba(22, 160, 133, .08);
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .02em;
}
.view-more-feed:hover { background: rgba(22, 160, 133, .15); }

/* Saved calendar: show the full week at once (all 7 days, no horizontal scroll),
   with taller cells so multiple events per day are easy to see. */
.planner-calendar { grid-template-columns: repeat(7, 1fr); gap: 5px; overflow-x: visible; }
.planner-day { min-height: 220px; padding: 6px 5px; }
.planner-day-head b { font-size: 13px; }
.planner-day-head span { font-size: 7px; }
.planner-day-events { gap: 5px; }
.planner-day-event { grid-template-columns: 6px 1fr; gap: 5px; padding: 5px; }
.planner-day-event strong { font-size: 9px; line-height: 1.15; }
.planner-day-event small { font-size: 8px; }
.day-explore { font-size: 9px; }

/* Followable venue result in Discover search + venue sheet */
.venue-result { justify-content: space-between; }
.venue-result .group-icon { width: 40px; height: 40px; border-radius: 12px; font-size: 16px; }
.venue-follow-btn { display: inline-flex; margin: 2px 0 4px; padding: 9px 18px; }

/* ============================================================
   Event card v3 â€” image on top, text below (no text over photo)
   ============================================================ */
.event-card {
  display: grid;
  grid-template-rows: auto auto;
  min-height: 0;
  overflow: hidden;
  border: 1px solid rgba(58, 124, 165, .12);
  border-radius: 16px;
  background: #fff;
  background-image: none !important;
  box-shadow: 0 8px 30px rgba(23, 28, 26, .07);
  text-align: left;
  isolation: isolate;
}
.event-card:hover { transform: translateY(-2px); box-shadow: 0 12px 34px rgba(23, 28, 26, .12); }
.event-card-media {
  position: relative;
  height: 172px;
  background-color: var(--accent);
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;
}
.event-card-media .event-card-hit { position: absolute; inset: 0; z-index: 1; width: 100%; height: 100%; background: transparent; }
.event-card-actions { position: absolute; top: 9px; right: 9px; bottom: auto; left: auto; z-index: 2; display: flex; align-items: center; gap: 6px; pointer-events: none; }
.event-card-actions .card-icon-btn { pointer-events: auto; }
.event-card-body {
  display: grid;
  gap: 5px;
  width: 100%;
  padding: 12px 13px 13px;
  background: #fff;
  text-align: left;
  cursor: pointer;
}
.event-card-toprow { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
.event-card-cat { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
.event-card-meta { color: var(--muted); font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .02em; text-transform: uppercase; }
.event-card-title { margin: 1px 0 0; color: var(--ink-green); font-family: var(--display); font-size: 19px; font-weight: 800; line-height: 1.08; text-shadow: none; }
.event-card-loc { color: var(--muted); font-size: 12px; font-weight: 600; }
.event-card-tagrow { display: flex; flex-wrap: wrap; align-items: center; gap: 7px; margin-top: 3px; }
.event-card .event-tag { padding: 3px 9px; border: 0; border-radius: 999px; background: rgba(22, 160, 133, .12); color: var(--accent-strong); font-size: 10px; font-weight: 700; }
.event-card-urgency { padding: 3px 9px; border-radius: 999px; font-size: 9px; font-weight: 900; letter-spacing: .04em; text-transform: uppercase; }
.event-card-urgency.urgency-spots { color: #fff; background: var(--urgent); }
.event-card-urgency.urgency-fast { color: #fff; background: var(--warm); }
.event-card-urgency.urgency-free, .event-card-urgency.urgency-going { color: #fff; background: var(--accent); }
.event-card .card-friends { display: flex; }
.event-card .card-friend-avatar {
  display: grid;
  place-items: center;
  width: 18px;
  height: 18px;
  margin-left: -5px;
  border: 1.5px solid #fff;
  border-radius: 50%;
  color: #fff;
  background: var(--accent);
  font-size: 7px;
  font-weight: 900;
}
.event-card .card-friend-avatar:first-child { margin-left: 0; }

/* Paginated feed stack + sub-filters */
.feed-stack { display: grid; gap: 14px; }
.tonight-section .feed-stack { gap: 12px; }
.sub-filters { display: grid; gap: 6px; margin: 0 0 10px; }
.sub-filter-row { display: flex; align-items: center; gap: 7px; overflow-x: auto; padding: 1px 1px 4px; scrollbar-width: none; }
.sub-filter-row::-webkit-scrollbar { display: none; }
.sub-filter-row .filter-chip { flex: 0 0 auto; padding: 6px 11px; font-size: 10px; }
.sub-filter-label { flex: 0 0 auto; margin-right: 2px; color: var(--muted); font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
.sub-filter-row .pick-chip { border-style: dashed; }
.view-more-feed { margin-top: 12px; }

/* Refresh as an icon (was a text button) */
.icon-refresh { display: inline-grid; place-items: center; width: 26px; height: 26px; padding: 0; border: 0; border-radius: 8px; background: transparent; color: var(--accent-strong); cursor: pointer; }
.icon-refresh svg { width: 15px; height: 15px; }
.icon-refresh:hover { background: rgba(22, 160, 133, .12); }

/* Collapsed When/Where/Type filter pills + dropdown panel */
.filter-pills { display: flex; gap: 8px; }
.filter-pill { flex: 1 1 0; min-width: 0; display: inline-flex; align-items: center; justify-content: flex-start; gap: 6px; padding: 8px 12px; border: 1px solid rgba(58, 124, 165, .22); border-radius: 999px; background: #fff; color: var(--ink-green); font-family: var(--display); font-size: 12px; font-weight: 600; cursor: pointer; }
.pill-count { flex: 0 0 auto; display: inline-grid; place-items: center; min-width: 16px; height: 16px; margin-left: auto; padding: 0 4px; border-radius: 999px; background: var(--accent-strong); color: #fff; font-family: var(--mono); font-size: 9px; font-weight: 800; }
.filter-pill-wrap { position: relative; flex: 1 1 0; min-width: 0; display: flex; }
.filter-pill-wrap .filter-pill { flex: 1 1 0; width: 100%; }
.filter-dropdown { position: absolute; top: calc(100% + 8px); left: 0; z-index: 50; width: max-content; min-width: 210px; max-width: min(320px, 90vw); margin-top: 0; }
.filter-dropdown.align-end { left: auto; right: 0; }
.check-list { display: grid; gap: 2px; }
.check-list-scroll { max-height: 246px; overflow-y: auto; }
.check-row { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px; border: 0; border-radius: 9px; background: transparent; color: var(--ink-green); font-family: var(--display); font-size: 13px; font-weight: 600; text-align: left; cursor: pointer; }
.check-row:hover { background: rgba(22, 160, 133, .08); }
.check-row.checked { color: var(--accent-strong); }
.check-box { flex: 0 0 auto; display: grid; place-items: center; width: 18px; height: 18px; border: 1.5px solid rgba(58, 124, 165, .32); border-radius: 6px; background: #fff; }
.check-row.checked .check-box { border-color: var(--accent-strong); background: var(--accent-strong); }
.check-box svg { width: 12px; height: 12px; color: #fff; stroke-width: 3; }
.dropdown-clear { margin-top: 4px; padding: 6px 4px; border: 0; border-radius: 8px; background: transparent; color: var(--muted); font-size: 11px; font-weight: 700; text-align: left; cursor: pointer; }
.dropdown-clear:hover { color: var(--accent-strong); }
.filter-pill svg { width: 14px; height: 14px; flex: 0 0 auto; color: var(--muted); }
.filter-pill span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.filter-pill .pill-caret { width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 5px solid currentColor; opacity: .5; transition: transform .18s ease; }
.filter-pill.open { border-color: var(--accent-strong); }
.filter-pill.open .pill-caret { transform: rotate(180deg); }
.filter-pill.has-value { border-color: var(--accent-strong); background: rgba(22, 160, 133, .1); }
.filter-pill.has-value svg { color: var(--accent-strong); }
.filter-panel { margin-top: 9px; padding: 11px 12px; border: 1px solid rgba(58, 124, 165, .16); border-radius: 14px; background: #fff; box-shadow: 0 8px 26px rgba(23, 28, 26, .07); display: grid; gap: 10px; }
.filter-group { display: grid; gap: 6px; }
.filter-group-head { display: inline-flex; align-items: center; gap: 5px; color: var(--muted); font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
.filter-group-head svg { width: 12px; height: 12px; }
.filter-chip-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
.filter-chip-wrap .filter-chip { flex: 0 0 auto; padding: 6px 11px; font-size: 10px; }
.filter-chip-wrap .pick-chip { border-style: dashed; }

/* Inline "Saved" confirmation on the card save button (replaces the save toast) */
.card-save { position: relative; }
.card-save.just-saved::after {
  content: "Saved \2713";
  position: absolute;
  top: calc(100% + 5px);
  right: 0;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--accent-strong);
  color: #fff;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  white-space: nowrap;
  pointer-events: none;
  z-index: 6;
  animation: savedPop 1.5s ease forwards;
}
@keyframes savedPop { 0% { opacity: 0; transform: translateY(-4px) scale(.85); } 14% { opacity: 1; transform: translateY(0) scale(1); } 78% { opacity: 1; } 100% { opacity: 0; transform: translateY(-2px); } }

/* Demote the sync/status line so it reads as quiet metadata */
.sync-note { margin: 4px 2px 10px; padding: 0; border: 0; background: transparent; font-size: 10px; color: var(--muted); opacity: .7; }
.sync-note span { font-family: var(--mono); letter-spacing: .01em; }
.sync-note .icon-refresh { width: 22px; height: 22px; color: var(--muted); }
.sync-note .icon-refresh svg { width: 13px; height: 13px; }

/* Masonry feed: cards size to their image (variable height), multiple per row */
.feed-masonry { columns: 174px; column-gap: 12px; }
.feed-masonry .event-card { width: 100%; margin: 0 0 12px; break-inside: avoid; -webkit-column-break-inside: avoid; }
.event-card-media { height: auto; min-height: 0; }
.event-card-img { display: block; width: 100%; height: auto; }
.event-card-title { font-size: 16px; }
.event-card-body { padding: 10px 11px 11px; }
.event-card-reason {
  align-self: start;
  margin-bottom: 2px;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(22, 160, 133, .12);
  color: var(--accent-strong);
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .02em;
}
.event-card-reason::before { content: "\2605  "; }

/* Happening Today â€” DC photo with events popping up across the city */
.tonight-map { margin: 0 -18px 16px; }
.tonight-map .tonight-head { margin: 0; padding: 14px 18px 10px; }
.tonight-canvas {
  position: relative;
  height: 300px;
  overflow: hidden;
  background-image: linear-gradient(160deg, rgba(8, 20, 14, .48), rgba(8, 20, 14, .8)), url("https://images.unsplash.com/photo-1501466044931-62695aada8e9?w=1200&q=80&auto=format&fit=crop");
  background-position: center;
  background-size: cover;
}
.tonight-pin {
  position: absolute;
  max-width: 72%;
  padding: 7px 11px;
  overflow: hidden;
  border: 1px solid rgba(22, 160, 133, .45);
  border-radius: 999px;
  color: #fff;
  background: rgba(8, 24, 16, .82);
  box-shadow: 0 6px 18px rgba(0, 0, 0, .4);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .02em;
  white-space: nowrap;
  text-overflow: ellipsis;
  opacity: 0;
  transform: translate(-50%, -50%) scale(.6);
  animation: pinPop .55s cubic-bezier(.2, .9, .3, 1.4) forwards, pinFloat 5.5s ease-in-out infinite;
  cursor: pointer;
}
.tonight-pin:hover { border-color: #16A085; background: rgba(8, 24, 16, .92); }
.tonight-pin-dot { display: inline-block; width: 6px; height: 6px; margin-right: 6px; vertical-align: middle; border-radius: 50%; background: #16A085; box-shadow: 0 0 8px rgba(22, 160, 133, .9); }
@keyframes pinPop { to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
@keyframes pinFloat { 0%, 100% { margin-top: 0; } 50% { margin-top: -7px; } }
@media (prefers-reduced-motion: reduce) { .tonight-pin { animation: none; opacity: 1; transform: translate(-50%, -50%); } }

/* Profile, alive */
@keyframes scoreGlow { 0%, 100% { text-shadow: 0 0 20px rgba(22, 160, 133, .3); } 50% { text-shadow: 0 0 34px rgba(22, 160, 133, .6); } }
@keyframes barGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
@keyframes riseIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes avatarPop { 0% { transform: scale(.85); opacity: 0; } 60% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
.profile-page .score-big { animation: scoreGlow 3s ease-in-out infinite; }
.profile-page .score-progress i { transform-origin: left; animation: barGrow .9s cubic-bezier(.2, .8, .2, 1) both; }
.profile-page .profile-avatar { animation: avatarPop .5s ease-out both; }
.profile-page .profile-card,
.profile-page .score-block,
.profile-page .profile-taste-chips,
.profile-page .invite-banner,
.profile-page .attend-head,
.profile-page .attend-list { animation: riseIn .5s ease-out both; }
.profile-page .profile-card { animation-delay: .03s; }
.profile-page .score-block { animation-delay: .09s; }
.profile-page .profile-taste-chips { animation-delay: .15s; }
.profile-page .invite-banner { animation-delay: .19s; }
.profile-page .attend-head { animation-delay: .23s; }
.profile-page .attend-list { animation-delay: .27s; }
.profile-page .score-level-tag { animation: scoreGlow 3s ease-in-out infinite; }

@media (prefers-reduced-motion: reduce) {
  .profile-page .score-big,
  .profile-page .score-progress i,
  .profile-page .profile-avatar,
  .profile-page .score-level-tag,
  .profile-page .profile-card,
  .profile-page .score-block,
  .profile-page .profile-taste-chips,
  .profile-page .invite-banner,
  .profile-page .attend-head,
  .profile-page .attend-list { animation: none; }
}
/* Compact Discover filters: final cascade override. */
.discover-page > .chips {
  gap: 4px;
  margin: 0 -18px 2px;
  padding: 0 18px 4px;
}
.discover-page > .chips .chip,
.discover-page .sub-filter-row .filter-chip {
  min-height: 24px;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 8.5px;
  line-height: 1;
  letter-spacing: 0;
  white-space: nowrap;
}
.discover-page .sub-filters {
  gap: 1px;
  margin: -2px -18px 4px;
}
.discover-page .sub-filter-row {
  gap: 4px;
  padding: 0 18px 3px;
  scroll-padding-inline: 18px;
}
.discover-page .sub-filter-label {
  margin-right: -1px;
  font-size: 7.5px;
  letter-spacing: .035em;
}
.discover-page .sub-filter-row .pick-chip {
  padding-inline: 8px;
}
.discover-page .discover-search-box.subtle-search {
  min-height: 56px;
  margin: 6px 0 14px;
  padding: 15px 18px;
  border-radius: 16px;
}
.discover-page .discover-search-box.subtle-search span {
  font-size: 22px;
}
.discover-page .discover-search-box.subtle-search input {
  font-size: 16px;
}
.discover-page .sync-note {
  margin-bottom: 6px;
  padding: 4px 7px;
  font-size: 9.5px;
}
.discover-page .date-time-filter-row .time-label {
  margin-left: 7px;
  padding-left: 8px;
  border-left: 1px solid rgba(23, 28, 26, .14);
}
/* Modal media uses real images so venue/event photos do not crop or shift after click. */
.detail-hero.has-image,
.venue-page-hero.has-image {
  position: relative;
  overflow: hidden;
  isolation: isolate;
  background: #f7fafc !important;
}
.detail-hero.has-image::after,
.venue-page-hero.has-image::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;
  background: linear-gradient(180deg, rgba(13, 24, 22, 0), rgba(13, 24, 22, .58));
  pointer-events: none;
}
.detail-hero-img,
.venue-page-img {
  position: absolute;
  inset: 0;
  z-index: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
  background: #f7fafc;
}
.detail-hero.has-image > :not(.detail-hero-img):not(.modal-close),
.venue-page-hero.has-image > :not(.venue-page-img) {
  position: relative;
  z-index: 2;
}
.detail-hero.has-image > .modal-close {
  position: absolute;
  z-index: 3;
}
.venue-page-hero.has-image {
  min-height: 210px;
}
.venue-event-row {
  width: 100%;
  text-align: left;
  cursor: pointer;
}
.venue-event-row:hover {
  background: rgba(22, 160, 133, .12);
}

/* ===== Onboarding: immersive welcome + animated steps ===== */
/* Step 0 â€” full-bleed Capitol photo, animated rotating message, single CTA. */
.onboard-immersive {
  padding: 0;
  align-items: stretch;
  justify-items: stretch;
  overflow: hidden;
  background: #0a1712;
}
.welcome-bg {
  position: absolute;
  inset: -6%;
  z-index: 0;
  background-image: url("https://images.unsplash.com/photo-1501466044931-62695aada8e9?w=1400&q=80&auto=format&fit=crop");
  background-position: center 38%;
  background-size: cover;
  transform: scale(1.08);
  animation: welcomeKen 26s ease-in-out infinite alternate;
}
.welcome-scrim {
  position: absolute;
  inset: 0;
  z-index: 1;
  background:
    radial-gradient(120% 80% at 50% 8%, rgba(22, 160, 133, .18), transparent 60%),
    linear-gradient(180deg, rgba(6, 16, 12, .30) 0%, rgba(6, 16, 12, .58) 46%, rgba(5, 12, 9, .96) 100%);
  pointer-events: none;
}
.welcome-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  min-height: 100%;
  padding: max(30px, env(safe-area-inset-top)) 26px max(34px, env(safe-area-inset-bottom));
  color: #fff;
}
.welcome-top {
  display: flex;
  align-items: baseline;
  gap: 10px;
  animation: riseIn .7s ease-out both;
}
.welcome-brand {
  font-family: var(--display, "Aptos Display", sans-serif);
  font-size: 22px;
  font-weight: 900;
  letter-spacing: .22em;
}
.welcome-place {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, .72);
}
.welcome-message {
  margin-top: auto;
  margin-bottom: 26px;
}
.welcome-eyebrow {
  margin-bottom: 14px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--accent, #16A085);
  animation: riseIn .8s ease-out .1s both;
}
/* Rotating headline: lines stack, each fades/rises in turn on a shared loop. */
.welcome-rotator {
  position: relative;
  min-height: 2.1em;
  font-family: var(--display, "Aptos Display", sans-serif);
  font-size: clamp(30px, 9vw, 42px);
  font-weight: 900;
  line-height: 1.04;
  letter-spacing: -.01em;
}
.welcome-rotator span {
  position: absolute;
  inset: 0;
  opacity: 0;
  transform: translateY(16px);
  filter: blur(6px);
  animation: welcomeRotate 13s cubic-bezier(.2, .8, .2, 1) infinite;
}
.welcome-rotator span:nth-child(1) { animation-delay: 0s; }
.welcome-rotator span:nth-child(2) { animation-delay: 3.25s; }
.welcome-rotator span:nth-child(3) { animation-delay: 6.5s; }
.welcome-rotator span:nth-child(4) { animation-delay: 9.75s; }
.welcome-tagline {
  margin-top: 18px;
  max-width: 22em;
  font-size: 15px;
  line-height: 1.5;
  color: rgba(255, 255, 255, .82);
  animation: riseIn .9s ease-out .2s both;
}
.welcome-cta {
  width: 100%;
  padding: 17px;
  border-radius: 16px;
  color: #06140d;
  background: var(--accent, #16A085);
  font-size: 15px;
  font-weight: 900;
  letter-spacing: .01em;
  box-shadow: 0 14px 34px rgba(22, 160, 133, .34);
  animation: riseIn 1s ease-out .34s both, ctaBreath 3.4s ease-in-out 1.4s infinite;
}
.welcome-cta:hover { background: #0ceaa8; }
.welcome-cta:active { transform: translateY(1px); }

@keyframes welcomeKen {
  from { transform: scale(1.08) translate(0, 0); }
  to   { transform: scale(1.16) translate(-1.5%, -2%); }
}
@keyframes welcomeRotate {
  0%    { opacity: 0; transform: translateY(16px); filter: blur(6px); }
  6%    { opacity: 1; transform: translateY(0); filter: blur(0); }
  22%   { opacity: 1; transform: translateY(0); filter: blur(0); }
  28%   { opacity: 0; transform: translateY(-14px); filter: blur(6px); }
  100%  { opacity: 0; transform: translateY(-14px); filter: blur(6px); }
}
@keyframes ctaBreath {
  0%, 100% { box-shadow: 0 14px 34px rgba(22, 160, 133, .34); }
  50%      { box-shadow: 0 16px 44px rgba(22, 160, 133, .55); }
}

/* Steps 1â€“3 â€” clean cards that slide in, floating labels, staggered tiles. */
.onboard-steps { align-items: start; }
.onboard-step-card {
  width: min(100%, 560px);
  animation: onboardSlide .42s cubic-bezier(.2, .8, .2, 1) both;
}
@keyframes onboardSlide {
  from { opacity: 0; transform: translateX(22px); }
  to   { opacity: 1; transform: translateX(0); }
}
.onboard-head {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 26px;
}
.onboard-back {
  display: grid;
  place-items: center;
  width: 40px;
  height: 40px;
  border: 1px solid var(--line, rgba(23, 28, 26, .14));
  border-radius: 12px;
  font-size: 22px;
  line-height: 1;
  color: var(--ink-green, #171C1A);

// Bare image URL/data-URI for use in an <img> (so cards size to the image's

function eventCardImageSrc(event) {
  if (event.image) return String(event.image);
  const art = genericEventArt(event);
  const match = art.match(/^url\(['"]?([\s\S]*?)['"]?\)$/);
  return match ? match[1] : art;
}

function seededPerformingArtsFallbackTags(seedText) {
  const pool = ["Curtain Call", "Limited Run", "Tour Stop", "Ensemble", "Solo Set", "Matinee", "Late Show", "New Work", "Classic Story", "Reserved Seating"];
  const seed = Array.from(String(seedText || "lokal")).reduce((total, char) => total + char.charCodeAt(0), 0);
  return [pool[seed % pool.length], pool[(seed + 4) % pool.length]];
}

function seededConcertFallbackTags(seedText) {
  const pool = ["Tour Stop", "Club Show", "New Release", "Small Room", "Late Set", "Featured Artist", "Dance Floor", "Local Stage", "Vocal Set", "Deep Cuts"];
  const seed = Array.from(String(seedText || "lokal")).reduce((total, char) => total + char.charCodeAt(0), 0);
  return [pool[seed % pool.length], pool[(seed + 5) % pool.length]];
}

function isMusicGenreTag(tag) {
  return MUSIC_GENRE_TAGS.some(genre => genre.toLowerCase() === String(tag || "").toLowerCase());
}
function seededMusicGenreTag(seedText) {
  const pool = ["Indie", "Rock", "Pop", "Jazz", "R&B", "Electronic", "Folk", "Hip-Hop", "Soul", "Latin", "Singer-Songwriter"];
  const seed = Array.from(String(seedText || "lokal")).reduce((total, char) => total + char.charCodeAt(0), 0);
  return pool[seed % pool.length];
}
function eventTags(event) {

    const clean = tags.filter(tag => !["concert", "concerts", "live music", "music", "arts", "art", "free", "nightlife", "night out"].includes(tag.toLowerCase()));
    const genre = [...clean, ...inferred].find(isMusicGenreTag) || seededMusicGenreTag(`${event.title || ""} ${event.venue || ""} ${event.desc || ""}`);

  const price = String(event.price || "").trim();

  if (!price || /^price unknown$/i.test(price)) return "";
  return price;
}

function eventDisplayTime(event) {
  // Recurring museum exhibits/programs read as "Ongoing"; true one-off museum
  // events (a single occurrence) keep their actual date/time.
  if (String(event.cat || "").toLowerCase() === "museums" && occurrencesForEvent(event).length > 1) return "Ongoing";
  return event.time;
}

function eventMetaLine(event) {
  return [eventDisplayTime(event), eventPriceLabel(event)].filter(Boolean).join(" / ");
}

function primaryEventTag(event) {
  return eventTags(event)[0] || event.tag || event.cat || "Local event";
}

function eventArtLabel(event) {
  const category = String(event.cat || event.category || "").toLowerCase();
  const labels = {
    music: "Concert",
    concerts: "Concert",
    "live-music": "Live music",
    art: "Arts",
    "performing-arts": "Arts",
    museums: "Museums",
    theatre: "Arts",
    theater: "Arts",
    sports: "Sports",
    fitness: "Fitness",
    food: "Food",
    festivals: "Festival",
    community: "Community",
    expos: "Expo",
    nightlife: "Night out",
    "happy-hours": "Happy hour",
    "trivia-nights": "Trivia night"
  };
  if (labels[category]) return labels[category];
  const tagText = eventTags(event).join(" ").toLowerCase();
  const text = `${event.cat || ""} ${event.category || ""} ${event.tag || ""} ${tagText} ${event.title || ""}`.toLowerCase();
  if (/\b(nightlife|nightclub|club|bar|lounge|rooftop|cocktail|dance party|after dark|late night)\b/.test(text)) return "Night out";
  if (/\b(concert|music|pop|rock|jazz|classical|dj|band|singer|songwriter|vinyl)\b/.test(text)) return "Concert";
  if (/\b(museum|smithsonian|hirshhorn|renwick|portrait gallery|american art museum|air and space|natural history|american history)\b/.test(text)) return "Museums";
  if (/\b(theatre|theater|performing|arts?|gallery|comedy|film|cinema)\b/.test(text)) return "Arts";
  if (/\b(baseball|mlb|nba|nfl|nhl|soccer|sports?|game)\b/.test(text)) return "Sports";
  if (/\b(food|drink|wine|beer|cocktail|restaurant|brunch|market)\b/.test(text)) return "Food";
  if (/\b(festival|fair)\b/.test(text)) return "Festival";
  if (/\b(expo|conference|convention)\b/.test(text)) return "Expo";
  if (/\b(run|yoga|fitness|wellness|pickleball)\b/.test(text)) return "Fitness";
  if (/\b(community|volunteer|neighborhood|meetup)\b/.test(text)) return "Community";
  return "Community";
}

function cleanLocationPart(value) {
  const text = String(value || "").trim();
  if (!text || /^location in description$/i.test(text) || /^undefined|null$/i.test(text)) return "";
  return text;
}

function isGenericLocationName(value) {
  return /^(washington,?\s*dc|dc|district of columbia|wharf|shaw|noma|downtown|national mall|u street|h street|navy yard|penn quarter|georgetown|dupont(?: circle)?|logan circle|adams morgan|capitol hill|columbia heights|petworth|brookland|ivy city|foggy bottom|waterfront|southwest|northeast|northwest|southeast|southwest)$/i.test(String(value || "").trim());
}

function venueFromEventDescription(event) {
  const description = String(event?.desc || "").replace(/&amp;/g, "&").trim();
  if (!description) return "";
  const matches = [...description.matchAll(/\bat\s+([A-Z0-9][A-Za-z0-9&'\u2019.,+\- ]{2,80}?)(?:[.!?]|$)/g)];
  for (const match of matches.reverse()) {
    const candidate = cleanLocationPart(match[1].replace(/\s+/g, " ").replace(/[,.;:]+$/g, ""));
    if (candidate && !isGenericLocationName(candidate) && !/^(the )?(source|event|show|door|venue)$/i.test(candidate)) return candidate;
  }
  return "";
}

function eventLocationLine(event) {
  const venue = cleanLocationPart(event.venue);
  const area = cleanLocationPart(event.area);
  const describedVenue = venueFromEventDescription(event);
  const displayVenue = (!venue || venue.toLowerCase() === area.toLowerCase() || isGenericLocationName(venue)) && describedVenue ? describedVenue : venue;
  if (displayVenue && area && displayVenue.toLowerCase() !== area.toLowerCase()) return `${displayVenue} / ${area}`;
  return displayVenue || area || "Washington, DC";
}

function eventNeighborhoodLine(event) {
  return [event.area, event.neighborhood, event.venue_address, event.address, eventLocationLine(event)]
    .map(value => cleanLocationPart(value))
    .filter(Boolean)
    .filter((value, index, all) => all.findIndex(item => item.toLowerCase() === value.toLowerCase()) === index)
    .join(" ");
}

function eventDedupeKey(event) {
  return `${String(event.title || "").trim().toLowerCase().replace(/\s+/g, " ")}|${venueImageKeyName(event.venue || eventLocationLine(event))}`;

// Feed-only dedupe: collapse repeated title+venue occurrences to a single card.
// Assumes `list` is already sorted ascending by start, so the first match kept
// is the next upcoming occurrence.
function dedupeFeedEvents(list) {
  const seen = new Set();
  return list.filter(event => {
    const key = eventDedupeKey(event);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

// All occurrences of the same title+venue across the loaded event set, sorted
// by start. Used by the detail modal so the full recurring schedule stays
// visible even though the feed only shows one card.
function occurrencesForEvent(event) {
  const key = eventDedupeKey(event);
  return events
    .filter(item => eventDedupeKey(item) === key)
    .sort(sortEventsByStart);
}

// --- Recurring-event detection (drives the "add to calendar weekly" button) ---
const ICS_WEEKDAY_CODES = ["SU", "MO", "TU", "WE", "TH", "FR", "SA"];
const ICS_CODE_LABEL = { SU: "Sunday", MO: "Monday", TU: "Tuesday", WE: "Wednesday", TH: "Thursday", FR: "Friday", SA: "Saturday" };
const RECUR_DAY_WORDS = { sunday: "SU", monday: "MO", tuesday: "TU", wednesday: "WE", thursday: "TH", friday: "FR", saturday: "SA" };
const RECUR_ORDINALS = { first: 1, second: 2, third: 3, fourth: 4, fifth: 5, last: -1 };
const RECUR_ORDINAL_LABEL = { 1: "1st", 2: "2nd", 3: "3rd", 4: "4th", 5: "5th", "-1": "last" };

function weekdayCodeFromDate(dateStr) {
  if (!/^\d{4}-\d{2}-\d{2}$/.test(String(dateStr || ""))) return null;
  const date = new Date(`${dateStr}T00:00:00`);
  return Number.isNaN(date.getTime()) ? null : ICS_WEEKDAY_CODES[date.getDay()];
}

function weeklyRecurrenceLabel(codes) {
  const names = codes.map(code => ICS_CODE_LABEL[code]);
  return names.length === 1 ? `every ${names[0]}` : `every ${names.join(" & ")}`;
}

// Infer cadence from the gap between a series' occurrences (e.g. the wharf
// "Grooves in the Grove" rows or "Music in the Circle" every Saturday).
function inferRecurrenceFromOccurrences(event) {
  const times = occurrencesForEvent(event)
    .map(item => (/^\d{4}-\d{2}-\d{2}$/.test(String(item.startDate || "")) ? new Date(`${item.startDate}T00:00:00`).getTime() : NaN))
    .filter(value => !Number.isNaN(value))
    .sort((a, b) => a - b);
  if (times.length < 2) return null;
  const gaps = [];
  for (let i = 1; i < times.length; i++) gaps.push(Math.round((times[i] - times[i - 1]) / 86400000));
  const typical = gaps.slice().sort((a, b) => a - b)[Math.floor(gaps.length / 2)];
  const code = weekdayCodeFromDate(event.startDate);
  if (!code) return null;
  if (typical === 7) return { freq: "WEEKLY", interval: 1, byday: [code], label: `every ${ICS_CODE_LABEL[code]}` };
  if (typical === 14) return { freq: "WEEKLY", interval: 2, byday: [code], label: `every other ${ICS_CODE_LABEL[code]}` };
  if (typical >= 28 && typical <= 31) return { freq: "MONTHLY", interval: 1, byday: [code], label: `monthly on ${ICS_CODE_LABEL[code]}` };
  return null;
}

// Returns a recurrence rule { freq, interval, byday[], label } or null for one-offs.
function eventRecurrence(event) {
  if (!event) return null;
  const text = `${event.title || ""} ${event.desc || ""}`.toLowerCase();
  // Monthly by position: "first friday", "every second saturday", "third tuesday".
  const monthly = text.match(/\b(first|second|third|fourth|fifth|last)\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)\b/);
  if (monthly) {
    const ordinal = RECUR_ORDINALS[monthly[1]];
    const code = RECUR_DAY_WORDS[monthly[2]];
    if (ordinal && code) return { freq: "MONTHLY", interval: 1, byday: [`${ordinal}${code}`], label: `every ${RECUR_ORDINAL_LABEL[ordinal]} ${ICS_CODE_LABEL[code]}` };
  }
  // Explicit weekly cadence: "weekly", "every week", "every tuesday", "fridays".
  const weeklySignal = /\b(weekly|every week|each week|recurring)\b/.test(text)
    || /\bevery\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)\b/.test(text)
    || /\b(sundays|mondays|tuesdays|wednesdays|thursdays|fridays|saturdays)\b/.test(text);
  if (weeklySignal) {
    const codes = [];
    Object.entries(RECUR_DAY_WORDS).forEach(([word, code]) => {
      if (new RegExp(`\\b${word}s?\\b`).test(text) && !codes.includes(code)) codes.push(code);
    });
    if (!codes.length) { const code = weekdayCodeFromDate(event.startDate); if (code) codes.push(code); }
    if (codes.length) {
      codes.sort((a, b) => ICS_WEEKDAY_CODES.indexOf(a) - ICS_WEEKDAY_CODES.indexOf(b));
      return { freq: "WEEKLY", interval: 1, byday: codes, label: weeklyRecurrenceLabel(codes) };
    }
  }
  // Inherently recurring categories repeat weekly on their own weekday.
  if (["happy-hours", "trivia-nights", "farmers-markets"].includes(String(event.cat || "").toLowerCase())) {
    const code = weekdayCodeFromDate(event.startDate);
    if (code) return { freq: "WEEKLY", interval: 1, byday: [code], label: `every ${ICS_CODE_LABEL[code]}` };
  }
  return inferRecurrenceFromOccurrences(event);
}

function isHighlighted(event) { return [4, 5].includes(event.id); }

function eventNumericPrice(event) {
  if (event.price === "Free") return 0;
  const match = String(event.price || "").match(/\$?(\d+(?:\.\d+)?)/);
  return match ? Number(match[1]) : null;
}

function eventStartHour(event) {
  if (event.startHour !== undefined && event.startHour !== null) return event.startHour;
  const match = String(event.time || "").match(/(\d{1,2})(?::\d{2})?\s*(AM|PM)/i);
  if (!match) return null;
  let hour = Number(match[1]) % 12;
  if (match[2].toUpperCase() === "PM") hour += 12;
  return hour;
}

function eventStartSortValue(event) {
  if (Number.isFinite(event.startSort)) return event.startSort;
  if (event.startSort === Number.POSITIVE_INFINITY) return Number.MAX_SAFE_INTEGER;
  const timeText = String(event.time || "");
  const dayOrder = timeText.startsWith("Tonight") ? 0
    : timeText.startsWith("Today") ? 0
      : timeText.startsWith("Fri") ? 1
        : timeText.startsWith("Sat") ? 2
          : timeText.startsWith("Sun") ? 3
            : 99;
  const hour = eventStartHour(event);
  return dayOrder * 24 * 60 * 60 * 1000 + (hour ?? 24) * 60 * 60 * 1000;
}

function eventDateValue(event) {
  if (event.startDate) {
    const date = new Date(`${event.startDate}T00:00:00`);
    if (!Number.isNaN(date.getTime())) return date;
  }
  if (Number.isFinite(event.startSort) && event.startSort < Number.MAX_SAFE_INTEGER) {
    const date = new Date(event.startSort);
    date.setHours(0, 0, 0, 0);
    return date;
  }
  return null;
}

function sameCalendarDate(a, b) {
  return a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function matchesDateFilter(event, value) {
  if (!value || value === "Any date") return true;
  const eventDate = eventDateValue(event);
  if (!eventDate) return false;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  if (value === "Today") return sameCalendarDate(eventDate, today);
  if (value === "This week") {
    const weekEnd = new Date(today);
    weekEnd.setDate(today.getDate() + 6);
    return eventDate >= today && eventDate <= weekEnd;
  }
  if (value === "This weekend") {
    const saturday = new Date(today);
    saturday.setDate(today.getDate() + ((6 - today.getDay() + 7) % 7));
    const sunday = new Date(saturday);
    sunday.setDate(saturday.getDate() + 1);
    return sameCalendarDate(eventDate, saturday) || sameCalendarDate(eventDate, sunday);
  }
  const range = String(value).match(/^(\d{4}-\d{2}-\d{2})\.\.(\d{4}-\d{2}-\d{2})$/);
  if (range) {
    const start = new Date(`${range[1]}T00:00:00`);
    const end = new Date(`${range[2]}T23:59:59`);
    return eventDate >= start && eventDate <= end;
  }
  if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return event.startDate === value || sameCalendarDate(eventDate, new Date(`${value}T00:00:00`));
  return true;
}

function sortEventsByStart(a, b) {
  const startDelta = eventStartSortValue(a) - eventStartSortValue(b);
  if (startDelta !== 0) return startDelta;
  return String(a.title || "").localeCompare(String(b.title || ""));
}

function matchesTimeFilter(event, value) {
  if (!value || value === "Any time") return true;
  const hour = eventStartHour(event);
  if (hour === null) return false;
  if (value === "Morning") return hour >= 4 && hour < 12;
  if (value === "Afternoon") return hour >= 12 && hour < 16;
  if (value === "Evening") return hour >= 16 && hour < 21;
  if (value === "Late night") return hour >= 21 || hour < 4;
  const custom = String(value).match(/^custom:(\d{1,2}):\d{2}-(\d{1,2}):\d{2}$/);
  if (custom) {
    const startHour = Number(custom[1]);
    const endHour = Number(custom[2]);
    return startHour <= endHour ? (hour >= startHour && hour <= endHour) : (hour >= startHour || hour <= endHour);
  }
  return true;
}


function isMuseumDisplayEvent(event) {
  if (String(event.cat || "").toLowerCase() !== "museums") return true;
  // Show any museum event that has a concrete date/time; only hide the ones with
  // no real schedule ("time varies" / "date to be announced").
  if (/time varies|date to be announced/.test(String(event.time || "").toLowerCase())) return false;
  return Boolean(event.startDate) || Number.isFinite(event.startSort) || eventStartHour(event) !== null;
}
function matchesFilter(event, filter, applyDiscoverFilters = true) {
  if (!isMuseumDisplayEvent(event)) return false;
  const priceValue = eventNumericPrice(event);
  if (state.age < 21 && ["nightlife", "happy-hours"].includes(event.cat)) return false;
  if (applyDiscoverFilters && state.highlightedOnly && !isHighlighted(event)) return false;
  if (applyDiscoverFilters && state.filter.category && state.filter.category !== "All categories" && event.cat !== state.filter.category) return false;
  if (applyDiscoverFilters && !eventNeighborhoodMatches(event, state.filter.neighborhood)) return false;
  if (applyDiscoverFilters && !matchesDateFilter(event, state.filter.date)) return false;
  if (applyDiscoverFilters && !matchesTimeFilter(event, state.filter.time)) return false;
  if (applyDiscoverFilters && state.filter.price === "Free" && event.price !== "Free") return false;
  if (applyDiscoverFilters && state.filter.price === "Under $20" && (priceValue === null || priceValue >= 20)) return false;
  if (applyDiscoverFilters && state.filter.price === "Under $50" && (priceValue === null || priceValue >= 50)) return false;
  // Museums are numerous and noisy in a mixed feed â€” only show them under the
  // Museums tab, not under "All".
  if (filter === "all" || filter === "for-you") return event.cat !== "museums";
  if (filter === "neighborhoods") return event.cat !== "museums";
  if (filter === "weekend") return !event.time.startsWith("Tonight");
  if (filter === "tonight") return event.time.startsWith("Tonight");
  if (filter === "free") return event.price === "Free";
  // Food & drink is tag-aware: anything tagged/described with food or drink shows
  // here, so a food-tagged happy hour appears under Food & drink too.
  if (filter === "food") return /\b(food|drink|dining|restaurant|tasting|brunch|wine|beer|cocktail|happy hour|food deals?)\b/.test(`${event.cat} ${eventTags(event).join(" ")} ${event.title} ${event.desc || ""}`.toLowerCase());
  return event.cat === filter;
}

function formatTicketPrice(value) {
  const amount = Number(value);
  if (!Number.isFinite(amount)) return "";
  return amount % 1 === 0 ? `$${amount}` : `$${amount.toFixed(2)}`;
}

function normalizeSupabasePrice(value, isMinimum = false, isExplicitlyFree = false) {
  if (value === null || value === undefined || value === "") return "Price unknown";
  if (String(value).toLowerCase() === "free") return "Free";
  if (Number(value) === 0) return isExplicitlyFree ? "Free" : "Price unknown";
  const price = Number.isFinite(Number(value)) ? formatTicketPrice(value) : (String(value).startsWith("$") ? String(value) : `$${value}`);
  return isMinimum ? `From ${price}` : price;
}

function positivePriceValue(...values) {
  return values.map(value => Number(value)).find(value => Number.isFinite(value) && value > 0);
}

function ticketmasterPriceRange(row) {
  const sources = [
    row.raw_json,
    row.raw_json?._embedded?.events?.[0],
    row.raw_json?.event,
    row.raw_json?.ticketmaster
  ].filter(Boolean);
  for (const source of sources) {
    const ranges = Array.isArray(source.priceRanges) ? source.priceRanges : [];
    const range = ranges.find(item => positivePriceValue(item?.min, item?.lowPrice, item?.price, item?.minPrice));
    if (range) {
      return {
        min: positivePriceValue(range.min, range.lowPrice, range.price, range.minPrice),
        max: positivePriceValue(range.max, range.highPrice, range.maxPrice)
      };
    }
    const offers = Array.isArray(source.offers) ? source.offers : [];
    const offer = offers.find(item => positivePriceValue(item?.lowPrice, item?.price, item?.minPrice));
    if (offer) {
      return {
        min: positivePriceValue(offer.lowPrice, offer.price, offer.minPrice),
        max: positivePriceValue(offer.highPrice, offer.maxPrice)
      };
    }
  }
  return null;
}

function formatListedPriceRange(range) {
  if (!range?.min) return "";
  if (range.max && range.max !== range.min) return `${formatTicketPrice(range.min)}-${formatTicketPrice(range.max)}`;
  return `From ${formatTicketPrice(range.min)}`;
}

function normalizeSupabasePriceFromRow(row) {
  if (["concerts", "live-music"].includes(normalizeImportedCategory(row)) && String(row.source || "").toLowerCase() === "dc-music-live" && /^free$/i.test(String(row.price || row.raw_json?.source_price || "").trim())) return "Price unknown";
  const isExplicitlyFree = rowIsExplicitlyFree(row);
  const listedTicketmasterPrice = String(row.source || "").toLowerCase() === "ticketmaster" ? formatListedPriceRange(ticketmasterPriceRange(row)) : "";
  if (listedTicketmasterPrice) return listedTicketmasterPrice;
  if (row.price !== undefined && row.price !== null && row.price !== "") return normalizeSupabasePrice(row.price, false, isExplicitlyFree);
  const listedApiPrice = formatListedPriceRange(ticketmasterPriceRange(row));
  if (listedApiPrice) return listedApiPrice;
  if (row.price_min !== undefined && row.price_min !== null && row.price_min !== "") {
    if (Number(row.price_min) === 0 && !isExplicitlyFree) return "Price unknown";
    if (row.price_max !== undefined && row.price_max !== null && row.price_max !== "" && Number(row.price_max) !== Number(row.price_min)) {
      return `${normalizeSupabasePrice(row.price_min, false, isExplicitlyFree)}-${normalizeSupabasePrice(row.price_max, false, isExplicitlyFree)}`;
    }
    return normalizeSupabasePrice(row.price_min, true, isExplicitlyFree);
  }
  return "Price unknown";
}

async function existingEventInteraction(userId, eventId) {
  const url = `${supabaseConfig.url}/rest/v1/event_interactions?select=id&user_id=eq.${encodeURIComponent(userId)}&event_id=eq.${encodeURIComponent(eventId)}&limit=1`;
  const response = await fetch(url, { headers: supabaseInteractionHeaders() });
  if (!response.ok) throw new Error(`Supabase interaction lookup returned ${response.status}`);
  const rows = await response.json();
  return rows[0] || null;
}

async function saveEventInteraction(eventId, kind = "save", active = true) {
  const event = events.find(item => item.id === Number(eventId));
  const supabaseEventId = interactionEventId(event);
  if (!supabaseEventId) return { skipped: "no-supabase-event-id" };
  const record = {
    user_id: currentInteractionUserId(),
    event_id: supabaseEventId,
    kind,
    active,
    title: event?.title || "",
    category: event?.cat || "",
    tags: event?.tags || []
  };
  try {
    const existing = await existingEventInteraction(record.user_id, record.event_id);
    if (active && !existing) {
      const response = await fetch(`${supabaseConfig.url}/rest/v1/event_interactions`, {
        method: "POST",
        headers: { ...supabaseInteractionHeaders(), Prefer: "return=minimal" },
        body: JSON.stringify([{ user_id: record.user_id, event_id: record.event_id }])
      });
      if (!response.ok) throw new Error(`Supabase interaction insert returned ${response.status}`);
    }
    if (!active && existing) {
      const response = await fetch(`${supabaseConfig.url}/rest/v1/event_interactions?user_id=eq.${encodeURIComponent(record.user_id)}&event_id=eq.${encodeURIComponent(record.event_id)}`, {
        method: "DELETE",
        headers: supabaseInteractionHeaders()
      });
      if (!response.ok) throw new Error(`Supabase interaction delete returned ${response.status}`);
    }
    return { synced: true };
  } catch (error) {
    queuePendingEventInteraction(record);
    console.warn("[supabase] event interaction queued locally:", error.message);
    return { queued: true, error };
  }
}

function cleanSupabaseDescription(value) {
  const cleaned = String(value || "")
    .replace(/^Sourced from [\w.-]+(?:\.com)?\s*-\s*/i, "")
    .replace(/^Sourced from [\w.-]+(?:\.com)?\.?\s*/i, "")
    .replace(/\s*Sourced from [\w.-]+(?:\.com)?\.?\s*/ig, " ")
    .trim();
  return cleaned || "More details are coming soon.";
}

function cleanImportedText(value) {
  return String(value || "")
    .replace(/^Sourced from [\w.-]+(?:\.com)?\s*-\s*/i, "")
    .replace(/^Sourced from [\w.-]+(?:\.com)?\.?\s*/i, "")
    .replace(/\s*Sourced from [\w.-]+(?:\.com)?\.?\s*/ig, " ")
    .trim();
}

function isAddressOnlyVenue(value) {
  return /United States of America|Washington, DC 20|Street |Avenue |Road |Northwest|Northeast|Southwest|Southeast|^\d+\s/i.test(String(value || ""));
}

function extractLocationFromDescription(value) {
  const description = cleanImportedText(value);
  const details = { venue: "", address: "", description };
  if (!description) return details;
  const labeled = description.match(/(?:^|\n)\s*(address|location|where|venue)\s*:\s*([^\n\r]+)/i);
  if (labeled) {
    const label = labeled[1].toLowerCase();
    const location = labeled[2].trim().replace(/[.;,]+$/g, "");
    if (location) {
      if (label === "address" || isAddressOnlyVenue(location)) details.address = location;
      else details.venue = location;
    }
    details.description = description
      .replace(new RegExp(`\\n?\\s*${labeled[1]}\\s*:\\s*${labeled[2].replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}\\s*`, "i"), "\n")
      .replace(/\n{3,}/g, "\n\n")
      .trim();
  }
  return details;
}

function rawEventApiAddress(row) {
  return row.raw_json?.geo?.address?.formatted_address || row.raw_json?.entities?.find(entity => entity.formatted_address)?.formatted_address || extractLocationFromDescription(row.description || row.desc).address || "";
}

function rawEventApiVenueName(row) {
  const entity = row.raw_json?.entities?.find(item => ["venue", "place"].includes(item.type) && item.name && !isAddressOnlyVenue(item.name));
  return entity?.name || extractLocationFromDescription(row.description || row.desc).venue || inferVenueNameFromText(`${row.title || ""} ${row.description || ""} ${row.raw_json?.description || ""}`);
}

function rawImageUrl(value) {
  if (!value) return "";
  if (typeof value === "string") return value;
  return value.url || value.image_url || value.thumbnail_url || value.original_url || "";
}

function imageCandidateScore(value) {
  const url = rawImageUrl(value);
  if (!url) return -1;
  if (typeof value === "string") return /thumb|thumbnail|small|w_?\d{2,3}/i.test(value) ? 1 : 250000;
  const width = Number(value.width || value.w || value.size?.width || 0);
  const height = Number(value.height || value.h || value.size?.height || 0);
  let score = width && height ? width * height : 250000;
  if (/retina|large|original|master|source/i.test(url)) score += 250000;
  if (/tablet|desktop|hero|banner/i.test(url)) score += 100000;
  if (/thumb|thumbnail|small|icon|logo/i.test(url)) score -= 150000;
  return score;
}

function bestRawImageUrl(value) {
  const list = (Array.isArray(value) ? value : [value]).flat();
  return list
    .map(item => ({ url: rawImageUrl(item), score: imageCandidateScore(item) }))
    .filter(item => item.url)
    .sort((a, b) => b.score - a.score)[0]?.url || "";
}

function rawEventApiImage(row) {
  const direct = bestRawImageUrl([row.image_url, row.image, row.raw_json?.image_url, row.raw_json?.image]);
  if (direct) return direct;
  const eventImage = bestRawImageUrl(row.raw_json?.images);
  if (eventImage) return eventImage;
  const entities = Array.isArray(row.raw_json?.entities) ? row.raw_json.entities : [];
  return entities
    .map(entity => bestRawImageUrl([entity.image, entity.image_url, entity.logo, entity.thumbnail, entity.images]))
    .filter(Boolean)[0] || "";
}

function inferVenueNameFromText(value) {
  const text = cleanImportedText(value);
  const patterns = [
    /\bat\s+([A-Z][A-Za-z0-9&'â€™.\- ]{2,70}?)(?:[.,!|]| for | with | featuring | in Washington| in D\.C\.|$)/,
    /\b@\s*([A-Z][A-Za-z0-9&'â€™.\- ]{2,70}?)(?:[.,!|]|$)/,
    /\|\s*([A-Z0-9][A-Za-z0-9&'â€™.\- ]{2,45}?)\s*(?:\||$)/
  ];
  for (const pattern of patterns) {
    const match = text.match(pattern);
    const candidate = match?.[1]?.trim();
    if (candidate && !isAddressOnlyVenue(candidate) && !/hosted by|washington d\.?c\.?$/i.test(candidate)) return candidate;
  }
  return "";
}

function normalizeSupabaseVenue(row) {
  const extracted = extractLocationFromDescription(row.description || row.desc);
  const venue = cleanImportedText(row.venue_name || row.venue || row.location_name || "");
  const inferredVenue = rawEventApiVenueName(row) || extracted.venue || inferVenueNameFromText(`${row.title || ""} ${row.description || ""} ${row.raw_json?.description || ""}`);
  const genericVenue = isAddressOnlyVenue(venue) || (typeof isGenericLocationName === "function" && isGenericLocationName(venue));
  if (row.source !== "manual" && genericVenue) return inferredVenue || venue || "Location in description";
  return venue || inferredVenue || "Location in description";
}

function normalizeSupabaseArea(row) {
  const extracted = extractLocationFromDescription(row.description || row.desc);
  return row.neighborhood || row.area || extracted.address || "Washington, DC";
}

function supabaseLocationText(row) {
  return `${row.venue_address || ""} ${row.address || ""} ${rawEventApiAddress(row)} ${row.neighborhood || ""} ${row.area || ""} ${row.venue_name || ""} ${row.venue || ""} ${row.raw_json?.geo?.address?.locality || ""} ${row.raw_json?.geo?.address?.region || ""} ${row.raw_json?.geo?.address?.country_code || ""}`.toLowerCase();
}

function isSupabaseEventInDc(row) {
  const text = supabaseLocationText(row);
  const nonDcText = /\b(arlington|alexandria|bethesda|silver spring|national harbor|vienna|fairfax|falls church|rockville|hyattsville|college park|landover|tysons|mclean|reston|gaithersburg|laurel|bowie|annapolis|baltimore|md\b|va\b|virginia|maryland)\b/.test(text);
  const knownDcVenue = /\b(miracle theatre|sixth\s*&\s*i|mlk library|martin luther king jr memorial library|rock creek park tennis center|politics and prose|kennedy center|national theatre|warner theatre|the anthem|union stage|9:30 club|930 club|the atlantis|howard theatre|echostage|capital one arena|nationals park|carefirst arena)\b/.test(text);
  const dcText = knownDcVenue || /washington,\s*(dc|d\.c\.)|washington,\s*district of columbia|district of columbia|\bdc\b|\bd\.c\.\b|\bnw\b|\bne\b|\bsw\b|\bse\b/.test(text);
  if (nonDcText && !dcText) return false;
  if (dcText) return true;
  if (row.latitude !== null && row.latitude !== undefined && row.longitude !== null && row.longitude !== undefined) {
    const lat = Number(row.latitude);
    const lng = Number(row.longitude);
    if (Number.isFinite(lat) && Number.isFinite(lng)) return lat >= 38.79 && lat <= 38.995 && lng >= -77.12 && lng <= -76.90;
  }
  if (row.lat !== null && row.lat !== undefined && row.lng !== null && row.lng !== undefined) {
    const lat = Number(row.lat);
    const lng = Number(row.lng);
    if (Number.isFinite(lat) && Number.isFinite(lng)) return lat >= 38.79 && lat <= 38.995 && lng >= -77.12 && lng <= -76.90;
  }
  return dcText;
}

function normalizeSupabaseDescription(row) {
  const extracted = extractLocationFromDescription(row.description || row.desc);
  return cleanSupabaseDescription(extracted.description);
}

function hasReliableSupabaseStart(row) {
  // Discovery should only show events with a real scheduled start. Date-only
  // rows are kept in Supabase, but they should not appear in the app feed.
  if (row.starts_at || row.start_time || row.start_at) return Number.isFinite(eventStartSortFromRow(row));
  return Boolean(row.date && eventStartTimePartsFromRow(row));
}

function eventStartTimePartsFromRow(row) {
  const source = row.starts_at || row.start_time || row.start_at;
  if (source) {
    const date = new Date(source);
    if (!Number.isNaN(date.getTime())) {
      const parts = new Intl.DateTimeFormat("en-US", { timeZone: "America/New_York", hour: "numeric", minute: "2-digit", hour12: false }).formatToParts(date);
      return {
        hour: Number(parts.find(part => part.type === "hour")?.value || 0) % 24,
        minute: Number(parts.find(part => part.type === "minute")?.value || 0)
      };
    }
  }
  const timeText = String(row.time || row.start_time || row.start_at || "");
  const match = timeText.match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/i);
  if (!match) return null;
  let hour = Number(match[1]) % 12;
  if (match[3].toUpperCase() === "PM") hour += 12;
  return { hour, minute: Number(match[2] || 0) };
}

function eventStartHourFromRow(row) {
  const parts = eventStartTimePartsFromRow(row);
  return parts ? parts.hour : null;
}

function eventStartSortFromRow(row) {
  const source = row.starts_at || row.start_time || row.start_at;
  if (source) {
    const date = new Date(source);
    if (!Number.isNaN(date.getTime())) return date.getTime();
  }
  const parts = row.date ? eventStartTimePartsFromRow(row) : null;
  if (row.date && parts) {
    const date = new Date(`${row.date}T00:00:00`);
    if (!Number.isNaN(date.getTime())) return date.getTime() + parts.hour * 60 * 60 * 1000 + parts.minute * 60 * 1000;
  }
  return Number.MAX_SAFE_INTEGER;
}

function startOfDiscoveryWindowSortValue() {
  return Date.now();
}

function endOfDiscoveryWindowSortValue() {
  const end = new Date();
  // 21-day window so concerts, live music, and museum events (most dated more
  // than a week out) appear alongside the daily recurring happy hours/trivia.
  end.setDate(end.getDate() + 21);
  end.setHours(23, 59, 59, 999);
  return end.getTime();
}
function localDateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
}

function discoveryWindowQueries() {
  const start = new Date(startOfDiscoveryWindowSortValue());
  const end = new Date(endOfDiscoveryWindowSortValue());
  const selectAndStatus = "select=*&status=eq.published";
  const today = localDateKey(start);
  return [
    `${selectAndStatus}&date=gte.${today}&date=lte.${localDateKey(end)}`,
    `${selectAndStatus}&starts_at=gte.${encodeURIComponent(start.toISOString())}&starts_at=lte.${encodeURIComponent(end.toISOString())}`
  ];
}


function isEventInDiscoveryWindow(event) {
  if (!Number.isFinite(event.startSort) || event.startSort === Number.MAX_SAFE_INTEGER) return false;
  return event.startSort >= startOfDiscoveryWindowSortValue() && event.startSort <= endOfDiscoveryWindowSortValue();
}

function normalizeImportedCategory(row) {
  const importedCategories = new Set(["concerts", "live-music", "festivals", "performing-arts", "sports", "community", "expos", "museums", "nightlife", "happy-hours", "trivia-nights"]);
