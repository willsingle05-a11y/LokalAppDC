<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f7fa" />
    <title>Lokal DC</title>
        <style>
:root {
  --cream: #f5f7fa;
  --paper: #ffffff;
  --ink: #111827;
  --muted: #667587;
  --line: #dce6ed;
  --orange: #3a7ca5;
  --orange-soft: #e0eef7;
  --green: #1d4e6b;
  --green-soft: #e0eef7;
  --yellow: #78a9c7;
  --pink: #6e9db8;
  --navy: #111827;
  --shadow: 0 10px 28px rgba(17, 24, 39, .09);
  --radius: 22px;
}

* { box-sizing: border-box; }
html { background: #e7edf2; }
body {
  margin: 0;
  color: var(--ink);
  background: #e7edf2;
  font-family: "Electric Atlas Light", "Avenir Next", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
button { border: 0; color: inherit; cursor: pointer; font: inherit; }
button:focus-visible { outline: 3px solid var(--yellow); outline-offset: 2px; }
.demo-stage { min-height: 100vh; }
.demo-sidebar { display: none; }
.app-shell {
  position: relative;
  width: min(100%, 620px);
  min-height: 100vh;
  margin: 0 auto;
  overflow: hidden;
  background: var(--cream);
  box-shadow: 0 0 45px rgba(50, 40, 30, .12);
}
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.share-shortcut { padding: 8px 10px; border-radius: 999px; color: var(--green); background: var(--green-soft); font-size: 10px; font-weight: 900; letter-spacing: .5px; text-transform: uppercase; }
.header-icon { position: relative; padding: 5px; color: var(--orange); background: transparent; font-size: 14px; }
.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  padding: 10px 18px;
  background: rgba(246, 240, 231, .92);
  border-bottom: 1px solid rgba(231, 223, 212, .8);
  backdrop-filter: blur(14px);
}
.brand { display: flex; align-items: center; gap: 10px; background: transparent; text-align: left; }
.brand-mark {
  display: grid;
  width: 38px;
  height: 38px;
  place-items: center;
  border-radius: 14px;
  color: var(--paper);
  background: var(--orange);
  font-family: Georgia, serif;
  font-size: 23px;
  font-weight: 700;
}
.brand b { display: block; font-size: 15px; letter-spacing: 2px; }
.brand small { display: block; margin-top: 2px; color: var(--muted); font-size: 8px; font-weight: 800; letter-spacing: 1.5px; }
.icon-button { display: grid; place-items: center; padding: 0; background: transparent; }
main { min-height: calc(100vh - 68px); padding-bottom: 92px; }
.page { padding: 20px 18px 32px; animation: rise .25s ease; }
@keyframes rise { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

.eyebrow { margin: 0 0 5px; color: var(--orange); font-size: 10px; font-weight: 900; letter-spacing: 1.6px; text-transform: uppercase; }
h1, h2, h3, p { margin-top: 0; }
h1, h2 { font-family: Georgia, serif; font-weight: 500; letter-spacing: -.6px; }
h1 { margin-bottom: 9px; font-size: 37px; line-height: 1.02; }
h2 { margin-bottom: 12px; font-size: 25px; line-height: 1.05; }
h3 { margin-bottom: 5px; font-size: 15px; line-height: 1.15; }
.lede { max-width: 420px; margin-bottom: 19px; color: var(--muted); font-size: 14px; line-height: 1.5; }
.section { margin-top: 27px; }
.section-heading { display: flex; align-items: end; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
.section-heading h2 { margin: 0; }
.discover-heading { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.discover-heading h1 { margin-bottom: 12px; font-size: 31px; }
.filter-button { padding: 8px 11px; border-radius: 999px; color: var(--green); background: var(--green-soft); font-size: 10px; font-weight: 900; }
.search-box { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 11px 13px; border: 1px solid var(--line); border-radius: 14px; background: var(--paper); box-shadow: 0 3px 11px rgba(42,57,52,.04); }
.search-box span { color: var(--orange); font-family: Georgia, serif; font-size: 24px; line-height: .5; }
.search-box input { width: 100%; border: 0; color: var(--ink); background: transparent; font: inherit; font-size: 12px; outline: 0; }
.age-note { margin: 8px 0 11px; padding: 9px 11px; border-radius: 11px; color: var(--green); background: var(--green-soft); font-size: 11px; font-weight: 800; line-height: 1.35; }
.mini-lists { display: flex; gap: 8px; overflow-x: auto; margin-top: 12px; padding-bottom: 2px; scrollbar-width: none; }
.mini-lists button { flex: 0 0 142px; padding: 11px; border-radius: 14px; color: white; background: var(--green); text-align: left; }
.mini-lists button:nth-child(2) { background: var(--navy); }.mini-lists button:nth-child(3) { background: var(--orange); }
.mini-lists b, .mini-lists span { display: block; }.mini-lists b { font-size: 12px; }.mini-lists span { margin-top: 4px; font-size: 9px; opacity: .78; }
.feed-section { margin-top: 22px; }
.feed-label { margin-bottom: 3px; color: var(--green); font-size: 8px; font-weight: 900; letter-spacing: .7px; text-transform: uppercase; }
.live-dot { color: var(--orange); font-size: 10px; font-weight: 900; text-transform: uppercase; }
.text-button { color: var(--green); background: transparent; font-size: 12px; font-weight: 800; }
.chips { display: flex; gap: 7px; overflow-x: auto; padding: 1px 1px 6px; scrollbar-width: none; }
.chip, .filter-chip {
  flex: 0 0 auto;
  padding: 8px 12px;
  border: 1px solid var(--line);
  border-radius: 999px;
  color: var(--green);
  background: var(--paper);
  font-size: 11px;
  font-weight: 800;
}
.chip.active, .filter-chip.active { border-color: var(--green); color: white; background: var(--green); }

.event-stack { display: grid; gap: 12px; }
.event-row {
  display: grid;
  grid-template-columns: 98px 1fr;
  min-height: 118px;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--paper);
  box-shadow: 0 3px 11px rgba(42,57,52,.045);
  text-align: left;
  transition: transform .18s ease, box-shadow .18s ease;
}
.event-row:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.event-art { position: relative; display: flex; align-items: end; min-height: 118px; padding: 8px; overflow: hidden; color: white; background: var(--green); }
.event-art:before, .hero-art:before {
  position: absolute;
  top: -25px;
  right: -22px;
  width: 95px;
  height: 95px;
  border: 12px solid rgba(255,255,255,.18);
  border-radius: 50%;
  content: "";
}
.event-art:after, .hero-art:after {
  position: absolute;
  right: 10px;
  bottom: 18px;
  width: 54px;
  height: 54px;
  border: 1px solid rgba(255,255,255,.32);
  border-radius: 50%;
  content: "";
}
.cat-nightlife { background: linear-gradient(150deg, #344d73, #152b44); }
.cat-music { background: linear-gradient(150deg, #cf714f, #eaa65b); }
.cat-art { background: linear-gradient(150deg, #846894, #e2909a); }
.cat-fitness { background: linear-gradient(150deg, #467e66, #183f3a); }
.cat-food { background: linear-gradient(150deg, #e59840, #bb523d); }
.art-label { position: relative; z-index: 1; font-size: 9px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
.event-copy { display: flex; flex-direction: column; justify-content: center; padding: 12px; }
.event-meta { margin: 0 0 4px; color: var(--orange); font-size: 10px; font-weight: 900; letter-spacing: .5px; text-transform: uppercase; }
.event-copy p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.4; }
.event-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.event-tag { display: inline-flex; align-items: center; padding: 4px 7px; border: 1px solid rgba(17,24,39,.18); border-radius: 999px; color: var(--ink); background: var(--bg); font-size: 9px; font-weight: 800; }
.detail-tags { margin: 2px 0 12px; }
.signal { display: flex; align-items: center; gap: 6px; margin-top: 9px; color: var(--green); font-size: 10px; font-weight: 800; }
.avatars { display: flex; padding-left: 4px; }
.avatar {
  display: grid;
  width: 27px;
  height: 27px;
  margin-left: -5px;
  place-items: center;
  border: 2px solid var(--paper);
  border-radius: 50%;
  color: white;
  background: var(--green);
  font-size: 8px;
  font-weight: 900;
}
.avatar:nth-child(2n) { background: var(--orange); }
.avatar:nth-child(3n) { background: var(--navy); }
.avatar-me { width: 40px; height: 40px; margin: 0; border-color: white; background: var(--navy); }

.feature-card { position: relative; overflow: hidden; border-radius: 22px; color: white; background: var(--navy); text-align: left; }
.feature-card .hero-art { min-height: 196px; padding: 20px; background: linear-gradient(145deg, rgba(34,60,82,.1), rgba(34,60,82,.8)), linear-gradient(135deg, #c97759, #233d53 67%); }
.feature-card h3 { position: relative; z-index: 1; max-width: 260px; margin-top: 45px; font-family: Georgia, serif; font-size: 30px; font-weight: 500; }
.feature-card p { position: relative; z-index: 1; margin: 0; font-size: 12px; opacity: .88; }
.feature-signal { position: absolute; top: 16px; left: 16px; z-index: 2; padding: 7px 10px; border-radius: 999px; background: rgba(255,253,248,.95); color: var(--ink); font-size: 10px; font-weight: 900; }

.bottom-nav {
  position: fixed;
  right: 10px;
  bottom: 9px;
  left: 10px;
  z-index: 12;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  width: min(calc(100% - 20px), 600px);
  height: 64px;
  margin: 0 auto;
  padding: 7px 8px 8px;
  border: 1px solid rgba(231,223,212,.9);
  border-radius: 19px;
  background: rgba(255,254,250,.94);
  box-shadow: 0 8px 24px rgba(42,57,52,.12);
  backdrop-filter: blur(12px);
}
.nav-item { display: grid; justify-items: center; gap: 2px; color: #96a09b; background: transparent; font-size: 8px; }
.nav-item.active { color: var(--green); }
.nav-item svg { width: 21px; height: 21px; stroke-width: 2; }

.modal-backdrop { position: fixed; inset: 0; z-index: 20; display: flex; align-items: end; justify-content: center; background: rgba(20,34,32,.45); animation: fade .2s ease; }
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.modal { position: relative; width: min(100%, 620px); max-height: 91vh; overflow-y: auto; border-radius: 25px 25px 0 0; background: var(--paper); animation: slide .28s ease; }
@keyframes slide { from { transform: translateY(35px); } to { transform: translateY(0); } }
.modal-close { position: absolute; top: 14px; right: 14px; z-index: 2; width: 36px; height: 36px; border-radius: 50%; color: white; background: rgba(23,58,53,.58); font-size: 20px; }
.detail-hero { position: relative; min-height: 210px; padding: 22px; color: white; }
.detail-hero h1 { position: relative; z-index: 1; max-width: 360px; margin-top: 75px; font-size: 35px; }
.detail-hero p { position: relative; z-index: 1; margin: 0; font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
.detail-body { padding: 20px 18px 30px; }
.detail-actions { display: grid; grid-template-columns: 1fr 1fr 1.4fr; gap: 7px; margin: 16px 0; }
.action, .primary, .secondary { padding: 11px 10px; border-radius: 12px; font-size: 11px; font-weight: 900; }
.action { color: var(--green); background: var(--green-soft); }
.action.selected { color: white; background: var(--green); }
.primary { color: white; background: var(--orange); }
.secondary { color: var(--green); background: var(--green-soft); }
.detail-description { color: var(--muted); font-family: Georgia, serif; font-size: 17px; line-height: 1.45; }
.attendee-line { display: flex; align-items: center; gap: 9px; margin: 14px 0; font-size: 12px; font-weight: 800; }

.map-page { padding: 0; }
.map-top { padding: 18px; }
.map-canvas {
  position: relative;
  min-height: calc(100vh - 232px);
  overflow: hidden;
  background: #dce6dc;
}
.map-canvas:before {
  position: absolute;
  inset: -50px;
  opacity: .78;
  background:
    linear-gradient(118deg, transparent 0 19%, #f6f0e7 19% 23%, transparent 23% 100%),
    linear-gradient(12deg, transparent 0 39%, #f6f0e7 39% 43%, transparent 43% 100%),
    linear-gradient(98deg, transparent 0 59%, #f6f0e7 59% 63%, transparent 63% 100%),
    linear-gradient(163deg, transparent 0 68%, #f6f0e7 68% 71%, transparent 71% 100%);
  content: "";
}
.neighborhood { position: absolute; color: rgba(23,58,53,.5); font-size: 11px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
.pin { position: absolute; z-index: 2; display: grid; width: 38px; height: 38px; place-items: center; border: 3px solid white; border-radius: 50% 50% 50% 9px; color: white; background: var(--orange); box-shadow: 0 5px 10px rgba(48,61,57,.2); font-size: 11px; font-weight: 900; transform: rotate(-45deg); }
.pin span { transform: rotate(45deg); }
.pin.music { background: var(--orange); }.pin.nightlife { background: var(--navy); }.pin.art { background: #9e6f95; }.pin.fitness { background: var(--green); }.pin.food { background: #ca8c3c; }
.map-card { position: absolute; right: 14px; bottom: 14px; left: 14px; z-index: 4; display: none; }
.map-card.visible { display: block; }

.tabs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; padding: 4px; border-radius: 14px; background: #ebe4d9; }
.tab-button { padding: 10px; border-radius: 11px; color: var(--muted); background: transparent; font-size: 12px; font-weight: 900; }
.tab-button.active { color: var(--green); background: var(--paper); box-shadow: 0 2px 5px rgba(40,50,45,.08); }
.activity-card, .group-card, .stat-card { padding: 14px; border: 1px solid var(--line); border-radius: 17px; background: var(--paper); }
.activity-card { display: flex; gap: 11px; }
.activity-card + .activity-card { margin-top: 9px; }
.activity-card p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.45; }
.activity-card b { color: var(--ink); }
.activity-time { display: block; margin-top: 4px; color: #a09c94; font-size: 10px; }
.group-card { margin-top: 14px; }
.group-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.group-icon { display: grid; width: 45px; height: 45px; place-items: center; border-radius: 15px; color: white; background: var(--navy); font-family: Georgia, serif; font-size: 22px; }
.group-head div:nth-child(2) { flex: 1; }
.group-head p { margin: 3px 0 0; color: var(--muted); font-size: 11px; }
.group-divider { margin-top: 24px; }
.community-grid, .group-list { display: grid; gap: 8px; }
.community-card { display: flex; align-items: center; gap: 10px; padding: 11px; border: 1px solid var(--line); border-radius: 14px; background: var(--paper); text-align: left; }
.community-card span:nth-child(2) { display: grid; flex: 1; gap: 2px; }.community-card small { color: var(--muted); font-size: 10px; }.community-card em { color: var(--orange); font-size: 10px; font-style: normal; font-weight: 800; }
.group-access { padding: 5px 7px; border-radius: 999px; color: var(--green); background: var(--green-soft); font-size: 8px; font-weight: 900; letter-spacing: .5px; text-transform: uppercase; }
.group-access.private { color: #725b7f; background: #eee4f0; }
.group-icon.run { background: var(--green); }.group-icon.book { background: #9e6f95; }.group-icon.art { background: var(--orange); }
.social-tabs { margin-top: 13px; }
.create-sheet { padding: 21px 18px 25px; }
.create-sheet h2 { margin-bottom: 5px; font-size: 30px; }
.create-sheet .lede { margin-bottom: 14px; }
.group-type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 13px; }
.group-type { padding: 11px 7px; border: 1px solid var(--line); border-radius: 12px; color: var(--muted); background: var(--paper); font-size: 10px; font-weight: 900; }
.group-type.selected { border-color: var(--green); color: white; background: var(--green); }
.create-sheet input { width: 100%; margin-bottom: 9px; padding: 12px; border: 1px solid var(--line); border-radius: 11px; color: var(--ink); background: var(--paper); font: inherit; font-size: 12px; }
.group-detail { padding: 21px 18px 25px; }
.group-detail h2 { margin-bottom: 4px; font-size: 29px; }
.group-detail-meta { display: flex; flex-wrap: wrap; gap: 6px; margin: 9px 0 13px; }
.detail-pill { padding: 6px 8px; border-radius: 999px; color: var(--green); background: var(--green-soft); font-size: 9px; font-weight: 900; }
.group-description { color: var(--muted); font-size: 12px; line-height: 1.45; }
.group-detail-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin: 14px 0; }
.member-line { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 9px; padding: 10px; border-radius: 12px; background: #f8f5ef; }
.member-line span { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 800; }
.message-list { display: grid; gap: 7px; margin-top: 9px; }
.message { max-width: 88%; padding: 9px 10px; border-radius: 12px 12px 12px 3px; color: var(--ink); background: var(--green-soft); font-size: 11px; line-height: 1.4; }
.message.me { justify-self: end; border-radius: 12px 12px 3px 12px; color: white; background: var(--green); }
.message small { display: block; margin-top: 3px; opacity: .68; font-size: 8px; font-weight: 900; }
.message-compose { display: flex; gap: 7px; margin-top: 10px; }
.message-compose input { width: 100%; min-width: 0; padding: 10px; border: 1px solid var(--line); border-radius: 11px; color: var(--ink); background: var(--paper); font: inherit; font-size: 11px; }
.interest-list { display: grid; gap: 7px; margin-top: 9px; }
.interest-event { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px; border-radius: 12px; background: #f8f5ef; }
.interest-event b, .interest-event small { display: block; }.interest-event b { font-size: 11px; }.interest-event small { margin-top: 3px; color: var(--muted); font-size: 9px; }
.follow-list { display: grid; gap: 8px; }
.follow-card { display: flex; align-items: center; gap: 10px; padding: 11px; border: 1px solid var(--line); border-radius: 14px; background: var(--paper); text-align: left; }
.follow-card span:nth-child(2) { display: grid; flex: 1; gap: 2px; }.follow-card small { color: var(--muted); font-size: 10px; }.follow-card em { color: var(--orange); font-size: 10px; font-style: normal; font-weight: 800; }
.follow-button { padding: 6px 8px; border-radius: 999px; color: var(--green); background: var(--green-soft); font-size: 9px; font-weight: 900; }
.follow-button.selected { color: white; background: var(--green); }
.following-rail { display: flex; gap: 9px; overflow-x: auto; margin-bottom: 15px; padding: 2px 1px 6px; scrollbar-width: none; }
.following-chip { display: grid; flex: 0 0 86px; justify-items: center; gap: 5px; padding: 10px 7px; border: 1px solid var(--line); border-radius: 14px; background: var(--paper); text-align: center; }
.following-chip .group-icon { width: 36px; height: 36px; border-radius: 12px; font-size: 16px; }
.following-chip b { font-size: 10px; line-height: 1.15; }.following-chip small { color: var(--orange); font-size: 8px; font-weight: 900; text-transform: uppercase; }
.filter-sheet, .notification-sheet, .list-sheet, .invite-sheet { padding: 21px 18px 25px; }
.filter-sheet h2, .notification-sheet h2, .list-sheet h2, .invite-sheet h2 { margin-bottom: 6px; font-size: 30px; }
.filter-block { margin-top: 16px; }.filter-block .eyebrow { margin-bottom: 8px; }
.filter-options { display: flex; flex-wrap: wrap; gap: 6px; }.filter-options button { padding: 8px 10px; border-radius: 999px; color: var(--green); background: var(--green-soft); font-size: 10px; font-weight: 900; }.filter-options button.selected { color: white; background: var(--green); }
.notification-card { padding: 11px 0; border-bottom: 1px solid var(--line); }.notification-card b, .notification-card small { display: block; }.notification-card b { font-size: 12px; }.notification-card p { margin: 4px 0; color: var(--muted); font-size: 11px; line-height: 1.35; }.notification-card small { color: var(--orange); font-size: 9px; font-weight: 900; }
.map-search { position: absolute; top: 12px; right: 12px; left: 12px; z-index: 5; display: flex; gap: 7px; padding: 9px; border: 1px solid var(--line); border-radius: 14px; background: rgba(255,254,250,.96); box-shadow: var(--shadow); }.map-search input { width: 100%; border: 0; background: transparent; font: inherit; font-size: 12px; outline: 0; }
.bio { margin: -10px 0 17px; color: var(--muted); font-size: 12px; line-height: 1.45; }
.lokal-score { display: inline-flex; margin-top: 5px; padding: 5px 7px; border-radius: 999px; color: #8b5b1f; background: #f7e4af; font-size: 9px; font-weight: 900; letter-spacing: .6px; text-transform: uppercase; }
.stat-card { cursor: pointer; }
.friend-request { display: flex; gap: 9px; align-items: center; margin-bottom: 8px; padding: 10px; border: 1px solid var(--line); border-radius: 13px; background: var(--paper); }.friend-request div:nth-child(2) { flex: 1; }.friend-request b, .friend-request small { display: block; }.friend-request small { margin-top: 3px; color: var(--muted); font-size: 9px; }.request-actions { display: flex; gap: 4px; }.request-actions button { padding: 6px; border-radius: 8px; color: var(--green); background: var(--green-soft); font-size: 9px; font-weight: 900; }
.group-tabs { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; margin: 13px 0; padding: 4px; border-radius: 12px; background: #ebe4d9; }.group-tabs button { padding: 8px 5px; border-radius: 9px; color: var(--muted); background: transparent; font-size: 10px; font-weight: 900; }.group-tabs button.selected { color: var(--green); background: var(--paper); }

@media (min-width: 700px) {
  .app-shell { margin: 16px auto; min-height: calc(100vh - 32px); border-radius: 24px; }

}

@media (min-width: 1040px) {

  .demo-stage { display: grid; grid-template-columns: 330px 620px; justify-content: center; gap: 44px; padding: 24px 38px; }

  .sidebar-note { margin-top: 31px; padding: 17px; border-left: 3px solid var(--orange); background: rgba(255,253,248,.55); }
  .sidebar-note p:last-child { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.55; }
  .sidebar-actions { display: flex; align-items: center; gap: 17px; margin-top: 20px; }
  .app-shell { width: 620px; margin: 0; min-height: calc(100vh - 48px); border-radius: 25px; }
  .bottom-nav { right: auto; left: calc(50% - 113px); bottom: 34px; width: 600px; }
  .modal { margin-bottom: 24px; }
}



/* Round 2: palette, typography, and feature overrides */
body { font-family: "Electric Atlas Light", "Avenir Next", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
.app-shell { overflow-x: hidden; overflow-y: visible; padding-bottom: 78px; }

function eventTags(event) {
  const raw = Array.isArray(event.tags) ? event.tags : [event.tag, event.cat];
  return raw

    .map(tag => String(tag || "").trim())
    .filter(tag => tag && tag !== "[object Object]")
    .filter((tag, index, all) => all.findIndex(item => item.toLowerCase() === tag.toLowerCase()) === index);
}

    expos: "Expo",
    nightlife: "Night out"
  };
  if (labels[category]) return labels[category];
  const tagText = eventTags(event).join(" ").toLowerCase();
  const text = `${event.cat || ""} ${event.category || ""} ${event.tag || ""} ${tagText} ${event.title || ""}`.toLowerCase();

function eventNumericPrice(event) {

function eventStartHour(event) {
  if (event.startHour !== undefined && event.startHour !== null) return event.startHour;
  const match = String(event.time || "").match(/(\d{1,2})(?::\d{2})?\s*(AM|PM)/i);
  if (!match) return null;
  let hour = Number(match[1]) % 12;
  if (match[2].toUpperCase() === "PM") hour += 12;
  return hour;
}

function eventStartSortValue(event) {
  if (Number.isFinite(event.startSort)) return event.startSort;
  const timeText = String(event.time || "");
  const dayOrder = timeText.startsWith("Tonight") ? 0
    : timeText.startsWith("Today") ? 0
      : timeText.startsWith("Fri") ? 1
        : timeText.startsWith("Sat") ? 2
          : timeText.startsWith("Sun") ? 3
            : 99;
  const hour = eventStartHour(event);
  return dayOrder * 24 * 60 * 60 * 1000 + (hour ?? 24) * 60 * 60 * 1000;
}

function eventDateValue(event) {
  if (event.startDate) {
    const date = new Date(`${event.startDate}T00:00:00`);
    if (!Number.isNaN(date.getTime())) return date;
  }
  if (Number.isFinite(event.startSort) && event.startSort < Number.MAX_SAFE_INTEGER) {
    const date = new Date(event.startSort);
    date.setHours(0, 0, 0, 0);
    return date;
  }
  return null;
}

function sameCalendarDate(a, b) {
  return a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function matchesDateFilter(event, value) {
  if (!value || value === "Any date") return true;
  const eventDate = eventDateValue(event);
  if (!eventDate) return false;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  if (value === "Today") return sameCalendarDate(eventDate, today);
  if (value === "This week") {
    const weekEnd = new Date(today);
    weekEnd.setDate(today.getDate() + 6);
    return eventDate >= today && eventDate <= weekEnd;
  }
  if (value === "This weekend") {
    const saturday = new Date(today);
    saturday.setDate(today.getDate() + ((6 - today.getDay() + 7) % 7));
    const sunday = new Date(saturday);
    sunday.setDate(saturday.getDate() + 1);
    return sameCalendarDate(eventDate, saturday) || sameCalendarDate(eventDate, sunday);
  }
  if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return event.startDate === value || sameCalendarDate(eventDate, new Date(`${value}T00:00:00`));
  return true;
}

function sortEventsByStart(a, b) {
  const startDelta = eventStartSortValue(a) - eventStartSortValue(b);
  if (startDelta !== 0) return startDelta;
  return String(a.title || "").localeCompare(String(b.title || ""));
}

function matchesTimeFilter(event, value) {
  if (!value || value === "Any time") return true;
  const hour = eventStartHour(event);
  if (hour === null) return false;
  if (value === "Morning") return hour >= 4 && hour < 12;
  if (value === "Afternoon") return hour >= 12 && hour < 16;
  if (value === "Evening") return hour >= 16 && hour < 21;
  if (value === "Late night") return hour >= 21 || hour < 4;
  return true;
}

function matchesFilter(event, filter, applyDiscoverFilters = true) {
  const priceValue = eventNumericPrice(event);
  if (state.age < 21 && event.cat === "nightlife") return false;
  if (applyDiscoverFilters && state.highlightedOnly && !isHighlighted(event)) return false;
  if (applyDiscoverFilters && state.filter.category && state.filter.category !== "All categories" && event.cat !== state.filter.category) return false;
  if (applyDiscoverFilters && !matchesDateFilter(event, state.filter.date)) return false;
  if (applyDiscoverFilters && !matchesTimeFilter(event, state.filter.time)) return false;
  if (applyDiscoverFilters && state.filter.price === "Free" && event.price !== "Free") return false;
  if (applyDiscoverFilters && state.filter.price === "Under $20" && (priceValue === null || priceValue >= 20)) return false;
  if (applyDiscoverFilters && state.filter.price === "Under $50" && (priceValue === null || priceValue >= 50)) return false;
  if (filter === "all" || filter === "for-you") return true;
  if (filter === "nearby") return true;
  if (filter === "weekend") return !event.time.startsWith("Tonight");
  if (filter === "tonight") return event.time.startsWith("Tonight");
  if (filter === "free") return event.price === "Free";
  return event.cat === filter;
}

async function syncSupabaseEvents(showToast = false) {
  state.eventSync = { status: "loading", label: "Checking shared events..." };
  if (state.route === "home") renderHome();
  try {
    const response = await fetch(`${supabaseConfig.url}/rest/v1/events?select=*&order=starts_at.asc.nullslast,date.asc.nullslast`, {
      headers: { apikey: supabaseConfig.publishableKey }
    });
    if (!response.ok) throw new Error(`Supabase returned ${response.status}`);
    const rows = await response.json();
    if (rows.length) {
      const normalized = rows.map(normalizeSupabaseEvent);
      const upcoming = normalized.filter(isEventUpcoming);
      events = upcoming.filter(event => event.source === "manual" || event.venue !== "Location in description");
      const hiddenCount = rows.length - events.length;
      const shownLabel = `${events.length} upcoming event${events.length === 1 ? "" : "s"} shown`;
      state.eventSync = { status: "synced", label: hiddenCount > 0 ? `${shownLabel} / ${hiddenCount} older or incomplete row${hiddenCount === 1 ? "" : "s"} hidden` : shownLabel };
    } else {
      events = [...demoEvents];
      state.eventSync = { status: "fallback", label: "Shared table connected / showing sample events until rows are added" };
    }
  } catch {
    events = [...demoEvents];
    state.eventSync = { status: "fallback", label: "Showing sample events / shared table unavailable" };
  }
  if (state.route === "home") renderHome();

    if (!response.ok) throw new Error(`Supabase returned ${response.status}`);
    const rows = await response.json();
    if (rows.length) mergeFriendDirectory(rows.map(normalizeSupabaseProfile));
  } catch {
    mergeFriendDirectory(demoProfileSeeds);
  }
  if (state.route === "social") renderSocial();
}

function formatSignupPhone(value) {
  const digits = value.replace(/\D/g, "");
  if (digits.length === 10) return `+1${digits}`;
  if (digits.length === 11 && digits.startsWith("1")) return `+${digits}`;
  if (value.trim().startsWith("+") && digits.length >= 10) return `+${digits}`;
  throw new Error("Enter a 10 digit phone number with area code.");
}

function formatDisplayPhone(value) {
  const digits = String(value || "").replace(/\D/g, "");
  const local = digits.length === 11 && digits.startsWith("1") ? digits.slice(1) : digits;
  if (local.length !== 10) return value || "";
  return `(${local.slice(0, 3)}) ${local.slice(3, 6)}-${local.slice(6)}`;
}

function calculateAge(birthdate) {
  const birthday = new Date(`${birthdate}T12:00:00`);
  const today = new Date();
  let age = today.getFullYear() - birthday.getFullYear();
  if (today < new Date(today.getFullYear(), birthday.getMonth(), birthday.getDate())) age--;
  return age;
}

function validateBirthday(birthdate) {
  const birthday = new Date(`${birthdate}T12:00:00`);
  const today = new Date();
  if (!birthdate || Number.isNaN(birthday.getTime())) throw new Error("Enter a valid birthday.");
  if (birthday >= today) throw new Error("Birthday must be a date in the past.");
  if (calculateAge(birthdate) < 14) throw new Error("You must be at least 14 years old to use Lokal.");
}

function profileInitials(fullName) {
  return fullName.split(/\s+/).filter(Boolean).slice(0, 2).map(part => part[0]).join("").toUpperCase() || "L";
}

function finalizeLokalProfile(profile) {
  const saved = { ...profile, phone: formatDisplayPhone(profile.phone), age: calculateAge(profile.birthdate), initials: profileInitials(profile.fullName), bio: state.bio };

}

async function supabaseAuthRequest(path, body) {
  const response = await fetch(`${supabaseConfig.url}/auth/v1/${path}`, {
    method: "POST",
    headers: {
      apikey: supabaseConfig.publishableKey,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });
  const data = await response.json().catch(() => ({}));
  if (!response.ok) throw new Error(data.msg || data.message || data.error_description || "Supabase could not complete that request.");
  return data;
}

async function createLokalAccount({ fullName, phone, username, birthdate, password }) {
  if (!fullName || !phone || !username || !birthdate || !password) throw new Error("Complete every account field.");
  if (password.length < 8) throw new Error("Use a password with at least 8 characters.");
  validateBirthday(birthdate);
  const formattedPhone = formatSignupPhone(phone);
  state.pendingSignupProfile = { fullName, phone: formattedPhone, username, birthdate };
  state.pendingSignupPhone = formattedPhone;
  if (demoAuthConfig.useMockOtp) return { demoOtp: true };
  const data = await supabaseAuthRequest("signup", {
    phone: formattedPhone,
    password,
    data: { full_name: fullName, username, birthdate }
  });
  return data;
}

async function checkPhoneSignupStatus() {
  try {
    const response = await fetch(`${supabaseConfig.url}/auth/v1/settings`, { headers: { apikey: supabaseConfig.publishableKey } });
    const settings = await response.json();
    state.phoneSignupEnabled = Boolean(settings?.external?.phone);
  } catch {
    state.phoneSignupEnabled = false;
  }
}

async function verifyLokalPhone(token) {
  if (!token.trim()) throw new Error("Enter the verification code.");
  if (demoAuthConfig.useMockOtp) {
    if (token.trim() !== demoAuthConfig.mockOtp) throw new Error("For demo profiles, use verification code 123456.");
    finalizeLokalProfile(state.pendingSignupProfile);
    return { demoOtp: true };
  }
  const data = await supabaseAuthRequest("verify", { phone: state.pendingSignupPhone, token: token.trim(), type: "sms" });
  finalizeLokalProfile(state.pendingSignupProfile);
  return data;
}

  "Adams Morgan": { x: 24, y: 27 },

  "Washington, DC": { x: 50, y: 50 }
};

function eventMapPosition(event, index) {
  const base = dcMapAreas[event.area] || dcMapAreas[event.venue] || dcMapAreas["Washington, DC"];
  const jitter = ((event.sourceId || event.id || index) * 17) % 9 - 4;
  return { x: base.x + jitter, y: base.y + (((event.id || index) * 11) % 9 - 4) };
}

function scaledMapPosition(position) {
  const zoom = state.mapZoom;
  return {
    x: 50 + (position.x - state.mapCenter.x) * zoom,
    y: 50 + (position.y - state.mapCenter.y) * zoom
  };
}

function clampMapValue(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function setMapZoom(value) {
  state.mapZoom = clampMapValue(Math.round(value * 100) / 100, 0.75, 2.75);
}

function panMap(deltaX, deltaY) {
  const speed = 0.08 / state.mapZoom;
  state.mapCenter = {
    x: clampMapValue(state.mapCenter.x + deltaX * speed, 8, 92),
    y: clampMapValue(state.mapCenter.y + deltaY * speed, 8, 92)
  };
}

function mapSearchMatches(event) {
  const query = state.mapSearch.trim().toLowerCase();
  if (!query) return true;
  return `${event.title} ${event.venue} ${event.area} ${event.cat} ${event.tag}`.toLowerCase().includes(query);
}

function applyMapSearch() {
  const query = state.mapSearch.trim().toLowerCase();
  if (!query) return;
  const area = Object.entries(dcMapAreas).find(([name]) => name.toLowerCase().includes(query));
  const event = events.find(item => mapSearchMatches(item));
  if (area) state.mapCenter = area[1];
  else if (event) state.mapCenter = eventMapPosition(event, 0);
}

function renderMap() {

  const labels = Object.entries(dcMapAreas).filter(([name]) => name !== "Washington, DC").map(([name, pos]) => {

    return `<span class="neighborhood" style="top:${scaled.y}%;left:${scaled.x}%">${name}</span>`;
  }).join("");
  app.innerHTML = `<section class="map-page">

function storyEventPool(story) {
  const venueKeywords = story.venueKeywords || [];
  const textKeywords = story.textKeywords || [];
  const tagKeywords = story.tagKeywords || [];
  const categories = story.categories || [];
  const directMatches = events.filter(event => {
    const eventText = `${event.title} ${event.venue} ${event.area} ${event.desc || ""}`.toLowerCase();
    const tags = eventTags(event).map(tag => tag.toLowerCase());
    if (venueKeywords.some(keyword => `${event.venue} ${event.title}`.toLowerCase().includes(keyword))) return true;
    if (textKeywords.some(keyword => eventText.includes(keyword.toLowerCase()))) return true;
    if (tagKeywords.some(keyword => tags.includes(keyword.toLowerCase()))) return true;
    if (categories.includes(event.cat)) return true;
    return false;
  });
  const fallback = (story.eventIds || [])
    .map(id => events.find(event => event.id === id) || demoEvents.find(event => event.id === id))
    .filter(Boolean);
  return [...directMatches, ...fallback]
    .filter((event, index, all) => all.findIndex(item => item.id === event.id) === index)
    .sort(sortEventsByStart)
    .slice(0, 6);
}

function fullFriendName(initials) {
  return ({ AL: "Ana Lopez", MR: "Marcus Reed", DV: "Dev Shah", JS: "Jules Kim", PL: "Priya Lee" }[initials] || friendNames[initials] || initials);
}

function lokalScore() {
  return scoreBreakdown().total;
}

function cappedScore(value, multiplier, cap) {
  return Math.min(value * multiplier, cap);
}

function uniqueUserTexts(messages) {
  return Array.from(new Set(messages
    .filter(message => message?.type === "text" && String(message.text || "").trim().length >= 8)
    .map(message => String(message.text).trim().toLowerCase())));
}

function socialActivityUnits() {
  const groupTexts = Object.values(state.groupMessages || {}).flatMap(uniqueUserTexts);
  const groupEventShares = Object.entries(state.groupMessages || {}).flatMap(([group, messages]) =>
    messages.filter(message => message?.type === "event" && message.eventId).map(message => `${group}:${message.eventId}`)
  );
  const directTexts = Object.values(state.directMessages || {}).flatMap(messages =>
    messages.filter(message => message?.from === "You" && String(message.text || "").trim().length >= 8).map(message => String(message.text).trim().toLowerCase())
  );
  return new Set([...groupTexts, ...groupEventShares, ...directTexts]).size;
}

function receiptFriendUnits(receipts) {
  return receipts.reduce((sum, receipt) => sum + new Set(receipt.friends || []).size, 0);
}

function receiptEventKey(receipt) {
  return String(receipt?.eventId || receipt?.id || `${receipt?.title || ""}|${receipt?.venue || ""}|${receipt?.time || ""}`).toLowerCase();
}

function scoreBreakdown() {
  const receipts = profileReceipts();
  const rsvpCount = Array.from(state.rsvps || []).filter(id => !state.removedPlans?.has(id)).length;
  const savedOnlyCount = Array.from(state.saved || []).filter(id => !state.rsvps.has(id) && !state.removedPlans?.has(id)).length;
  const breakdown = [
    { label: "Base profile", value: 100, detail: "Starting score for creating a profile." },
    { label: "Verified attendance", value: receipts.length * 15, detail: `${receipts.length} unique event receipt${receipts.length === 1 ? "" : "s"} - 15 each - no lifetime cap.` },
    { label: "Went with friends", value: receiptFriendUnits(receipts) * 5, detail: "5 points for each friend attached to an attended event receipt. It grows with real group plans, not random friend adds." },
    { label: "Upcoming plans", value: cappedScore(rsvpCount, 3, 30), detail: `${rsvpCount} RSVP${rsvpCount === 1 ? "" : "s"} - 3 each - capped at 30.` },
    { label: "Saved ideas", value: cappedScore(savedOnlyCount, 1, 20), detail: `${savedOnlyCount} saved event${savedOnlyCount === 1 ? "" : "s"} not already RSVP'd - 1 each - capped at 20.` },
    { label: "Friends and groups", value: cappedScore(state.friends.size, 2, 20) + cappedScore(userGroupNames().length, 2, 20), detail: "Rewards having a real social graph, with separate caps for friends and groups." },
    { label: "Conversation activity", value: cappedScore(socialActivityUnits(), 1, 30), detail: "Counts unique meaningful messages and event shares, not repeated short spam." }
  ];
  return { total: breakdown.reduce((sum, item) => sum + item.value, 0), items: breakdown };
}

function openFaqSheet() {
  const breakdown = scoreBreakdown();
  modalRoot.innerHTML = `<div class="modal-backdrop"><section class="modal list-sheet" role="dialog" aria-modal="true" aria-label="FAQ"><button class="modal-close" aria-label="Close FAQ">&times;</button>
    <p class="eyebrow">FAQ</p><h2>How Lokal works</h2>
    <div class="score-safeguard"><b>Is there a max Lokal score?</b><p>No. There is no lifetime max score. The score can keep growing as someone attends more unique events. Lower-confidence actions like saves, RSVPs, follows, and messages are limited so they cannot be spammed.</p></div>
    <div class="score-breakdown">${breakdown.items.map(item => `<div class="score-row"><span><b>${escapeHtml(item.label)}</b><small>${escapeHtml(item.detail)}</small></span><strong>+${item.value}</strong></div>`).join("")}</div>
    <div class="score-safeguard"><b>How do you prevent cheating?</b><p>Each event can only count once, future events cannot be marked attended, repeated saves or RSVPs are deduped, and short duplicate messages do not inflate the score. In a real app, higher-value attendance would also use check-ins, ticket scans, organizer confirmation, or friend verification.</p></div>
  </section></div>`;
}

function profileReceipts() {
  const stored = state.receipts || [];
  const attendedRows = Array.from(state.attended || []).map(id => {
    const event = events.find(item => item.id === Number(id));
    if (!event) return null;
    return { id: event.id, title: event.title, time: event.time, venue: event.venue, price: event.price, cat: event.cat, desc: event.desc, friends: event.friends || [], attendedAt: event.startSort || Date.now() };
  }).filter(Boolean);
  return [...stored, ...attendedRows]
    .filter((receipt, index, all) => all.findIndex(item => receiptEventKey(item) === receiptEventKey(receipt)) === index)
    .sort((a, b) => (b.attendedAt || 0) - (a.attendedAt || 0));
}

function receiptRow(receipt) {
  const date = receipt.attendedAt ? new Date(receipt.attendedAt) : new Date();
  const month = date.toLocaleDateString("en-US", { month: "short" });
  const day = date.toLocaleDateString("en-US", { day: "2-digit" });
  const people = receipt.friends?.length ? `with ${receipt.friends.map(fullFriendName).join(" + ")}` : "solo plan";
  return `<button class="receipt" data-receipt-event="${receipt.id}"><div class="date-block">${month}<b>${day}</b></div><div><h3>${escapeHtml(receipt.title)}</h3><p>${escapeHtml(receipt.cat)} / ${escapeHtml(receipt.venue)} / ${escapeHtml(people)}</p></div></button>`;
}

function bestFriendsList() {
  const base = { "Ana Lopez": 18, "Marcus Reed": 14, "Dev Shah": 11, "Jules Kim": 9, "Priya Lee": 7 };
  profileReceipts().forEach(receipt => (receipt.friends || []).forEach(initials => {
    const name = fullFriendName(initials);
    base[name] = (base[name] || 0) + 1;
  }));
  return Object.entries(base)
    .map(([name, score]) => ({ name, score, initials: friendInitials(name) }))
    .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name))
    .slice(0, 5);
}

function markEventAttended(id) {
  const event = events.find(item => item.id === Number(id));
  if (!event) return { ok: false, message: "Event not found" };
  if (Number.isFinite(event.startSort) && event.startSort > Date.now()) return { ok: false, message: "You can add this after the event starts" };
  if (state.attended.has(event.id) || profileReceipts().some(receipt => receiptEventKey(receipt) === receiptEventKey(event))) return { ok: false, message: "This event is already counted once" };
  state.attended.add(event.id);
  state.rsvps.delete(event.id);
  const receipt = { id: event.id, eventId: event.id, title: event.title, time: event.time, venue: event.venue, price: event.price, cat: event.cat, desc: event.desc, friends: event.friends || [], attendedAt: event.startSort || Date.now() };
  state.receipts = [receipt, ...(state.receipts || []).filter(item => Number(item.id) !== Number(event.id))];
  localStorage.setItem("lokalAttended", JSON.stringify(Array.from(state.attended)));
  localStorage.setItem("lokalReceipts", JSON.stringify(state.receipts));
  return { ok: true, message: "Receipt, score, and best friends updated" };
}

function rollingCalendar() {
  const start = new Date();
  start.setHours(0, 0, 0, 0);
  const end = new Date(start);
  end.setMonth(end.getMonth() + 2);
  const months = [];
  for (let date = new Date(start); date <= end; date.setDate(date.getDate() + 1)) {
    const key = `${date.getFullYear()}-${date.getMonth()}`;
    let month = months.find(item => item.key === key);
    if (!month) {
      month = { key, label: date.toLocaleDateString("en-US", { month: "long", year: "numeric" }), days: [] };
      months.push(month);
    }
    month.days.push({ iso: date.toISOString().slice(0, 10), label: date.getDate() });
  }
  const chosenDate = /^\d{4}-\d{2}-\d{2}$/.test(state.filter.date || "") ? state.filter.date : "";
  return `<div class="calendar" data-calendar ${chosenDate ? "" : "hidden"}><p class="calendar-helper">Choose any date from today through ${end.toLocaleDateString("en-US", { month: "long", day: "numeric" })}.</p>${months.map(month => `<div class="calendar-month"><p class="eyebrow">${month.label}</p><div class="calendar-grid">${month.days.map(day => `<button class="${day.iso === chosenDate ? "selected" : ""}" data-calendar-date="${day.iso}">${day.label}</button>`).join("")}</div></div>`).join("")}</div>`;
}

let storyTouchStart = null;
modalRoot.addEventListener("touchstart", event => {
  if (event.target.closest("[data-story-sheet]")) storyTouchStart = event.changedTouches[0].clientX;
}, { passive: true });
modalRoot.addEventListener("touchend", event => {
  const sheet = event.target.closest("[data-story-sheet]");
  if (!sheet || storyTouchStart === null) return;
  const distance = event.changedTouches[0].clientX - storyTouchStart;
  storyTouchStart = null;
  if (Math.abs(distance) < 45) return;
  openStory(Number(sheet.dataset.storySheet) + (distance < 0 ? 1 : -1));
}, { passive: true });

  }

const activeMapPointers = new Map();
let mapDragStart = null;
let mapPinchStart = null;

function mapPointerDistance() {
  const points = [...activeMapPointers.values()];
  if (points.length < 2) return 0;
  return Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
}

document.addEventListener("pointerdown", event => {
  const canvas = event.target.closest("[data-map-canvas]");
  if (!canvas || event.target.closest("input, button")) return;
  event.preventDefault();
  try { canvas.setPointerCapture(event.pointerId); } catch {}
  activeMapPointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
  if (activeMapPointers.size >= 2) {
    mapPinchStart = { distance: mapPointerDistance(), zoom: state.mapZoom };
    mapDragStart = null;
    return;
  }
  mapDragStart = { x: event.clientX, y: event.clientY };
  canvas.classList.add("dragging");
});
document.addEventListener("pointermove", event => {
  if (!activeMapPointers.has(event.pointerId)) return;
  event.preventDefault();
  activeMapPointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
  const canvas = document.querySelector("[data-map-canvas]");
  if (activeMapPointers.size >= 2 && mapPinchStart?.distance) {
    const distance = mapPointerDistance();
    setMapZoom(mapPinchStart.zoom * (distance / mapPinchStart.distance));
    renderMap();
    return;
  }
  if (!mapDragStart) return;
  const deltaX = mapDragStart.x - event.clientX;
  const deltaY = mapDragStart.y - event.clientY;
  mapDragStart = { x: event.clientX, y: event.clientY };
  panMap(deltaX, deltaY);
  renderMap();
  canvas?.classList.add("dragging");
});
function endMapPointer(event) {
  if (event.pointerId !== undefined) activeMapPointers.delete(event.pointerId);
  mapPinchStart = activeMapPointers.size >= 2 ? { distance: mapPointerDistance(), zoom: state.mapZoom } : null;
  mapDragStart = activeMapPointers.size === 1 ? [...activeMapPointers.values()][0] : null;
  if (activeMapPointers.size === 0) mapDragStart = null;
  document.querySelector("[data-map-canvas]")?.classList.remove("dragging");
}
document.addEventListener("pointerup", endMapPointer);
document.addEventListener("pointercancel", endMapPointer);
document.addEventListener("wheel", event => {
  const canvas = event.target.closest("[data-map-canvas]");
  if (!canvas || event.target.closest("input")) return;
  event.preventDefault();
  if (event.ctrlKey) {
    setMapZoom(state.mapZoom - event.deltaY * 0.006);
  } else {
    panMap(event.deltaX, event.deltaY);
  }
  renderMap();
}, { passive: false });
