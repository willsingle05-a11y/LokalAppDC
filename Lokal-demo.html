<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f7fa" />
    <title>Lokal DC</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet" />
    <style>
:root {
  --cream: #f5f7fa;
  --paper: #ffffff;
  --ink: #111827;
  --muted: #667587;
  --line: #dce6ed;
  --steel: #3a7ca5;
  --steel-soft: #e0eef7;
  --blue: #1d4e6b;
  --blue-soft: #e0eef7;
  --yellow: #78a9c7;
  --pink: #6e9db8;
  --navy: #111827;
  --shadow: 0 10px 28px rgba(17, 24, 39, .09);
  --radius: 22px;
}

* { box-sizing: border-box; }
html { background: #e7edf2; }
body {
  margin: 0;
  color: var(--ink);
  background: #e7edf2;
  font-family: Aptos, "Segoe UI Variable", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
button { border: 0; color: inherit; cursor: pointer; font: inherit; }
button:focus-visible { outline: 3px solid var(--yellow); outline-offset: 2px; }
.demo-stage { min-height: 100vh; }
.demo-sidebar { display: none; }
.production-app .demo-stage {
  display: block;
  padding: 0;
}
.production-app .demo-sidebar { display: none !important; }
.app-shell {
  position: relative;
  width: min(100%, 620px);
  min-height: 100vh;
  margin: 0 auto;
  overflow: hidden;
  background: var(--cream);
  box-shadow: 0 0 45px rgba(50, 40, 30, .12);
}
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.share-shortcut { padding: 8px 10px; border-radius: 999px; color: var(--blue); background: var(--blue-soft); font-size: 10px; font-weight: 900; letter-spacing: .5px; text-transform: uppercase; }
.header-icon { position: relative; padding: 5px; color: var(--steel); background: transparent; font-size: 14px; }
.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  padding: 10px 18px;
  background: rgba(246, 240, 231, .92);
  border-bottom: 1px solid rgba(231, 223, 212, .8);
  backdrop-filter: blur(14px);
}
.brand { display: flex; align-items: center; gap: 10px; background: transparent; text-align: left; }
.brand-mark {
  display: grid;
  width: 38px;
  height: 38px;
  place-items: center;
  border-radius: 14px;
  color: var(--paper);
  background: var(--steel);
  font-family: "Aptos Display", Aptos, "Segoe UI Variable Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 23px;
  font-weight: 700;
}
.brand b { display: block; font-size: 15px; letter-spacing: 2px; }
.brand small { display: block; margin-top: 2px; color: var(--muted); font-size: 8px; font-weight: 800; letter-spacing: 1.5px; }
.icon-button { display: grid; place-items: center; padding: 0; background: transparent; }
main { min-height: calc(100vh - 68px); padding-bottom: 92px; }
.page { padding: 20px 18px 32px; animation: rise .25s ease; }
@keyframes rise { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

.eyebrow { margin: 0 0 5px; color: var(--steel); font-size: 10px; font-weight: 900; letter-spacing: 1.6px; text-transform: uppercase; }
h1, h2, h3, p { margin-top: 0; }
h1, h2 { font-family: "Aptos Display", Aptos, "Segoe UI Variable Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 500; letter-spacing: -.6px; }
h1 { margin-bottom: 9px; font-size: 37px; line-height: 1.02; }
h2 { margin-bottom: 12px; font-size: 25px; line-height: 1.05; }
h3 { margin-bottom: 5px; font-size: 15px; line-height: 1.15; }
.lede { max-width: 420px; margin-bottom: 19px; color: var(--muted); font-size: 14px; line-height: 1.5; }
.section { margin-top: 27px; }
.section-heading { display: flex; align-items: end; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
.section-heading h2 { margin: 0; }
.discover-heading { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.discover-heading h1 { margin-bottom: 12px; font-size: 31px; }
.filter-button { padding: 8px 11px; border-radius: 999px; color: var(--blue); background: var(--blue-soft); font-size: 10px; font-weight: 900; }
.search-box { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 11px 13px; border: 1px solid var(--line); border-radius: 14px; background: var(--paper); box-shadow: 0 3px 11px rgba(42,57,52,.04); }
.search-box span { color: var(--steel); font-family: "Aptos Display", Aptos, "Segoe UI Variable Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 24px; line-height: .5; }
.search-box input { width: 100%; border: 0; color: var(--ink); background: transparent; font: inherit; font-size: 12px; outline: 0; }
.age-note { margin: 8px 0 11px; padding: 9px 11px; border-radius: 11px; color: var(--blue); background: var(--blue-soft); font-size: 11px; font-weight: 800; line-height: 1.35; }
.mini-lists { display: flex; gap: 8px; overflow-x: auto; margin-top: 12px; padding-bottom: 2px; scrollbar-width: none; }
.mini-lists button { flex: 0 0 142px; padding: 11px; border-radius: 14px; color: white; background: var(--blue); text-align: left; }
.mini-lists button:nth-child(2) { background: var(--navy); }.mini-lists button:nth-child(3) { background: var(--steel); }
.mini-lists b, .mini-lists span { display: block; }.mini-lists b { font-size: 12px; }.mini-lists span { margin-top: 4px; font-size: 9px; opacity: .78; }
.feed-section { margin-top: 22px; }
.feed-label { margin-bottom: 3px; color: var(--blue); font-size: 8px; font-weight: 900; letter-spacing: .7px; text-transform: uppercase; }
.live-dot { color: var(--steel); font-size: 10px; font-weight: 900; text-transform: uppercase; }
.text-button { color: var(--blue); background: transparent; font-size: 12px; font-weight: 800; }
.chips { display: flex; gap: 7px; overflow-x: auto; padding: 1px 1px 6px; scrollbar-width: none; }
.chip, .filter-chip {
  flex: 0 0 auto;
  padding: 8px 12px;
  border: 1px solid var(--line);
  border-radius: 999px;
  color: var(--blue);
  background: var(--paper);
  font-size: 11px;
  font-weight: 800;
}
.chip.active, .filter-chip.active { border-color: var(--blue); color: white; background: var(--blue); }

.event-stack { display: grid; gap: 12px; }
.event-row {
  display: grid;
  grid-template-columns: 98px 1fr;
  min-height: 118px;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--paper);
  box-shadow: 0 3px 11px rgba(42,57,52,.045);
  text-align: left;
  transition: transform .18s ease, box-shadow .18s ease;
}
.event-row:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.event-art { position: relative; display: flex; align-items: end; min-height: 118px; padding: 8px; overflow: hidden; color: white; background: var(--blue); }
.event-art:before, .hero-art:before {
  position: absolute;
  top: -25px;
  right: -22px;
  width: 95px;
  height: 95px;
  border: 12px solid rgba(255,255,255,.18);
  border-radius: 50%;
  content: "";
}
.event-art:after, .hero-art:after {
  position: absolute;
  right: 10px;
  bottom: 18px;
  width: 54px;
  height: 54px;
  border: 1px solid rgba(255,255,255,.32);
  border-radius: 50%;
  content: "";
}
.cat-nightlife { background: linear-gradient(150deg, #344d73, #152b44); }
.cat-music { background: linear-gradient(150deg, #cf714f, #eaa65b); }
.cat-art { background: linear-gradient(150deg, #846894, #e2909a); }
.cat-fitness { background: linear-gradient(150deg, #467e66, #183f3a); }
.cat-food { background: linear-gradient(150deg, #e59840, #bb523d); }
.art-label { position: relative; z-index: 1; font-size: 9px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
.event-copy { display: flex; flex-direction: column; justify-content: center; padding: 12px; }
.event-meta { margin: 0 0 4px; color: var(--steel); font-size: 10px; font-weight: 900; letter-spacing: .5px; text-transform: uppercase; }
.event-copy p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.4; }
.event-location { display: block; margin-top: 2px; color: var(--ink); font-size: 12px; font-weight: 850; line-height: 1.35; }
.event-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.event-tag { display: inline-flex; align-items: center; padding: 4px 7px; border: 1px solid rgba(17,24,39,.18); border-radius: 999px; color: var(--ink); background: var(--bg); font-size: 9px; font-weight: 800; }
.detail-tags { margin: 2px 0 12px; }
.signal { display: flex; align-items: center; gap: 6px; margin-top: 9px; color: var(--blue); font-size: 10px; font-weight: 800; }
.avatars { display: flex; padding-left: 4px; }
.avatar {
  display: grid;
  width: 27px;
  height: 27px;
  margin-left: -5px;
  place-items: center;
  border: 2px solid var(--paper);
  border-radius: 50%;
  color: white;
  background: var(--blue);
  font-size: 8px;
  font-weight: 900;
}
.avatar:nth-child(2n) { background: var(--steel); }
.avatar:nth-child(3n) { background: var(--navy); }
.avatar-me { width: 40px; height: 40px; margin: 0; border-color: white; background: var(--navy); }

.feature-card { position: relative; overflow: hidden; border-radius: 22px; color: white; background: var(--navy); text-align: left; }
.feature-card .hero-art { min-height: 196px; padding: 20px; background: linear-gradient(145deg, rgba(34,60,82,.1), rgba(34,60,82,.8)), linear-gradient(135deg, #c97759, #233d53 67%); }
.feature-card h3 { position: relative; z-index: 1; max-width: 260px; margin-top: 45px; font-family: "Aptos Display", Aptos, "Segoe UI Variable Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 30px; font-weight: 500; }
.feature-card p { position: relative; z-index: 1; margin: 0; font-size: 12px; opacity: .88; }
.feature-signal { position: absolute; top: 16px; left: 16px; z-index: 2; padding: 7px 10px; border-radius: 999px; background: rgba(255,253,248,.95); color: var(--ink); font-size: 10px; font-weight: 900; }

.bottom-nav {
  position: fixed;
  right: 10px;
  bottom: 9px;
  left: 10px;
  z-index: 12;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  width: min(calc(100% - 20px), 600px);
  height: 64px;
  margin: 0 auto;
  padding: 7px 8px 8px;
  border: 1px solid rgba(231,223,212,.9);
  border-radius: 19px;
  background: rgba(255,254,250,.94);
  box-shadow: 0 8px 24px rgba(42,57,52,.12);
  backdrop-filter: blur(12px);
}
.nav-item { display: grid; justify-items: center; gap: 2px; color: #96a09b; background: transparent; font-size: 8px; }
.nav-item.active { color: var(--blue); }
.nav-item svg { width: 21px; height: 21px; stroke-width: 2; }

.modal-backdrop { position: fixed; inset: 0; z-index: 20; display: flex; align-items: end; justify-content: center; background: rgba(20,34,32,.45); animation: fade .2s ease; }
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.modal { position: relative; width: min(100%, 620px); max-height: 91vh; overflow-y: auto; border-radius: 25px 25px 0 0; background: var(--paper); animation: slide .28s ease; }
@keyframes slide { from { transform: translateY(35px); } to { transform: translateY(0); } }
.modal-close { position: absolute; top: 14px; right: 14px; z-index: 2; width: 36px; height: 36px; border-radius: 50%; color: white; background: rgba(23,58,53,.58); font-size: 20px; }
.detail-hero { position: relative; min-height: 210px; padding: 22px; color: white; }
.detail-hero h1 { position: relative; z-index: 1; max-width: 360px; margin-top: 75px; font-size: 35px; }
.detail-hero p { position: relative; z-index: 1; margin: 0; font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
.detail-location { position: relative; z-index: 1; display: block; max-width: 360px; margin-top: 8px; font-size: 13px; font-weight: 900; }
.detail-body { padding: 20px 18px 30px; }
.detail-actions { display: grid; grid-template-columns: 1fr 1fr 1.4fr; gap: 7px; margin: 16px 0; }
.action, .primary, .secondary { padding: 11px 10px; border-radius: 12px; font-size: 11px; font-weight: 900; }
.action { color: var(--blue); background: var(--blue-soft); }
.action.selected { color: white; background: var(--blue); }
.primary { color: white; background: var(--steel); }
.secondary { color: var(--blue); background: var(--blue-soft); }
.detail-description { color: var(--muted); font-family: "Aptos Display", Aptos, "Segoe UI Variable Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.45; }
.attendee-line { display: flex; align-items: center; gap: 9px; margin: 14px 0; font-size: 12px; font-weight: 800; }

.map-page { padding: 0; }
.map-top { padding: 18px; }
.map-canvas {
  position: relative;
  min-height: calc(100vh - 232px);
  overflow: hidden;
  background: #dce6dc;
}
.map-canvas:before {
  position: absolute;
  inset: -50px;
  opacity: .78;
  background:
    linear-gradient(118deg, transparent 0 19%, #f6f0e7 19% 23%, transparent 23% 100%),
    linear-gradient(12deg, transparent 0 39%, #f6f0e7 39% 43%, transparent 43% 100%),
    linear-gradient(98deg, transparent 0 59%, #f6f0e7 59% 63%, transparent 63% 100%),
    linear-gradient(163deg, transparent 0 68%, #f6f0e7 68% 71%, transparent 71% 100%);
  content: "";
}
.neighborhood { position: absolute; color: rgba(23,58,53,.5); font-size: 11px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
.pin { position: absolute; z-index: 2; display: grid; width: 38px; height: 38px; place-items: center; border: 3px solid white; border-radius: 50% 50% 50% 9px; color: white; background: var(--steel); box-shadow: 0 5px 10px rgba(48,61,57,.2); font-size: 11px; font-weight: 900; transform: rotate(-45deg); }
.pin span { transform: rotate(45deg); }
.pin.music { background: var(--steel); }.pin.nightlife { background: var(--navy); }.pin.art { background: #9e6f95; }.pin.fitness { background: var(--blue); }.pin.food { background: #ca8c3c; }
.map-card { position: absolute; right: 14px; bottom: 14px; left: 14px; z-index: 4; display: none; }
.map-card.visible { display: block; }

.tabs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; padding: 4px; border-radius: 14px; background: #ebe4d9; }
.tab-button { padding: 10px; border-radius: 11px; color: var(--muted); background: transparent; font-size: 12px; font-weight: 900; }
.tab-button.active { color: var(--blue); background: var(--paper); box-shadow: 0 2px 5px rgba(40,50,45,.08); }
.activity-card, .group-card, .stat-card { padding: 14px; border: 1px solid var(--line); border-radius: 17px; background: var(--paper); }
.activity-card { display: flex; gap: 11px; }
.activity-card + .activity-card { margin-top: 9px; }
.activity-card p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.45; }
.activity-card b { color: var(--ink); }
.activity-time { display: block; margin-top: 4px; color: #a09c94; font-size: 10px; }
.group-card { margin-top: 14px; }
.group-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.group-icon { display: grid; width: 45px; height: 45px; place-items: center; border-radius: 15px; color: white; background: var(--navy); font-family: "Aptos Display", Aptos, "Segoe UI Variable Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 22px; }
.group-head div:nth-child(2) { flex: 1; }
.group-head p { margin: 3px 0 0; color: var(--muted); font-size: 11px; }
.group-divider { margin-top: 24px; }
.community-grid, .group-list { display: grid; gap: 8px; }
.community-card { display: flex; align-items: center; gap: 10px; padding: 11px; border: 1px solid var(--line); border-radius: 14px; background: var(--paper); text-align: left; }
.community-card span:nth-child(2) { display: grid; flex: 1; gap: 2px; }.community-card small { color: var(--muted); font-size: 10px; }.community-card em { color: var(--steel); font-size: 10px; font-style: normal; font-weight: 800; }
.group-mini-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
.group-mini-tags i { padding: 3px 6px; border-radius: 999px; color: var(--blue); background: var(--blue-soft); font-size: 8px; font-style: normal; font-weight: 900; }
.group-access { padding: 5px 7px; border-radius: 999px; color: var(--blue); background: var(--blue-soft); font-size: 8px; font-weight: 900; letter-spacing: .5px; text-transform: uppercase; }
.group-access.private { color: #725b7f; background: #eee4f0; }
.group-icon.run { background: var(--blue); }.group-icon.book { background: #9e6f95; }.group-icon.art { background: var(--steel); }
.social-tabs { margin-top: 13px; }
.create-sheet { padding: 21px 18px 25px; }
.create-sheet h2 { margin-bottom: 5px; font-size: 30px; }
.create-sheet .lede { margin-bottom: 14px; }
.group-type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 13px; }
.group-type { padding: 11px 7px; border: 1px solid var(--line); border-radius: 12px; color: var(--muted); background: var(--paper); font-size: 10px; font-weight: 900; }
.group-type.selected { border-color: var(--blue); color: white; background: var(--blue); }
.create-sheet input { width: 100%; margin-bottom: 9px; padding: 12px; border: 1px solid var(--line); border-radius: 11px; color: var(--ink); background: var(--paper); font: inherit; font-size: 12px; }
.group-detail { padding: 21px 18px 25px; }
.group-detail h2 { margin-bottom: 4px; font-size: 29px; }
.group-detail-meta { display: flex; flex-wrap: wrap; gap: 6px; margin: 9px 0 13px; }
.detail-pill { padding: 6px 8px; border-radius: 999px; color: var(--blue); background: var(--blue-soft); font-size: 9px; font-weight: 900; }
.group-description { color: var(--muted); font-size: 12px; line-height: 1.45; }
.group-detail-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin: 14px 0; }
.member-line { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 9px; padding: 10px; border-radius: 12px; background: #f8f5ef; }
.member-line span { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 800; }
.message-list { display: grid; gap: 7px; margin-top: 9px; }
.message { max-width: 88%; padding: 9px 10px; border-radius: 12px 12px 12px 3px; color: var(--ink); background: var(--blue-soft); font-size: 11px; line-height: 1.4; }
.message.me { justify-self: end; border-radius: 12px 12px 3px 12px; color: white; background: var(--blue); }
.message small { display: block; margin-top: 3px; opacity: .68; font-size: 8px; font-weight: 900; }
.message-compose { display: flex; gap: 7px; margin-top: 10px; }
.message-compose input { width: 100%; min-width: 0; padding: 10px; border: 1px solid var(--line); border-radius: 11px; color: var(--ink); background: var(--paper); font: inherit; font-size: 11px; }
.interest-list { display: grid; gap: 7px; margin-top: 9px; }
.interest-event { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px; border-radius: 12px; background: #f8f5ef; }
.interest-event b, .interest-event small { display: block; }.interest-event b { font-size: 11px; }.interest-event small { margin-top: 3px; color: var(--muted); font-size: 9px; }
.follow-list { display: grid; gap: 8px; }
.follow-card { display: flex; align-items: center; gap: 10px; padding: 11px; border: 1px solid var(--line); border-radius: 14px; background: var(--paper); text-align: left; }
.follow-card span:nth-child(2) { display: grid; flex: 1; gap: 2px; }.follow-card small { color: var(--muted); font-size: 10px; }.follow-card em { color: var(--steel); font-size: 10px; font-style: normal; font-weight: 800; }
.follow-button { padding: 6px 8px; border-radius: 999px; color: var(--blue); background: var(--blue-soft); font-size: 9px; font-weight: 900; }
.follow-button.selected { color: white; background: var(--blue); }
.following-rail { display: flex; gap: 9px; overflow-x: auto; margin-bottom: 15px; padding: 2px 1px 6px; scrollbar-width: none; }
.following-chip { display: grid; flex: 0 0 86px; justify-items: center; gap: 5px; padding: 10px 7px; border: 1px solid var(--line); border-radius: 14px; background: var(--paper); text-align: center; }
.following-chip .group-icon { width: 36px; height: 36px; border-radius: 12px; font-size: 16px; }
.following-chip b { font-size: 10px; line-height: 1.15; }.following-chip small { color: var(--steel); font-size: 8px; font-weight: 900; text-transform: uppercase; }
.filter-sheet, .notification-sheet, .list-sheet, .invite-sheet { padding: 21px 18px 25px; }
.filter-sheet h2, .notification-sheet h2, .list-sheet h2, .invite-sheet h2 { margin-bottom: 6px; font-size: 30px; }
.filter-block { margin-top: 16px; }.filter-block .eyebrow { margin-bottom: 8px; }
.filter-options { display: flex; flex-wrap: wrap; gap: 6px; }.filter-options button { padding: 8px 10px; border-radius: 999px; color: var(--blue); background: var(--blue-soft); font-size: 10px; font-weight: 900; }.filter-options button.selected { color: white; background: var(--blue); }
.notification-card { padding: 11px 0; border-bottom: 1px solid var(--line); }.notification-card b, .notification-card small { display: block; }.notification-card b { font-size: 12px; }.notification-card p { margin: 4px 0; color: var(--muted); font-size: 11px; line-height: 1.35; }.notification-card small { color: var(--steel); font-size: 9px; font-weight: 900; }

@media (min-width: 700px) {

}

@media (min-width: 1040px) {
  body { background: #e6ddd0; }
  .demo-stage { display: grid; grid-template-columns: 330px 620px; justify-content: center; gap: 44px; padding: 24px 38px; }

  .app-shell { width: 620px; margin: 0; min-height: calc(100vh - 48px); border-radius: 25px; }
  .bottom-nav { right: auto; left: calc(50% - 113px); bottom: 34px; width: 600px; }
  .modal { margin-bottom: 24px; }
  .production-app body { background: #e7edf2; }
  .production-app .demo-stage { display: block; padding: 0; }
  .production-app .app-shell { margin: 0 auto; min-height: 100vh; }
}



/* Round 2: palette, typography, and feature overrides */
body { font-family: Aptos, "Segoe UI Variable", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
.app-shell { overflow-x: hidden; overflow-y: visible; padding-bottom: 78px; }

#profile-shortcut { grid-auto-flow: column; grid-template-columns: auto minmax(0, max-content); gap: 7px; max-width: 174px; }
#profile-shortcut .account-label { overflow: hidden; max-width: 118px; color: var(--ink); font-size: 11px; font-weight: 900; text-overflow: ellipsis; white-space: nowrap; }
.following-chip { flex-basis: 190px; min-height: 186px; align-content: center; gap: 10px; }

.story-heading { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
.story-heading .group-icon { width: 50px; height: 50px; flex: 0 0 50px; border-radius: 50%; }
.story-controls { position: sticky; bottom: -25px; display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 16px -18px -25px; padding: 12px 18px 16px; border-top: 1px solid var(--line); background: color-mix(in srgb, var(--paper) 94%, transparent); }
.story-controls small { color: var(--muted); font-weight: 800; white-space: nowrap; }
.notification-card { width: 100%; background: transparent; text-align: left; }
.request-notification { display: block; }

.lokal-score small { font-size: 9px; letter-spacing: .6px; text-transform: uppercase; }
.score-breakdown { display: grid; gap: 8px; margin: 14px 0; }
.score-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 11px; border: 1px solid rgba(58, 124, 165, .14); border-radius: 13px; background: #f5f7fa; }

.score-row small { color: var(--muted); font-size: 10px; line-height: 1.35; }

.score-safeguard { padding: 12px; border: 1px solid rgba(0, 200, 151, .24); border-radius: 14px; background: rgba(0, 200, 151, .08); }

.insight-card {
  padding: 13px 9px;
  border: 1px solid rgba(58,124,165,.14);
  border-radius: 13px;
  background: #ffffff;
  box-shadow: 0 4px 14px rgba(17,24,39,.04);
}
.insight-card b {
  display: block;
  color: #16A085;
  font-size: 24px;
  line-height: 1;
}
.insight-card small {
  display: block;
  margin-top: 5px;
  color: var(--muted);
  font-size: 8px;
  font-weight: 900;
  line-height: 1.2;
  text-transform: uppercase;
}
.category-bars {
  display: grid;
  gap: 8px;
  margin: 0 0 13px;
}
.category-bar {
  display: grid;
  gap: 6px;
  padding: 10px;
  border-radius: 13px;
  background: #ffffff;
}
.category-bar span {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  font-size: 11px;
}
.category-bar small {
  color: var(--muted);
  font-size: 9px;
  font-weight: 900;
}
.category-bar i {
  display: block;
  width: var(--level);
  height: 7px;
  border-radius: 999px;
  background: linear-gradient(90deg, #16A085, #5f9fc3);
  animation: growBar .7s ease both;
  animation-delay: var(--delay);
}
.insight-receipts {
  display: grid;
  gap: 8px;
}
.insight-receipts .receipt {
  transform-origin: center;
  animation: softFloat 4s ease-in-out infinite;
}
.insight-receipts .receipt:nth-child(2) { animation-delay: .35s; }
.insight-receipts .receipt:nth-child(3) { animation-delay: .7s; }
@keyframes growBar { from { width: 18%; opacity: .45; } to { width: var(--level); opacity: 1; } }
@keyframes pulseDot { 0%, 100% { transform: scale(.85); opacity: .6; } 50% { transform: scale(1.25); opacity: 1; } }
@keyframes softFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }

/* Remote card system bridge for Saved suggestions */
.saved-suggestion-rail .event-card {
  flex: 0 0 min(78vw, 330px);
  min-height: 390px;
  scroll-snap-align: start;
}
.saved-suggestion-rail .event-card:nth-child(2n) {
  flex-basis: min(70vw, 300px);
  min-height: 430px;
}
.saved-suggestion-rail .event-card-title {
  font-size: 17px;
  line-height: 1.12;
}

/* Saved tab: three-up suggestions and full-width week calendar */
.suggested-saved-section {
  margin-top: 16px;
}
.saved-suggestion-rail {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  margin: 0;
  overflow: visible;
  padding: 0;
}
.saved-suggestion-rail .event-card,
.saved-suggestion-rail .event-row {
  width: 100%;
  min-width: 0;
  min-height: 210px;
  flex: initial;
  scroll-snap-align: unset;
}
.saved-suggestion-rail .event-card:nth-child(2n) {
  min-height: 210px;
  flex-basis: auto;
}
.saved-suggestion-rail .event-card:nth-child(n+4),
.saved-suggestion-rail .event-row:nth-child(n+4) {
  display: none;
}
.saved-suggestion-rail .event-card-title,
.saved-suggestion-rail .event-copy h3 {
  font-size: 13px;
  line-height: 1.15;
}
.saved-suggestion-rail .event-card-meta,
.saved-suggestion-rail .event-card-loc,
.saved-suggestion-rail .event-meta,
.saved-suggestion-rail .event-location {
  font-size: 9.5px;
  line-height: 1.2;
}
.saved-suggestion-rail .event-card-tags,
.saved-suggestion-rail .event-card-badge,
.saved-suggestion-rail .event-card-urgency,
.saved-suggestion-rail .event-tags,
.saved-suggestion-rail .signal {
  display: none;
}
.saved-suggestion-rail .event-card-bottom {
  padding: 10px;
}
.saved-suggestion-rail .event-card-actions {
  top: 7px;
  right: 7px;
  gap: 4px;
}
.saved-suggestion-rail .card-icon-btn,
.saved-suggestion-rail .event-icon-action {
  width: 28px;
  height: 28px;
}
.planner-calendar-section {
  margin-top: 16px;
  margin-right: -2px;
  margin-left: -2px;
}
.planner-legend {
  display: none;
}
.planner-week-controls {
  grid-template-columns: 34px 1fr 34px;
  gap: 6px;
}
.planner-week-controls span {
  text-align: center;
  font-size: 10px;
}
.planner-week-controls .secondary {
  overflow: hidden;
  height: 34px;
  padding: 0;
  border-radius: 50%;
  color: transparent;
  white-space: nowrap;
}
.planner-week-controls .secondary:first-child::before,
.planner-week-controls .secondary:last-child::before {
  color: #0E7C66;
  font-size: 16px;
  font-weight: 900;
}
.planner-week-controls .secondary:first-child::before { content: "\2190"; }
.planner-week-controls .secondary:last-child::before { content: "\2192"; }
.planner-calendar {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 5px;
  width: 100%;
  overflow: visible;
  padding-bottom: 0;
}
.planner-day {
  min-width: 0;
  min-height: 148px;
  gap: 6px;
  padding: 7px 6px;
  border-radius: 9px;
}
.planner-day-head span {
  font-size: 8px;
}
.planner-day-head b {
  font-size: 15px;
}
.planner-day-events {
  gap: 4px;
}
.planner-day-event {
  grid-template-columns: 4px 1fr;
  gap: 4px;
  padding: 6px 5px;
  border-radius: 8px;
}
.planner-day-event i {
  width: 4px;
}
.planner-day-event strong {
  display: -webkit-box;
  overflow: hidden;
  font-size: 9.5px;
  line-height: 1.15;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 3;
}
.planner-day-event small {
  display: none;
}
.day-explore {
  min-height: 32px;
  padding: 5px 3px;
  border-radius: 8px;
  color: #0E7C66;
  background: #e0eef7;
  font-size: 8px;
  font-weight: 900;
}
@media (max-width: 430px) {
  .profile-summary-strip { grid-template-columns: repeat(2, 1fr); }
  .saved-suggestion-rail { gap: 6px; }
  .saved-suggestion-rail .event-card,
  .saved-suggestion-rail .event-row { min-height: 190px; }
  .planner-calendar { gap: 3px; }
  .planner-day { min-height: 132px; padding: 6px 4px; }
  .planner-day-head { display: grid; gap: 1px; justify-content: center; text-align: center; }
  .planner-day-head span { font-size: 7px; }
  .planner-day-head b { font-size: 13px; }
  .planner-day-event { padding: 5px 4px; }
  .planner-day-event strong { font-size: 8.5px; }
}

/* Venue search page refinements */
.venue-result { display: flex; align-items: center; gap: 8px; padding: 0; }
.venue-result-main { display: flex; flex: 1; align-items: center; gap: 10px; min-width: 0; padding: 10px; background: transparent; text-align: left; }
.venue-result-main span:last-child { display: grid; gap: 2px; min-width: 0; }
.venue-result-main b, .venue-result-main small { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.venue-result > .follow-button { align-self: stretch; border-left: 1px solid var(--line); border-radius: 0; }
.venue-page-hero { display: grid; min-height: 170px; align-content: end; gap: 4px; margin: -4px -2px 12px; padding: 16px; border-radius: 16px; color: #fff; background: linear-gradient(145deg, #0f172a, #16A085); background-position: center; background-size: contain; background-repeat: no-repeat; }
.venue-page-hero h2 { margin: 0; color: #fff; font-size: 28px; }
.venue-page-hero span { color: rgba(255,255,255,.88); font-size: 12px; font-weight: 800; }
.venue-page-actions { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.venue-add-button { display: grid; place-items: center; width: 42px; height: 42px; border: 0; border-radius: 50%; color: #fff; background: #0E7C66; font-size: 28px; font-weight: 900; line-height: 1; box-shadow: 0 10px 24px rgba(14, 124, 102, .26); }
.venue-add-button.small { width: 34px; height: 34px; font-size: 22px; box-shadow: 0 6px 16px rgba(14, 124, 102, .2); }
.venue-add-button:active { transform: translateY(1px); }
.detail-hero.has-image { background-size: cover, contain !important; background-repeat: no-repeat, no-repeat !important; background-position: center, center !important; background-color: #f7fafc !important; }
.feed-section.search-empty-feed::after { content: "No events or venues match that search."; }

.venue-search-section { display: grid; gap: 8px; margin-bottom: 14px; }
.venue-search-list { display: grid; gap: 8px; }
.venue-search-card { display: grid; grid-template-columns: 70px minmax(0, 1fr); gap: 12px; align-items: center; width: 100%; padding: 8px; border: 1px solid var(--line); border-radius: 14px; background: var(--paper); text-align: left; box-shadow: 0 3px 10px rgba(17, 24, 39, .035); }
.venue-search-art { display: grid; place-items: center; width: 70px; height: 58px; overflow: hidden; border-radius: 11px; background: #f7fafc; color: var(--ink); font-weight: 900; }
.venue-search-art img { width: 100%; height: 100%; object-fit: contain; }
.venue-search-card > span:last-child { display: grid; gap: 2px; min-width: 0; }
.venue-search-card b, .venue-search-card small, .venue-search-card em { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.venue-search-card small { color: var(--muted); font-size: 11px; }
.venue-search-card em { color: var(--steel); font-size: 10px; font-style: normal; font-weight: 800; }

.venue-owner-panel { position: relative; display: grid; gap: 10px; margin: 14px 0; padding: 14px; border: 1px solid var(--line); border-radius: 16px; background: linear-gradient(145deg, #f7fafc, #eefaf6); }
.venue-owner-panel h3 { margin: 0; font-size: 16px; }
.venue-owner-panel p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.35; }
.venue-owner-panel .wide-button { width: 100%; }
.venue-owner-status { display: grid; gap: 6px; }
.venue-owner-status span { display: inline-flex; width: fit-content; padding: 5px 9px; border-radius: 999px; background: #e0eef7; color: #006c52; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: .08em; }
.venue-owner-list { display: grid; gap: 8px; }
.venue-owner-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 11px; border: 1px solid var(--line); border-radius: 13px; background: rgba(255,255,255,.78); }
.venue-owner-row span { display: grid; gap: 2px; min-width: 0; }
.venue-owner-row b,
.venue-owner-row small { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.venue-owner-row small { color: var(--muted); font-size: 11px; font-weight: 800; }
.venue-owner-dismiss { position: absolute; top: 8px; right: 8px; display: grid; place-items: center; width: 28px; height: 28px; border: 0; border-radius: 50%; background: rgba(255,255,255,.82); color: var(--muted); font-size: 18px; font-weight: 900; line-height: 1; }
.venue-owner-dismiss:active { transform: translateY(1px); }
.welcome-choice-row { display: grid; gap: 10px; width: min(100%, 320px); }
.welcome-cta.secondary { background: rgba(255,255,255,.92); color: #0f172a; }
.venue-form-sheet textarea,
.venue-form-sheet select { width: 100%; border: 1px solid var(--line); border-radius: 12px; background: var(--paper); color: var(--ink); font: inherit; }
.venue-form-sheet textarea { min-height: 96px; padding: 12px; resize: vertical; }
.settings-field textarea,
.float-field textarea { width: 100%; min-height: 92px; padding: 12px; border: 1px solid var(--line); border-radius: 12px; background: var(--paper); color: var(--ink); font: inherit; resize: vertical; }
.venue-form-sheet select { min-height: 44px; padding: 0 12px; }
.venue-form-sheet .settings-field label { align-items: start; }
.recurring-toggle { display: flex; align-items: center; gap: 9px; padding: 11px 12px; border: 1px solid var(--line); border-radius: 12px; background: var(--paper); font-size: 13px; font-weight: 800; }
.recurring-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 430px) {
  .friend-search-columns { grid-template-columns: 1fr; }
  .recurring-fields { grid-template-columns: 1fr; }
}

/* ============================================================
   UI Redesign v2 â€” teal design system + new components.
   Loaded after base.css and round2.css, so it intentionally
   overrides earlier rules. Light background is preserved.
   ============================================================ */

:root {
  --accent: #00C9A7;
  --accent-strong: #00b294;
  --heart: #FF6B9D;
  --urgent: #FF4757;
  --warm: #FF7B54;
  --display: "Barlow Condensed", "Aptos Display", Aptos, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

/* ---- Typography ---- */
h1, h2, h3,
.brand b, .sidebar-brand b,
.event-card-title, .score-big, .score-level-tag,
.tonight-head h2, .attend-copy b {
  font-family: var(--display);
}
h1 { font-weight: 900; }
h2 { font-weight: 800; }
h3 { font-weight: 700; }

.eyebrow,
.feed-label, .event-meta, .settings-label, .suggestion-type,
.stop-label, .rank-badge, .step-count {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ---- Teal accent: replace remaining mint surfaces ---- */
.brand-mark, .wide-button, .primary,
.chip.active, .filter-chip.active, .action.selected, .group-type.selected,
.message.me, .follow-button.selected, .hype-button.selected, .select-tile.selected,
.profile-avatar, .avatar-me, .group-icon,
.feature-card, .stop-card.anchor, .anchor-summary,
.attended-button.selected, .share-channel,
.taste-choice.selected, .privacy-toggle input {
  background: var(--accent);
}
.privacy-toggle input { accent-color: var(--accent); }
.nav-item.active { color: var(--accent); }
.header-icon i, .story-progress span.active,
.chip.active, .filter-chip.active { box-shadow: inset 0 -3px 0 var(--accent); }
.following-chip .group-icon, .community-card.pinned { border-color: rgba(0, 201, 167, .7); }
.lokal-score { color: var(--accent-strong); }

/* ============================================================
   CHANGE 1 â€” Event cards (used everywhere eventRow renders)
   ============================================================ */
.event-card {
  position: relative;
  display: block;
  width: 100%;
  min-height: 165px;
  padding: 0;
  overflow: hidden;
  border-radius: 16px;
  background-color: var(--blue);
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;
  box-shadow: 0 4px 14px rgba(17, 24, 39, .12);
  isolation: isolate;
  text-align: left;
  transition: transform .18s ease, box-shadow .18s ease;
}
.event-card:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(17, 24, 39, .16); }

/* full-bleed tap target that opens the detail modal */
.event-card-hit {
  position: absolute;
  inset: 0;
  z-index: 1;
  width: 100%;
  height: 100%;
  background: transparent;
}

.event-card-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 2;
  padding: 4px 9px;
  border: 1px solid currentColor;
  border-radius: 999px;
  background: rgba(0, 0, 0, .55);
  font-family: var(--display);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  pointer-events: none;
}

.event-card-actions {
  position: absolute;
  top: 9px;
  right: 9px;
  z-index: 3;
  display: flex;
  align-items: center;
  gap: 6px;
  pointer-events: none;
}
.card-icon-btn {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  color: #fff;
  background: rgba(0, 0, 0, .42);
  backdrop-filter: blur(5px);
  pointer-events: auto;
  transition: background .15s ease, transform .15s ease;
}
.card-icon-btn:hover { background: rgba(0, 0, 0, .62); transform: scale(1.06); }
.card-icon-btn svg { width: 16px; height: 16px; stroke-width: 2; }
.card-save svg { fill: none; }
.card-save.is-saved svg { fill: var(--heart); stroke: var(--heart); }
.event-card-bottom {
  position: absolute;
  inset: auto 0 0 0;
  z-index: 2;
  display: grid;
  gap: 6px;
  padding: 12px 13px 13px;
  pointer-events: none;
}
.card-friends { display: flex; padding-left: 5px; }
.card-friend-avatar {
  display: grid;
  place-items: center;
  width: 16px;
  height: 16px;
  margin-left: -5px;
  border: 1px solid #fff;
  border-radius: 50%;
  color: #fff;
  background: var(--accent);
  font-size: 7px;
  font-weight: 900;
}
.card-friend-avatar:nth-child(2n) { background: var(--warm); }
.card-friend-avatar:nth-child(3n) { background: #5f9fc3; }

.event-card-meta {
  color: rgba(255, 255, 255, .88);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .06em;
  text-transform: uppercase;
}
.event-card-title {
  margin: 0;
  color: #fff;
  font-size: 19px;
  font-weight: 900;
  line-height: 1.0;
  text-shadow: 0 1px 10px rgba(0, 0, 0, .35);
}
.event-card-hero .event-card-title { font-size: 24px; }
.event-card-half .event-card-title { font-size: 17px; }

.event-card .event-card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.event-card .event-tag {
  padding: 4px 8px;
  border: 1px solid rgba(255, 255, 255, .35);
  border-radius: 999px;
  color: #fff;
  background: rgba(255, 255, 255, .14);
  font-size: 9px;
  font-weight: 800;
}

.event-card-urgency {
  justify-self: start;
  margin-top: 1px;
  padding: 4px 9px;
  border-radius: 999px;
  color: #fff;
  font-size: 9px;
  font-weight: 900;
  letter-spacing: .05em;
  text-transform: uppercase;
}
.event-card-urgency.urgency-free { background: var(--accent); }
.event-card-urgency.urgency-spots { background: var(--urgent); }
.event-card-urgency.urgency-fast { background: var(--warm); }

/* card size variants */
.event-card-hero { min-height: 200px; }
.event-card-half { min-height: 165px; }

/* ============================================================
   CHANGE 2 â€” Discover screen
   ============================================================ */
/* Friends activity strip */
.activity-strip {
  display: flex;
  gap: 13px;
  margin: 0 -18px 16px;
  padding: 2px 18px 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.activity-strip::-webkit-scrollbar { display: none; }
.activity-chip {
  flex: 0 0 auto;
  display: grid;
  justify-items: center;
  gap: 5px;
  width: 64px;
  background: transparent;
  text-align: center;
}
.activity-ring {
  display: grid;
  place-items: center;
  width: 50px;
  height: 50px;
  border: 2px solid var(--accent);
  border-radius: 50%;
  background: #fff;
}
.activity-ring .avatar {
  width: 44px;
  height: 44px;
  margin: 0;
  border: 0;
  font-size: 13px;
}
.activity-chip b { font-family: var(--display); font-size: 12px; font-weight: 700; }
.activity-chip small { color: var(--muted); font-size: 8px; font-weight: 800; line-height: 1.25; }

/* Happening tonight */
.tonight-section { margin: 4px 0 18px; }
.tonight-head { display: flex; align-items: center; gap: 9px; margin-bottom: 11px; }
.tonight-head h2 {
  margin: 0;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: .02em;
  text-transform: uppercase;
}
.tonight-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--urgent);
  animation: tonightPulse 1.5s ease-in-out infinite;
}
@keyframes tonightPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, .55); opacity: 1; }
  50% { box-shadow: 0 0 0 7px rgba(255, 71, 87, 0); opacity: .65; }
}

/* Hero / pair feed pattern */
.feed-grid { display: grid; gap: 12px; }
.feed-pair-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ============================================================
   CHANGE 3 â€” Saved screen
   ============================================================ */
.personalized-block { margin-top: 4px; }
.personalized-eyebrow { color: var(--accent-strong); }
.personalized-list { display: grid; gap: 12px; }
.explore-cta {
  display: block;
  width: 100%;
  margin: 26px 0 4px;
  padding: 16px;
  border-radius: 14px;
  color: #fff;
  background: var(--accent);
  font-family: var(--display);
  font-size: 17px;
  font-weight: 900;
  letter-spacing: .04em;
  text-transform: uppercase;
  box-shadow: 0 8px 18px rgba(0, 201, 167, .25);
}
.explore-cta:hover { background: var(--accent-strong); }

/* ============================================================
   CHANGE 4 â€” Profile screen
   ============================================================ */
.score-block {
  margin: 6px 0 22px;
  padding: 18px;
  border: 1px solid rgba(58, 124, 165, .14);
  border-radius: 18px;
  background: #fff;
  box-shadow: 0 4px 14px rgba(17, 24, 39, .05);
}
.score-block .eyebrow { margin-bottom: 8px; }
.score-row-top { display: flex; align-items: baseline; gap: 12px; }
.score-big {
  font-family: var(--display);
  font-size: 52px;
  font-weight: 900;
  line-height: .85;
  color: var(--accent);
}
.score-level-tag {
  padding: 6px 11px;
  border-radius: 999px;
  color: var(--accent-strong);
  background: rgba(0, 201, 167, .12);
  font-family: var(--display);
  font-size: 14px;
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.score-progress {
  height: 10px;
  margin: 13px 0 7px;
  overflow: hidden;
  border-radius: 999px;
  background: #e7edf2;
}
.score-progress i {
  display: block;
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--accent), #57e0c6);
  transition: width .4s ease;
}
.score-next { margin: 0 0 8px; color: var(--muted); font-size: 11px; font-weight: 700; }
.score-block .text-button { padding: 0; }

/* Taste pills (colored per category) */
.profile-taste-chips .taste-pill {
  padding: 7px 12px;
  border: 1px solid color-mix(in srgb, var(--c) 38%, #fff);
  border-radius: 999px;
