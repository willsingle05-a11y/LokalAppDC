name: Deploy Lokal to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build app
        run: npm run build
      - name: Configure Pages
        uses: actions/configure-pages@v5
      # Re-running a previous attempt of this job leaves its "github-pages"
      # artifact attached to the run. The upload below then creates a second one,
      # and deploy-pages aborts with "Multiple artifacts named github-pages ...
      # Artifact count is 2." Delete any stale copy first so re-runs are safe.
      - name: Remove stale Pages artifact (safe on re-runs)
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const res = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              name: 'github-pages',
            });
            for (const artifact of res.data.artifacts) {
              core.info(`Deleting stale artifact ${artifact.id}`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
